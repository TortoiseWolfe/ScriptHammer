      <rect x="20" y="155" width="300" height="50" rx="12" fill="#f5f0e6"/>
      <text x="35" y="180" class="raw-text">Try **multiple** styled **words**</text>
      <text x="35" y="197" class="raw-text">in the *same* message!</text>

