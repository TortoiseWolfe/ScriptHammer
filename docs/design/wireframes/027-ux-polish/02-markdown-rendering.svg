    <g transform="translate(60, 445)">
      <rect x="0" y="0" width="860" height="130" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
      <text x="20" y="30" class="heading">Supported Markdown Syntax (FR-005 to FR-007)</text>

      <!-- Bold -->
      <g transform="translate(20, 50)">
        <rect x="0" y="0" width="260" height="65" rx="6" fill="#e8d4b8"/>
        <text x="15" y="22" class="annotation">**text**</text>
        <text x="100" y="22" class="text-muted">→ Bold</text>
        <rect x="15" y="32" width="230" height="25" rx="4" fill="#f5f0e6"/>
        <text x="25" y="50" class="msg-text"><tspan font-weight="700">This is bold text</tspan></text>
      </g>

      <!-- Italic -->
      <g transform="translate(300, 50)">
        <rect x="0" y="0" width="260" height="65" rx="6" fill="#e8d4b8"/>
        <text x="15" y="22" class="annotation">*text*</text>
        <text x="70" y="22" class="text-muted">→ Italic</text>
        <rect x="15" y="32" width="230" height="25" rx="4" fill="#f5f0e6"/>
        <text x="25" y="50" class="msg-text"><tspan font-style="italic">This is italic text</tspan></text>
      </g>

      <!-- Code -->
      <g transform="translate(580, 50)">
        <rect x="0" y="0" width="260" height="65" rx="6" fill="#e8d4b8"/>
        <text x="15" y="22" class="annotation">`text`</text>
        <text x="70" y="22" class="text-muted">→ Inline Code</text>
        <rect x="15" y="32" width="230" height="25" rx="4" fill="#f5f0e6"/>
        <rect x="25" y="37" width="120" height="18" rx="3" fill="#dcc8a8"/>
        <text x="32" y="51" font-family="monospace" font-size="12" fill="#1a1a2e">const x = 42</text>
      </g>
    </g>

    <!-- Edge Cases -->
    <g transform="translate(60, 595)">
      <rect x="0" y="0" width="860" height="145" rx="8" fill="#e8d4b8" stroke="#8b5cf6"/>
      <text x="20" y="25" class="annotation">EDGE CASE HANDLING (FR-011)</text>

