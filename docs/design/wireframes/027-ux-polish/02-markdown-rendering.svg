      <text x="450" y="110" class="text-sm">FR-011: Graceful malformed handling ✓</text>
      <text x="700" y="110" class="text-sm">FR-012: XSS prevention ✓</text>
      <text x="20" y="130" class="text-sm">NFR-005: Semantic HTML (strong, em, code) ✓</text>
      <text x="350" y="130" class="text-sm">NFR-006: Screen reader compatible ✓</text>
    </g>
