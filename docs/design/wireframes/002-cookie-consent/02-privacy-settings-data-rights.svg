<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7ddf5"/>
      <stop offset="100%" stop-color="#b8d4f0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- CENTERED TITLE with text-anchor="middle" -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="18" font-weight="700" fill="#4b5563" letter-spacing="1">
    COOKIE PRIVACY - SETTINGS PAGE
  </text>

  <!-- Section labels -->
  <text x="40" y="52" fill="#8b5cf6" font-family="system-ui, sans-serif"
        font-size="18" font-weight="bold">DESKTOP (16:9)</text>
  <text x="1500" y="52" fill="#d946ef" font-family="system-ui, sans-serif"
        font-size="15" font-weight="bold">MOBILE</text>

  <!-- DESKTOP (1280x720) -->
  <g id="desktop" transform="translate(40, 60)">
    <rect width="1280" height="720" rx="8" fill="#e8d4b8" stroke="#b8a080"/>

    <!-- Header include -->
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>

    <!-- Page Title -->
    <text x="640" y="85" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="24" font-weight="bold" fill="#374151">Privacy Settings</text>
    <text x="640" y="110" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" fill="#4b5563">Manage your cookie settings and data rights</text>

    <!-- Main Content Area - Two Columns -->
    <!-- Left Column: Cookie Settings -->
    <g transform="translate(40, 130)">
      <rect width="580" height="380" rx="8" fill="#f5f0e6" stroke="#b8a080"/>
      <text x="20" y="35" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#374151">Cookie Settings</text>
      <text x="20" y="55" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Adjust your privacy settings at any time</text>

      <!-- Cookie Categories -->
      <g transform="translate(20, 75)">
        <rect width="540" height="65" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="15" y="28" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Necessary</text>
        <text x="15" y="45" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Required for basic site functionality</text>
        <rect x="460" y="14" width="50" height="26" rx="13" fill="#22c55e"/>
        <circle cx="497" cy="27" r="10" fill="#ffffff"/>
      </g>

      <g transform="translate(20, 150)">
        <rect width="540" height="65" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="15" y="28" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Functional</text>
        <text x="15" y="45" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Enhanced features and preferences</text>
        <rect x="460" y="14" width="50" height="26" rx="13" fill="#22c55e"/>
        <circle cx="497" cy="27" r="10" fill="#ffffff"/>
      </g>

      <g transform="translate(20, 225)">
        <rect width="540" height="65" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="15" y="28" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Analytics</text>
        <text x="15" y="45" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Usage statistics and improvements</text>
        <rect x="460" y="14" width="50" height="26" rx="13" fill="#6b7280"/>
        <circle cx="473" cy="27" r="10" fill="#ffffff"/>
      </g>

      <g transform="translate(20, 300)">
        <rect width="540" height="65" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="15" y="28" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Marketing</text>
        <text x="15" y="45" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Personalized ads and content</text>
        <rect x="460" y="14" width="50" height="26" rx="13" fill="#6b7280"/>
        <circle cx="473" cy="27" r="10" fill="#ffffff"/>
      </g>

      <!-- Save Button -->
      <g transform="translate(20, 340)">
        <rect width="180" height="44" rx="6" fill="#8b5cf6"/>
        <text x="90" y="28" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="16" font-weight="bold" fill="#ffffff">Save Preferences</text>
      </g>
    </g>

    <!-- Right Column: Data Rights -->
    <g transform="translate(660, 130)">
      <rect width="580" height="380" rx="8" fill="#f5f0e6" stroke="#b8a080"/>
      <text x="20" y="35" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#374151">Your Data Rights</text>
      <text x="20" y="55" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Exercise your GDPR data rights</text>

      <!-- Data Export Section -->
      <g transform="translate(20, 75)">
        <rect width="540" height="120" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="15" y="30" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Export Your Data</text>
        <text x="15" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Download all data we have stored about you,</text>
        <text x="15" y="70" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">including preference history and preferences.</text>
        <rect x="15" y="82" width="160" height="38" rx="6" fill="#8b5cf6"/>
        <text x="95" y="106" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#ffffff">Export Data</text>
      </g>

      <!-- Data Deletion Section -->
      <g transform="translate(20, 210)">
        <rect width="540" height="120" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="15" y="30" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Delete Your Data</text>
        <text x="15" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Request deletion of all your data. This action</text>
        <text x="15" y="70" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">cannot be undone.</text>
        <rect x="15" y="82" width="160" height="38" rx="6" fill="#dc2626"/>
        <text x="95" y="106" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#ffffff">Delete Data</text>
      </g>

      <!-- Policy Version Info -->
      <g transform="translate(20, 340)">
        <text x="0" y="20" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Policy Version: 1.2.0 | Last Updated: Jan 2026</text>
      </g>
    </g>

    <!-- Footer include -->
    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>
  </g>

  <!-- DESKTOP CALLOUTS -->
  <g id="desktop-callouts">
    <!-- Callout 1: Cookie settings panel -->
    <circle cx="660" cy="300" r="14" fill="#dc2626"/>
    <text x="660" y="305" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">1</text>

    <!-- Callout 2: Data export section -->
    <circle cx="1280" cy="280" r="14" fill="#dc2626"/>
    <text x="1280" y="285" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">2</text>

    <!-- Callout 3: Data deletion section -->
    <circle cx="1280" cy="420" r="14" fill="#dc2626"/>
    <text x="1280" y="425" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">3</text>

    <!-- Callout 4: Policy version -->
    <circle cx="1280" cy="540" r="14" fill="#dc2626"/>
    <text x="1280" y="545" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">4</text>
  </g>

  <!-- MOBILE (360x720) -->
  <g id="mobile" transform="translate(1360, 60)">
    <rect width="360" height="720" rx="24" fill="#e8d4b8" stroke="#b8a080"/>

    <!-- Header include -->
    <use href="includes/header-mobile.svg#mobile-header-group" x="0" y="0"/>

    <!-- Page Title -->
    <text x="180" y="85" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="18" font-weight="bold" fill="#374151">Privacy Settings</text>

    <!-- Scrollable Content -->
    <g transform="translate(15, 100)">
      <!-- Cookie Settings Card -->
      <rect width="330" height="220" rx="8" fill="#f5f0e6" stroke="#b8a080"/>
      <text x="15" y="25" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Cookie Settings</text>

      <g transform="translate(15, 40)">
        <rect width="300" height="65" rx="4" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="10" y="26" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Necessary</text>
        <rect x="240" y="7" width="50" height="26" rx="13" fill="#22c55e"/>
        <circle cx="277" cy="20" r="10" fill="#ffffff"/>
      </g>

      <g transform="translate(15, 85)">
        <rect width="300" height="65" rx="4" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="10" y="26" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Functional</text>
        <rect x="240" y="7" width="50" height="26" rx="13" fill="#22c55e"/>
        <circle cx="277" cy="20" r="10" fill="#ffffff"/>
      </g>

      <g transform="translate(15, 130)">
        <rect width="300" height="65" rx="4" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="10" y="26" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Analytics</text>
        <rect x="240" y="7" width="50" height="26" rx="13" fill="#6b7280"/>
        <circle cx="253" cy="20" r="10" fill="#ffffff"/>
      </g>

      <g transform="translate(15, 175)">
        <rect width="300" height="44" rx="6" fill="#8b5cf6"/>
        <text x="150" y="28" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#ffffff">Save Preferences</text>
      </g>
    </g>

    <!-- Data Rights Card -->
    <g transform="translate(15, 330)">
      <rect width="330" height="260" rx="8" fill="#f5f0e6" stroke="#b8a080"/>
      <text x="15" y="25" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Your Data Rights</text>

      <!-- Export -->
      <g transform="translate(15, 40)">
        <rect width="300" height="80" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="10" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Export Your Data</text>
        <text x="10" y="42" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Download all stored data</text>
        <rect x="10" y="52" width="120" height="32" rx="4" fill="#8b5cf6"/>
        <text x="70" y="73" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#ffffff">Export</text>
      </g>

      <!-- Delete -->
      <g transform="translate(15, 130)">
        <rect width="300" height="80" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="10" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Delete Your Data</text>
        <text x="10" y="42" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Permanently remove all data</text>
        <rect x="10" y="52" width="120" height="32" rx="4" fill="#dc2626"/>
        <text x="70" y="73" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#ffffff">Delete</text>
      </g>

      <!-- Version -->
      <text x="15" y="235" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Version: 1.2.0</text>
    </g>

    <!-- Footer include -->
    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
  </g>

  <!-- MOBILE CALLOUTS -->
  <g id="mobile-callouts">
    <circle cx="1750" cy="200" r="14" fill="#dc2626"/>
    <text x="1750" y="205" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">1</text>

    <circle cx="1750" cy="400" r="14" fill="#dc2626"/>
    <text x="1750" y="405" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">2</text>

    <circle cx="1750" cy="500" r="14" fill="#dc2626"/>
    <text x="1750" y="505" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">3</text>

    <circle cx="1750" cy="600" r="14" fill="#dc2626"/>
    <text x="1750" y="605" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">4</text>
  </g>

  <!-- ANNOTATIONS -->
  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>

    <!-- Column 1: US-004 Update Preferences -->
    <g transform="translate(20, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" font-weight="bold" fill="#ffffff">1</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Update Preferences</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">As a user who changed my mind,</text>
      <text x="40" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">I need to modify my preferences.</text>
      <a href="#US-004"><rect x="40" y="62" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">US-004</text></a>
      <a href="#FR-010"><rect x="101" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="128" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-010</text></a>
      <a href="#FR-012"><rect x="162" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="189" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-012</text></a>
      <a href="#SC-004"><rect x="223" y="62" width="55" height="22" rx="4" fill="#ea580c"/><text x="250" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">SC-004</text></a>
    </g>

    <!-- Column 2: US-005 Data Export -->
    <g transform="translate(470, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" font-weight="bold" fill="#ffffff">2</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Data Export</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">As a user exercising GDPR rights,</text>
      <text x="40" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">I need to export all my data.</text>
      <a href="#US-005"><rect x="40" y="62" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">US-005</text></a>
      <a href="#FR-016"><rect x="101" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="128" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-016</text></a>
      <a href="#FR-018"><rect x="162" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="189" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-018</text></a>
      <a href="#SC-005"><rect x="223" y="62" width="55" height="22" rx="4" fill="#ea580c"/><text x="250" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">SC-005</text></a>
    </g>

    <!-- Column 3: US-006 Data Deletion -->
    <g transform="translate(920, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" font-weight="bold" fill="#ffffff">3</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Data Deletion</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">As a user exercising GDPR rights,</text>
      <text x="40" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">I need to request data deletion.</text>
      <a href="#US-006"><rect x="40" y="62" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">US-006</text></a>
      <a href="#FR-017"><rect x="101" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="128" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-017</text></a>
    </g>

    <!-- Column 4: Policy Versioning -->
    <g transform="translate(1370, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" font-weight="bold" fill="#ffffff">4</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Policy Versioning</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">System tracks policy versions and</text>
      <text x="40" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">re-prompts when policy changes.</text>
      <a href="#US-003"><rect x="40" y="62" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">US-003</text></a>
      <a href="#FR-013"><rect x="101" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="128" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-013</text></a>
      <a href="#FR-014"><rect x="162" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="189" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-014</text></a>
      <a href="#SC-008"><rect x="223" y="62" width="55" height="22" rx="4" fill="#ea580c"/><text x="250" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">SC-008</text></a>
    </g>
  </g>

  <!-- SIGNATURE -->
  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif"
        font-size="18" font-weight="bold">
    002:02 | Cookie Privacy - Settings | ScriptHammer
  </text>
</svg>
