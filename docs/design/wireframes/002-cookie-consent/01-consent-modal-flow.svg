<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7ddf5"/>
      <stop offset="100%" stop-color="#b8d4f0"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- CENTERED TITLE -->
  <text x="960" y="28" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="18" font-weight="700" fill="#4b5563" letter-spacing="1">
    COOKIE CONSENT - MODAL FLOW
  </text>

  <!-- Section labels -->
  <text x="40" y="52" fill="#8b5cf6" font-family="system-ui, sans-serif"
        font-size="18" font-weight="bold">DESKTOP (16:9)</text>
  <text x="1500" y="52" fill="#d946ef" font-family="system-ui, sans-serif"
        font-size="15" font-weight="bold">MOBILE</text>

  <!-- DESKTOP MOCKUP (1280x720) -->
  <g id="desktop" transform="translate(40, 60)">
    <rect width="1280" height="720" rx="8" fill="#e8d4b8" stroke="#b8a080"/>

    <!-- Header (behind overlay) -->
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>

    <!-- Background content placeholder (behind overlay) -->
    <rect x="40" y="70" width="1200" height="500" rx="4" fill="#dcc8a8"/>
    <text x="640" y="320" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="24" fill="#4b5563" opacity="0.5">Page Content (Dimmed)</text>

    <!-- Footer (behind overlay - placed here so it gets dimmed) -->
    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>

    <!-- Dark modal overlay - covers everything above -->
    <rect x="0" y="0" width="1280" height="720" rx="8" fill="#000" opacity="0.5"/>

    <!-- Modal dialog - centered -->
    <g transform="translate(340, 100)">
      <rect width="600" height="520" rx="12" fill="#e8d4b8" stroke="#b8a080" stroke-width="2"/>

      <!-- Modal header -->
      <text x="300" y="40" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="22" font-weight="bold" fill="#374151">Cookie Settings</text>
      <text x="300" y="65" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" fill="#4b5563">We use cookies to enhance your browsing experience</text>

      <!-- Cookie categories -->
      <g transform="translate(30, 90)">
        <!-- Necessary (always on) -->
        <rect x="0" y="0" width="540" height="70" rx="6" fill="#f5f0e6"/>
        <text x="15" y="25" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Necessary Cookies</text>
        <text x="15" y="48" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Required for basic site functionality</text>
        <text x="480" y="40" font-family="system-ui, sans-serif" font-size="14" fill="#22c55e" font-weight="bold">Always On</text>

        <!-- Functional -->
        <rect x="0" y="80" width="540" height="70" rx="6" fill="#f5f0e6"/>
        <text x="15" y="105" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Functional Cookies</text>
        <text x="15" y="128" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Enhanced features and personalization</text>
        <rect x="475" y="97" width="50" height="26" rx="13" fill="#6b7280"/>
        <circle cx="488" cy="110" r="10" fill="#f5f0e6"/>

        <!-- Analytics -->
        <rect x="0" y="160" width="540" height="70" rx="6" fill="#f5f0e6"/>
        <text x="15" y="185" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Analytics Cookies</text>
        <text x="15" y="208" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Help us understand how you use the site</text>
        <rect x="475" y="177" width="50" height="26" rx="13" fill="#6b7280"/>
        <circle cx="488" cy="190" r="10" fill="#f5f0e6"/>

        <!-- Marketing -->
        <rect x="0" y="240" width="540" height="70" rx="6" fill="#f5f0e6"/>
        <text x="15" y="265" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Marketing Cookies</text>
        <text x="15" y="288" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Used for targeted advertisements</text>
        <rect x="475" y="257" width="50" height="26" rx="13" fill="#6b7280"/>
        <circle cx="488" cy="270" r="10" fill="#f5f0e6"/>
      </g>

      <!-- Action buttons -->
      <g transform="translate(30, 420)">
        <rect x="0" y="0" width="170" height="44" rx="6" fill="#8b5cf6"/>
        <text x="85" y="28" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#ffffff">Accept All</text>

        <rect x="185" y="0" width="170" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
        <text x="270" y="28" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#374151">Reject All</text>

        <rect x="370" y="0" width="170" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
        <text x="455" y="28" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#374151">Save Preferences</text>
      </g>

      <!-- Policy version -->
      <text x="300" y="495" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" fill="#4b5563">Privacy Policy v2.1 | Updated January 2026</text>
    </g>

    <!-- Desktop callouts - positioned RIGHT of modal -->
    <g id="desktop-callouts">
      <g class="callout" transform="translate(960, 140)">
        <circle r="14" fill="#dc2626"/>
        <text y="5" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">1</text>
      </g>
      <g class="callout" transform="translate(960, 280)">
        <circle r="14" fill="#dc2626"/>
        <text y="5" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">2</text>
      </g>
      <g class="callout" transform="translate(960, 420)">
        <circle r="14" fill="#dc2626"/>
        <text y="5" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">3</text>
      </g>
      <g class="callout" transform="translate(960, 560)">
        <circle r="14" fill="#dc2626"/>
        <text y="5" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">4</text>
      </g>
    </g>
  </g>

  <!-- MOBILE MOCKUP (360x720) -->
  <g id="mobile" transform="translate(1360, 60)">
    <rect width="360" height="720" rx="24" fill="#e8d4b8" stroke="#b8a080"/>

    <!-- Mobile header (behind overlay) -->
    <use href="includes/header-mobile.svg#mobile-header-group" x="0" y="0"/>

    <!-- Background content placeholder -->
    <rect x="15" y="85" width="330" height="520" rx="4" fill="#dcc8a8"/>

    <!-- Mobile bottom nav (behind overlay) -->
    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>

    <!-- Dark modal overlay -->
    <rect x="0" y="0" width="360" height="720" rx="24" fill="#000" opacity="0.5"/>

    <!-- Mobile modal - full width with padding -->
    <g transform="translate(15, 90)">
      <rect width="330" height="530" rx="12" fill="#e8d4b8" stroke="#b8a080" stroke-width="2"/>

      <!-- Modal header -->
      <text x="165" y="35" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="18" font-weight="bold" fill="#374151">Cookie Settings</text>
      <text x="165" y="55" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" fill="#4b5563">We use cookies to enhance your experience</text>

      <!-- Cookie categories (stacked) -->
      <g transform="translate(15, 75)">
        <!-- Necessary -->
        <rect x="0" y="0" width="300" height="70" rx="4" fill="#dcc8a8"/>
        <text x="10" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Necessary</text>
        <text x="10" y="48" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Required for site to work</text>
        <text x="250" y="38" font-family="system-ui, sans-serif" font-size="14" fill="#22c55e">Always On</text>

        <!-- Functional -->
        <rect x="0" y="80" width="300" height="70" rx="4" fill="#f5f0e6"/>
        <text x="10" y="105" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Functional</text>
        <text x="10" y="128" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Enhanced features</text>
        <rect x="245" y="100" width="44" height="22" rx="11" fill="#6b7280"/>
        <circle cx="256" cy="111" r="8" fill="#f5f0e6"/>

        <!-- Analytics -->
        <rect x="0" y="160" width="300" height="70" rx="4" fill="#f5f0e6"/>
        <text x="10" y="185" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Analytics</text>
        <text x="10" y="208" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Usage insights</text>
        <rect x="245" y="180" width="44" height="22" rx="11" fill="#6b7280"/>
        <circle cx="256" cy="191" r="8" fill="#f5f0e6"/>

        <!-- Marketing -->
        <rect x="0" y="240" width="300" height="70" rx="4" fill="#f5f0e6"/>
        <text x="10" y="265" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Marketing</text>
        <text x="10" y="288" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Targeted ads</text>
        <rect x="245" y="260" width="44" height="22" rx="11" fill="#6b7280"/>
        <circle cx="256" cy="271" r="8" fill="#f5f0e6"/>
      </g>

      <!-- Mobile action buttons (stacked) -->
      <g transform="translate(15, 400)">
        <rect x="0" y="0" width="300" height="44" rx="6" fill="#8b5cf6"/>
        <text x="150" y="28" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#ffffff">Accept All</text>

        <rect x="0" y="54" width="145" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
        <text x="72" y="82" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#374151">Reject All</text>

        <rect x="155" y="54" width="145" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
        <text x="227" y="82" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#374151">Save</text>
      </g>
    </g>

    <!-- Mobile callouts - positioned outside modal to right -->
    <g id="mobile-callouts">
      <g class="callout" transform="translate(350, 140)">
        <circle r="14" fill="#dc2626"/>
        <text y="5" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">1</text>
      </g>
      <g class="callout" transform="translate(350, 300)">
        <circle r="14" fill="#dc2626"/>
        <text y="5" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">2</text>
      </g>
      <g class="callout" transform="translate(350, 460)">
        <circle r="14" fill="#dc2626"/>
        <text y="5" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">3</text>
      </g>
      <g class="callout" transform="translate(350, 580)">
        <circle r="14" fill="#dc2626"/>
        <text y="5" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">4</text>
      </g>
    </g>
  </g>

  <!-- ANNOTATION PANEL -->
  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>

    <!-- Group 1: First Visit (x=20) -->
    <g transform="translate(20, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">1</text>

      <text x="40" y="14" fill="#374151" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">First Visit</text>
      <text x="40" y="34" fill="#4b5563" font-family="system-ui, sans-serif" font-size="14">Modal appears before non-essential cookies set.</text>

      <a href="#US-001"><rect x="40" y="44" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="59" fill="#fff" font-size="12" text-anchor="middle">US-001</text></a>
      <a href="#FR-001"><rect x="101" y="44" width="55" height="22" rx="4" fill="#2563eb"/><text x="128" y="59" fill="#fff" font-size="12" text-anchor="middle">FR-001</text></a>
      <a href="#FR-003"><rect x="162" y="44" width="55" height="22" rx="4" fill="#2563eb"/><text x="189" y="59" fill="#fff" font-size="12" text-anchor="middle">FR-003</text></a>
      <a href="#SC-001"><rect x="223" y="44" width="55" height="22" rx="4" fill="#ea580c"/><text x="250" y="59" fill="#fff" font-size="12" text-anchor="middle">SC-001</text></a>
    </g>

    <!-- Group 2: Granular Control (x=470) -->
    <g transform="translate(470, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">2</text>

      <text x="40" y="14" fill="#374151" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">Granular Control</text>
      <text x="40" y="34" fill="#4b5563" font-family="system-ui, sans-serif" font-size="14">Four cookie categories with individual toggles.</text>

      <a href="#US-002"><rect x="40" y="44" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="59" fill="#fff" font-size="12" text-anchor="middle">US-002</text></a>
      <a href="#FR-005"><rect x="101" y="44" width="55" height="22" rx="4" fill="#2563eb"/><text x="128" y="59" fill="#fff" font-size="12" text-anchor="middle">FR-005</text></a>
      <a href="#FR-006"><rect x="162" y="44" width="55" height="22" rx="4" fill="#2563eb"/><text x="189" y="59" fill="#fff" font-size="12" text-anchor="middle">FR-006</text></a>
      <a href="#SC-002"><rect x="223" y="44" width="55" height="22" rx="4" fill="#ea580c"/><text x="250" y="59" fill="#fff" font-size="12" text-anchor="middle">SC-002</text></a>
    </g>

    <!-- Group 3: Persistence (x=920) -->
    <g transform="translate(920, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">3</text>

      <text x="40" y="14" fill="#374151" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">Persistence</text>
      <text x="40" y="34" fill="#4b5563" font-family="system-ui, sans-serif" font-size="14">Preferences saved across browser sessions.</text>

      <a href="#US-003"><rect x="40" y="44" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="59" fill="#fff" font-size="12" text-anchor="middle">US-003</text></a>
      <a href="#FR-009"><rect x="101" y="44" width="55" height="22" rx="4" fill="#2563eb"/><text x="128" y="59" fill="#fff" font-size="12" text-anchor="middle">FR-009</text></a>
      <a href="#FR-015"><rect x="162" y="44" width="55" height="22" rx="4" fill="#2563eb"/><text x="189" y="59" fill="#fff" font-size="12" text-anchor="middle">FR-015</text></a>
      <a href="#SC-003"><rect x="223" y="44" width="55" height="22" rx="4" fill="#ea580c"/><text x="250" y="59" fill="#fff" font-size="12" text-anchor="middle">SC-003</text></a>
    </g>

    <!-- Group 4: Accessible Modal (x=1370) -->
    <g transform="translate(1370, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">4</text>

      <text x="40" y="14" fill="#374151" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">Accessible Modal</text>
      <text x="40" y="34" fill="#4b5563" font-family="system-ui, sans-serif" font-size="14">Keyboard nav, screen reader, focus trap.</text>

      <a href="#FR-022"><rect x="40" y="44" width="55" height="22" rx="4" fill="#2563eb"/><text x="67" y="59" fill="#fff" font-size="12" text-anchor="middle">FR-022</text></a>
      <a href="#FR-023"><rect x="101" y="44" width="55" height="22" rx="4" fill="#2563eb"/><text x="128" y="59" fill="#fff" font-size="12" text-anchor="middle">FR-023</text></a>
      <a href="#FR-024"><rect x="162" y="44" width="55" height="22" rx="4" fill="#2563eb"/><text x="189" y="59" fill="#fff" font-size="12" text-anchor="middle">FR-024</text></a>
      <a href="#SC-006"><rect x="223" y="44" width="55" height="22" rx="4" fill="#ea580c"/><text x="250" y="59" fill="#fff" font-size="12" text-anchor="middle">SC-006</text></a>
    </g>
  </g>

  <!-- SIGNATURE -->
  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif"
        font-size="18" font-weight="bold">
    002:01 | Cookie Consent Modal | ScriptHammer
  </text>
</svg>
