      <text x="20" y="110" class="error-code">ERR_NETWORK</text>
    </g>

    <!-- Row 4 -->
    <!-- Auth Required -->
    <g transform="translate(60, 535)">
      <rect width="420" height="120" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="2"/>
      <circle cx="25" cy="25" r="16" fill="#eab308"/>
      <text x="25" y="30" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🔐</text>
      <text x="50" y="28" class="heading">Authentication Required</text>
      <text x="50" y="48" class="text-sm">Additional verification needed (3D Secure).</text>
