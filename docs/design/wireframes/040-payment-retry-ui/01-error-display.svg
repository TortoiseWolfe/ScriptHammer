    <!-- Header -->
    <rect x="20" y="48" width="320" height="44" rx="8" fill="#dcc8a8"/>
    <text x="40" y="76" class="heading">← Payment Failed</text>

    <!-- Error card - Declined -->
    <g transform="translate(20, 105)">
      <rect width="320" height="180" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>

      <!-- Error icon -->
      <circle cx="160" cy="40" r="24" fill="#ef4444"/>
      <text x="160" y="48" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold">✕</text>

      <!-- Error message -->
      <text x="160" y="85" text-anchor="middle" class="heading">Card Declined</text>
      <text x="160" y="108" text-anchor="middle" class="text-sm">Your card was declined by</text>
      <text x="160" y="124" text-anchor="middle" class="text-sm">the issuing bank.</text>

      <!-- Action buttons -->
      <rect x="15" y="140" width="140" height="28" rx="6" fill="#8b5cf6"/>
      <text x="85" y="159" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Update Card</text>

      <rect x="165" y="140" width="140" height="28" rx="6" fill="none" stroke="#8b5cf6" stroke-width="2"/>
      <text x="235" y="159" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600">Try Again</text>
    </g>

    <!-- Transaction reference -->
    <g transform="translate(20, 300)">
      <rect width="320" height="60" rx="8" fill="#f5f0e6" stroke="#b8a080" stroke-width="1"/>
      <text x="15" y="22" class="text-muted">Transaction Reference</text>
      <text x="15" y="44" class="text-sm" font-family="monospace">TXN-2026-0101-ABCD-1234</text>
    </g>

    <!-- Suggested actions -->
    <g transform="translate(20, 375)">
      <text x="0" y="16" class="heading">What you can do:</text>

      <rect y="30" width="320" height="44" rx="8" fill="#f5f0e6"/>
      <text x="15" y="56" class="text-sm">1. Try a different payment method</text>

      <rect y="82" width="320" height="44" rx="8" fill="#f5f0e6"/>
      <text x="15" y="108" class="text-sm">2. Contact your bank about the decline</text>

      <rect y="134" width="320" height="44" rx="8" fill="#f5f0e6"/>
      <text x="15" y="160" class="text-sm">3. Check card details are correct</text>
    </g>

    <!-- Support link -->
    <g transform="translate(20, 575)">
      <rect width="320" height="48" rx="8" fill="#dcc8a8"/>
      <text x="160" y="30" text-anchor="middle" class="text-md" fill="#6d28d9">Need help? Contact Support</text>
    </g>

    <!-- Bottom nav hint -->
    <rect x="130" y="660" width="100" height="5" rx="2" fill="#b8a080"/>
  </g>

  <!-- Annotations -->
  <g id="leader-lines">
    <line x1="940" y1="200" x2="980" y2="200" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,2"/>
  </g>
