    <rect width="1400" height="800" fill="url(#dots)"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1400" height="3" fill="url(#accentGrad)"/>

  <!-- Title -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4b5563" letter-spacing="1">PAYMENT ERROR DISPLAY — ERROR TYPES &amp; MESSAGES</text>

  <!-- DESKTOP SECTION -->
  <text x="40" y="52" class="label-desktop">DESKTOP — ERROR TYPE CATALOG</text>

  <g id="desktop-view">
