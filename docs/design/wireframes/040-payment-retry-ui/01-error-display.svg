    <rect x="40" y="60" width="900" height="680" rx="12" fill="#e8d4b8" stroke="#b8a080" stroke-width="1"/>

    <!-- Header -->
    <rect x="40" y="60" width="900" height="50" rx="12" fill="#dcc8a8"/>
    <rect x="40" y="95" width="900" height="15" fill="#dcc8a8"/>
    <text x="490" y="92" text-anchor="middle" class="heading-lg">Payment Error Types</text>

    <!-- Error Type Grid - 2 columns x 4 rows -->
    <!-- Row 1 -->
    <!-- Card Declined -->
    <g transform="translate(60, 130)">
      <rect width="420" height="120" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
      <circle cx="25" cy="25" r="16" fill="#ef4444"/>
      <text x="25" y="30" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">✕</text>
      <text x="50" y="28" class="heading">Card Declined</text>
      <text x="50" y="48" class="text-sm">Your card was declined by the issuing bank.</text>
      <text x="50" y="68" class="text-muted">Suggested Action:</text>
      <text x="50" y="84" class="text-sm">Try a different card or contact your bank.</text>
      <rect x="290" y="75" width="110" height="32" rx="6" fill="#8b5cf6"/>
      <text x="345" y="96" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Update Card</text>
      <text x="20" y="110" class="error-code">ERR_CARD_DECLINED</text>
    </g>

    <!-- Insufficient Funds -->
    <g transform="translate(500, 130)">
      <rect width="420" height="120" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="2"/>
      <circle cx="25" cy="25" r="16" fill="#eab308"/>
      <text x="25" y="30" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">$</text>
      <text x="50" y="28" class="heading">Insufficient Funds</text>
      <text x="50" y="48" class="text-sm">Your account has insufficient funds.</text>
      <text x="50" y="68" class="text-muted">Suggested Action:</text>
      <text x="50" y="84" class="text-sm">Add funds or use a different payment method.</text>
      <rect x="290" y="75" width="110" height="32" rx="6" fill="#8b5cf6"/>
      <text x="345" y="96" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Change Method</text>
      <text x="20" y="110" class="error-code">ERR_INSUFFICIENT_FUNDS</text>
    </g>

    <!-- Row 2 -->
    <!-- Expired Card -->
    <g transform="translate(60, 265)">
      <rect width="420" height="120" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
      <circle cx="25" cy="25" r="16" fill="#ef4444"/>
      <text x="25" y="30" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">⏰</text>
      <text x="50" y="28" class="heading">Card Expired</text>
      <text x="50" y="48" class="text-sm">Your card has expired.</text>
      <text x="50" y="68" class="text-muted">Suggested Action:</text>
      <text x="50" y="84" class="text-sm">Update your card with new expiry date.</text>
