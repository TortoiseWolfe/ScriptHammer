    <g transform="translate(500, 265)">
      <rect width="420" height="120" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
      <circle cx="25" cy="25" r="16" fill="#ef4444"/>
      <text x="25" y="30" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">?</text>
      <text x="50" y="28" class="heading">Invalid Card</text>
      <text x="50" y="48" class="text-sm">Card number or details are invalid.</text>
      <text x="50" y="68" class="text-muted">Suggested Action:</text>
      <text x="50" y="84" class="text-sm">Check card details and try again.</text>
      <rect x="290" y="75" width="110" height="32" rx="6" fill="#8b5cf6"/>
      <text x="345" y="96" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Re-enter Card</text>
      <text x="20" y="110" class="error-code">ERR_INVALID_CARD</text>
