    <!-- Row 3 -->
    <!-- Processing Error -->
    <g transform="translate(60, 400)">
      <rect width="420" height="120" rx="8" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="2"/>
      <circle cx="25" cy="25" r="16" fill="#0ea5e9"/>
      <text x="25" y="30" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">⚙</text>
      <text x="50" y="28" class="heading">Processing Error</text>
      <text x="50" y="48" class="text-sm">A temporary error occurred during processing.</text>
      <text x="50" y="68" class="text-muted">Suggested Action:</text>
      <text x="50" y="84" class="text-sm">Wait a moment and try again.</text>
      <rect x="290" y="75" width="110" height="32" rx="6" fill="#22c55e"/>
      <text x="345" y="96" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Retry Now</text>
      <text x="20" y="110" class="error-code">ERR_PROCESSING</text>
    </g>

    <!-- Network Error -->
    <g transform="translate(500, 400)">
      <rect width="420" height="120" rx="8" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="2"/>
      <circle cx="25" cy="25" r="16" fill="#0ea5e9"/>
      <text x="25" y="30" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">📡</text>
      <text x="50" y="28" class="heading">Network Error</text>
      <text x="50" y="48" class="text-sm">Connection to payment provider failed.</text>
      <text x="50" y="68" class="text-muted">Suggested Action:</text>
      <text x="50" y="84" class="text-sm">Check connection and retry.</text>
      <rect x="290" y="75" width="110" height="32" rx="6" fill="#22c55e"/>
