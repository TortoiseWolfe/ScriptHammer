      <rect x="290" y="75" width="110" height="32" rx="6" fill="#8b5cf6"/>
      <text x="345" y="96" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Change Method</text>
      <text x="20" y="110" class="error-code">ERR_LIMIT_EXCEEDED</text>
    </g>

    <!-- Legend -->
    <g transform="translate(60, 680)">
      <text x="0" y="15" class="text-muted">Error Severity:</text>
      <rect x="100" y="2" width="16" height="16" rx="3" fill="#ef4444"/>
      <text x="122" y="15" class="text-sm">Critical (card issue)</text>
      <rect x="240" y="2" width="16" height="16" rx="3" fill="#eab308"/>
      <text x="262" y="15" class="text-sm">Warning (action needed)</text>
      <rect x="400" y="2" width="16" height="16" rx="3" fill="#0ea5e9"/>
      <text x="422" y="15" class="text-sm">Info (temporary)</text>
