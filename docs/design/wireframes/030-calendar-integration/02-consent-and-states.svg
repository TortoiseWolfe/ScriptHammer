      <text x="35" y="235" class="text-muted">What we need:</text>
      <text x="35" y="255" class="text-sm">✓ Load Cal.com scheduling widget</text>
      <text x="35" y="275" class="text-sm">✓ Set functional cookies</text>

      <!-- Buttons -->
      <rect x="20" y="310" width="135" height="44" rx="6" fill="#8b5cf6"/>
      <text x="87" y="338" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Allow</text>

      <rect x="165" y="310" width="135" height="44" rx="6" fill="#dcc8a8" stroke="#b8a080" stroke-width="1"/>
      <text x="232" y="338" text-anchor="middle" class="text-sm">Learn More</text>
    </g>

    <!-- Privacy link -->
    <text x="180" y="510" text-anchor="middle" class="text-sm" fill="#8b5cf6" text-decoration="underline">Privacy Settings</text>

    <!-- Alternative CTA -->
    <rect x="20" y="540" width="320" height="50" rx="6" fill="#f5f0e6" stroke="#b8a080" stroke-width="1"/>
    <text x="180" y="570" text-anchor="middle" class="text-sm">Or book directly at cal.com/example ↗</text>

    <!-- Mobile nav bar -->
    <rect x="10" y="658" width="340" height="32" fill="#dcc8a8" rx="0 0 16 16"/>
    <text x="85" y="678" text-anchor="middle" class="text-muted">🏠 Home</text>
    <text x="180" y="678" text-anchor="middle" class="text-sm" fill="#8b5cf6">📅 Schedule</text>
    <text x="275" y="678" text-anchor="middle" class="text-muted">👤 Account</text>
  </g>

  <!-- Annotations -->
  <g id="annotations">
    <rect x="60" y="745" width="130" height="35" rx="4" fill="#e8d4b8" stroke="#8b5cf6" stroke-width="1"/>
    <text x="125" y="760" text-anchor="middle" class="annotation">FR-014-017</text>
    <text x="125" y="775" text-anchor="middle" class="text-muted">Consent flow</text>

    <rect x="330" y="745" width="130" height="35" rx="4" fill="#e8d4b8" stroke="#8b5cf6" stroke-width="1"/>
    <text x="395" y="760" text-anchor="middle" class="annotation">FR-003-004</text>
    <text x="395" y="775" text-anchor="middle" class="text-muted">Loading/error</text>

    <rect x="600" y="745" width="130" height="35" rx="4" fill="#e8d4b8" stroke="#8b5cf6" stroke-width="1"/>
    <text x="665" y="760" text-anchor="middle" class="annotation">FR-026-027</text>
    <text x="665" y="775" text-anchor="middle" class="text-muted">Fallback link</text>
  </g>
