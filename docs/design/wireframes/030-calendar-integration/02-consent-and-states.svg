  <text x="480" y="420" class="label-desktop">STATE 4: UNSUPPORTED BROWSER</text>
  <g id="fallback-state">
    <rect x="480" y="430" width="420" height="310" rx="8" fill="#e8d4b8" stroke="#b8a080" stroke-width="1"/>

    <!-- Header -->
    <rect x="480" y="430" width="420" height="45" rx="8" fill="#dcc8a8"/>
    <text x="500" y="458" class="heading">Schedule a Meeting</text>

    <!-- Fallback area -->
    <g transform="translate(500, 495)">
      <rect x="0" y="0" width="380" height="220" rx="8" fill="#f5f0e6" stroke="#b8a080" stroke-width="1"/>

      <!-- Info icon -->
      <circle cx="190" cy="45" r="25" fill="#eef2ff" stroke="#8b5cf6" stroke-width="2"/>
      <text x="190" y="53" text-anchor="middle" fill="#8b5cf6" font-size="20" font-weight="bold">i</text>

      <text x="190" y="95" text-anchor="middle" class="heading">Open External Scheduler</text>
      <text x="190" y="120" text-anchor="middle" class="text-sm">Your browser doesn't support the embedded</text>
      <text x="190" y="140" text-anchor="middle" class="text-sm">calendar. Click below to open the booking page.</text>

      <!-- External link button -->
      <rect x="90" y="160" width="200" height="40" rx="6" fill="#8b5cf6"/>
      <text x="190" y="186" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Open Cal.com ↗</text>
    </g>
  </g>

  <!-- MOBILE SECTION -->
  <text x="980" y="52" class="label-mobile">MOBILE — CONSENT</text>
  <g id="mobile-view" transform="translate(980, 60)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="360" height="700" rx="24" fill="#c8b898" stroke="#a08860" stroke-width="2"/>
    <rect x="10" y="10" width="340" height="680" rx="16" fill="#e8d4b8"/>

    <!-- Status bar -->
    <rect x="10" y="10" width="340" height="28" rx="16" fill="#dcc8a8"/>
    <text x="30" y="28" class="text-sm">9:41</text>
    <text x="320" y="28" class="text-sm" text-anchor="end">📶 🔋</text>

    <!-- Header -->
    <rect x="10" y="38" width="340" height="50" fill="#dcc8a8"/>
    <text x="30" y="68" class="text-sm">←</text>
    <text x="180" y="68" text-anchor="middle" class="heading-sm">Schedule</text>

