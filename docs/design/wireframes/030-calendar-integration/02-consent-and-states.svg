  <text x="40" y="420" class="label-desktop">STATE 3: PROVIDER ERROR</text>
  <g id="error-state">
    <rect x="40" y="430" width="420" height="310" rx="8" fill="#e8d4b8" stroke="#b8a080" stroke-width="1"/>

    <!-- Header -->
