      .heading { fill: #1a1a2e; font-family: system-ui, sans-serif; font-size: 16px; font-weight: 700; }
      .heading-sm { fill: #1a1a2e; font-family: system-ui, sans-serif; font-size: 14px; font-weight: 700; }
      .text-md { fill: #2d3748; font-family: system-ui, sans-serif; font-size: 14px; font-weight: 500; }
      .text-sm { fill: #374151; font-family: system-ui, sans-serif; font-size: 12px; font-weight: 500; }
      .text-muted { fill: #4b5563; font-family: system-ui, sans-serif; font-size: 11px; font-weight: 500; }
      .annotation { fill: #6d28d9; font-family: monospace; font-size: 12px; font-weight: 600; }
      .label-desktop { fill: #8b5cf6; font-family: monospace; font-size: 13px; font-weight: bold; }
      .label-mobile { fill: #d946ef; font-family: monospace; font-size: 13px; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.35">
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#6b8cba"/>
    </pattern>
    <rect width="1400" height="800" fill="url(#dots)"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1400" height="3" fill="url(#accentGrad)"/>

  <!-- Title -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4b5563" letter-spacing="1">CALENDAR INTEGRATION — CONSENT &amp; STATE VARIATIONS</text>

  <!-- STATE 1: Consent Pending -->
  <text x="40" y="52" class="label-desktop">STATE 1: CONSENT PENDING</text>
  <g id="consent-pending">
    <rect x="40" y="60" width="420" height="340" rx="8" fill="#e8d4b8" stroke="#b8a080" stroke-width="1"/>

    <!-- Header -->
    <rect x="40" y="60" width="420" height="45" rx="8" fill="#dcc8a8"/>
    <text x="60" y="88" class="heading">Schedule a Meeting</text>

    <!-- Consent prompt area -->
    <g transform="translate(60, 125)">
      <rect x="0" y="0" width="380" height="250" rx="8" fill="#f5f0e6" stroke="#eab308" stroke-width="2"/>

      <!-- Icon -->
      <text x="190" y="45" text-anchor="middle" font-size="40">🔒</text>

      <!-- Message -->
      <text x="190" y="85" text-anchor="middle" class="heading">Consent Required</text>
      <text x="190" y="110" text-anchor="middle" class="text-sm">This calendar is powered by a third-party service.</text>
      <text x="190" y="130" text-anchor="middle" class="text-sm">To display it, we need your permission to load</text>
      <text x="190" y="150" text-anchor="middle" class="text-sm">external content and set functional cookies.</text>

      <!-- Buttons -->
      <rect x="40" y="175" width="140" height="40" rx="6" fill="#8b5cf6"/>
      <text x="110" y="200" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Allow Calendar</text>

      <rect x="200" y="175" width="140" height="40" rx="6" fill="#dcc8a8" stroke="#b8a080" stroke-width="1"/>
      <text x="270" y="200" text-anchor="middle" class="text-sm">Learn More</text>

      <text x="190" y="235" text-anchor="middle" class="text-muted">You can change this in Privacy Settings</text>
    </g>
  </g>

  <!-- STATE 2: Loading -->
  <text x="480" y="52" class="label-desktop">STATE 2: LOADING</text>
  <g id="loading-state">
    <rect x="480" y="60" width="420" height="340" rx="8" fill="#e8d4b8" stroke="#b8a080" stroke-width="1"/>

    <!-- Header -->
    <rect x="480" y="60" width="420" height="45" rx="8" fill="#dcc8a8"/>
    <text x="500" y="88" class="heading">Schedule a Meeting</text>

    <!-- Loading area -->
    <g transform="translate(500, 125)">
      <rect x="0" y="0" width="380" height="250" rx="8" fill="#f5f0e6" stroke="#b8a080" stroke-width="1"/>

      <!-- Spinner -->
      <circle cx="190" cy="90" r="30" fill="none" stroke="#dcc8a8" stroke-width="4"/>
      <path d="M 190 60 A 30 30 0 0 1 220 90" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>

      <text x="190" y="150" text-anchor="middle" class="heading">Loading Calendar...</text>
      <text x="190" y="175" text-anchor="middle" class="text-muted">This usually takes 1-2 seconds</text>

