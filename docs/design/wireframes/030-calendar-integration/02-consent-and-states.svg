    <text x="60" y="458" class="heading">Schedule a Meeting</text>

    <!-- Error area -->
    <g transform="translate(60, 495)">
      <rect x="0" y="0" width="380" height="220" rx="8" fill="#f5f0e6" stroke="#ef4444" stroke-width="2"/>

      <!-- Error icon -->
      <circle cx="190" cy="45" r="25" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
      <text x="190" y="53" text-anchor="middle" fill="#ef4444" font-size="24" font-weight="bold">!</text>

      <text x="190" y="95" text-anchor="middle" class="heading" fill="#ef4444">Calendar Unavailable</text>
      <text x="190" y="120" text-anchor="middle" class="text-sm">The scheduling service is temporarily unavailable.</text>
      <text x="190" y="140" text-anchor="middle" class="text-sm">Please try again in a few moments.</text>

      <!-- Actions -->
      <rect x="90" y="160" width="100" height="36" rx="6" fill="#8b5cf6"/>
      <text x="140" y="183" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Retry</text>

      <rect x="200" y="160" width="100" height="36" rx="6" fill="#dcc8a8" stroke="#b8a080" stroke-width="1"/>
      <text x="250" y="183" text-anchor="middle" class="text-sm">Contact Us</text>
    </g>
  </g>

