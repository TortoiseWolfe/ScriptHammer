      <text x="160" y="145" text-anchor="middle" class="text-sm">This calendar is powered by Cal.com.</text>
      <text x="160" y="165" text-anchor="middle" class="text-sm">To display it, we need your permission</text>
      <text x="160" y="185" text-anchor="middle" class="text-sm">to load external content.</text>

      <!-- What we need -->
