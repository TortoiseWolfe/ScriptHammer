    <text x="40" y="65" class="heading">1. User Selects Font</text>
    <text x="40" y="85" class="code">fontFamily = "Dyslexia-Friendly"</text>

    <!-- Arrow down -->
    <line x1="200" y1="105" x2="200" y2="125" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Step 2: Apply immediately -->
    <rect x="20" y="130" width="360" height="70" rx="6" fill="#0f172a" stroke="#d946ef" stroke-width="1"/>
    <text x="40" y="155" class="heading" fill="#d946ef">2. Apply Immediately (FR-005)</text>
    <text x="40" y="175" class="code">document.body.style.fontFamily = font</text>
