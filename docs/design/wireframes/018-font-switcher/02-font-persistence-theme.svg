    <text x="40" y="255" class="heading" fill="#22c55e">3. Persist to LocalStorage (FR-006)</text>
    <text x="40" y="275" class="code">localStorage.setItem('font-preference',</text>
    <text x="60" y="290" class="code">'{ "font": "dyslexia", "updated": "..." }')</text>

    <!-- Arrow down -->
    <line x1="200" y1="305" x2="200" y2="325" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Step 4: On next visit -->
    <rect x="20" y="330" width="360" height="70" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="40" y="355" class="heading">4. On App Load (FR-007)</text>
    <text x="40" y="375" class="code">const pref = localStorage.getItem('font-preference')</text>
    <text x="40" y="390" class="code">if (pref) applyFont(pref.font)</text>

