    <rect x="0" y="20" width="280" height="160" rx="8" fill="#1e293b" stroke="#eab308" stroke-width="1"/>

    <!-- Success notification -->
    <rect x="20" y="40" width="240" height="35" rx="6" fill="#22c55e" opacity="0.15" stroke="#22c55e"/>
    <circle cx="40" cy="57" r="10" fill="#22c55e"/>
    <text x="34" y="62" fill="#fff" font-size="12" font-weight="bold">&#10003;</text>
    <text x="60" y="53" class="text-sm" fill="#22c55e">3 messages sent!</text>
    <text x="60" y="68" class="text-muted">Successfully synced</text>

    <!-- Failure notification -->
    <rect x="20" y="85" width="240" height="35" rx="6" fill="#ef4444" opacity="0.15" stroke="#ef4444"/>
    <circle cx="40" cy="102" r="10" fill="#ef4444"/>
    <text x="36" y="107" fill="#fff" font-size="12" font-weight="bold">!</text>
    <text x="60" y="98" class="text-sm" fill="#ef4444">Sync failed</text>
    <text x="60" y="113" class="text-muted">1 item needs attention</text>

    <!-- Info notification -->
    <rect x="20" y="130" width="240" height="35" rx="6" fill="#3b82f6" opacity="0.15" stroke="#3b82f6"/>
    <g transform="translate(30, 140)">
      <!-- Spinning sync icon -->
      <circle cx="10" cy="10" r="8" fill="none" stroke="#334155" stroke-width="2"/>
      <path d="M 10 2 A 8 8 0 0 1 18 10" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="60" y="145" class="text-sm" fill="#3b82f6">Syncing...</text>
    <text x="60" y="160" class="text-muted">2 items remaining</text>
  </g>

  <!-- ==================== RIGHT SIDE: FLOW SUMMARY ==================== -->
  <g id="flow-summary" transform="translate(1020, 90)">
    <text x="0" y="0" class="label">SYNC FLOW SUMMARY</text>

    <rect x="0" y="20" width="340" height="360" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>

    <!-- Flow steps -->
    <g transform="translate(20, 50)">
      <!-- Step 1 -->
      <circle cx="15" cy="0" r="12" fill="#8b5cf6"/>
      <text x="15" y="5" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">1</text>
      <text x="40" y="5" class="heading">Form Submitted</text>
      <text x="40" y="20" class="text-muted">Check navigator.onLine</text>

      <!-- Step 2 -->
      <line x1="15" y1="15" x2="15" y2="45" stroke="#475569" stroke-width="2"/>
      <circle cx="15" cy="55" r="12" fill="#f97316"/>
      <text x="15" y="60" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">2</text>
      <text x="40" y="60" class="heading">If Offline: Queue</text>
      <text x="40" y="75" class="text-muted">Store in IndexedDB</text>

      <!-- Step 3 -->
      <line x1="15" y1="70" x2="15" y2="100" stroke="#475569" stroke-width="2"/>
      <circle cx="15" cy="110" r="12" fill="#d946ef"/>
      <text x="15" y="115" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">3</text>
      <text x="40" y="115" class="heading">Register Sync</text>
      <text x="40" y="130" class="text-muted">Background Sync API</text>

      <!-- Step 4 -->
      <line x1="15" y1="125" x2="15" y2="155" stroke="#475569" stroke-width="2"/>
      <circle cx="15" cy="165" r="12" fill="#3b82f6"/>
      <text x="15" y="170" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">4</text>
      <text x="40" y="170" class="heading">Online Detected</text>
      <text x="40" y="185" class="text-muted">SW receives sync event</text>

      <!-- Step 5 -->
      <line x1="15" y1="180" x2="15" y2="210" stroke="#475569" stroke-width="2"/>
      <circle cx="15" cy="220" r="12" fill="#22c55e"/>
      <text x="15" y="225" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">5</text>
      <text x="40" y="225" class="heading">Process Queue</text>
      <text x="40" y="240" class="text-muted">POST each item, FIFO</text>

      <!-- Step 6 -->
      <line x1="15" y1="235" x2="15" y2="265" stroke="#475569" stroke-width="2"/>
      <circle cx="15" cy="275" r="12" fill="#eab308"/>
      <text x="15" y="280" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">6</text>
      <text x="40" y="280" class="heading">Notify User</text>
      <text x="40" y="295" class="text-muted">Success/failure feedback</text>
    </g>
  </g>

  <!-- ==================== RIGHT SIDE: BROWSER SUPPORT ==================== -->
  <g id="browser-support" transform="translate(1020, 480)">
    <text x="0" y="0" class="label">BROWSER SUPPORT (FR-020)</text>

    <rect x="0" y="20" width="340" height="170" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>

    <g transform="translate(20, 45)">
      <text x="0" y="0" class="heading">Background Sync API</text>

      <!-- Chrome -->
      <rect x="0" y="15" width="140" height="24" rx="4" fill="#22c55e" opacity="0.2"/>
      <text x="10" y="32" class="text-sm" fill="#22c55e">Chrome/Edge</text>
      <text x="100" y="32" class="text-sm" fill="#22c55e">&#10003;</text>

      <!-- Firefox -->
      <rect x="150" y="15" width="140" height="24" rx="4" fill="#ef4444" opacity="0.2"/>
      <text x="160" y="32" class="text-sm" fill="#ef4444">Firefox</text>
      <text x="270" y="32" class="text-sm" fill="#ef4444">&#10007;</text>

      <!-- Safari -->
      <rect x="0" y="45" width="140" height="24" rx="4" fill="#ef4444" opacity="0.2"/>
      <text x="10" y="62" class="text-sm" fill="#ef4444">Safari</text>
      <text x="100" y="62" class="text-sm" fill="#ef4444">&#10007;</text>

      <!-- Fallback -->
      <text x="0" y="95" class="heading" fill="#f97316">Fallback Strategy:</text>
      <text x="0" y="115" class="text-sm">1. online event listener</text>
      <text x="0" y="130" class="text-sm">2. visibilitychange trigger</text>
      <text x="0" y="145" class="text-sm">3. Manual sync button</text>
    </g>
  </g>

  <!-- Version badge -->
  <rect x="1280" y="770" width="110" height="22" rx="11" fill="#334155"/>
  <text x="1335" y="785" text-anchor="middle" class="text-muted">v1.0 | 2025-12-31</text>
</svg>
