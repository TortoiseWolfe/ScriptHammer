<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800">
  <!-- ============================================================
       GENERATED BY: /wireframe skill
       SOURCE: features/enhancements/020-pwa-background-sync/spec.md
       DATE: 2025-12-31
       DO NOT MANUALLY EDIT - Regenerate with /wireframe command
       ============================================================ -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
    <linearGradient id="onlineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowhead-success" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <style>
      .heading-lg { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 20px; font-weight: bold; }
      .heading { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 14px; font-weight: bold; }
      .text-md { fill: #cbd5e1; font-family: system-ui, sans-serif; font-size: 12px; }
      .text-sm { fill: #94a3b8; font-family: system-ui, sans-serif; font-size: 10px; }
      .text-muted { fill: #64748b; font-family: system-ui, sans-serif; font-size: 10px; }
      .annotation { fill: #8b5cf6; font-family: monospace; font-size: 10px; }
      .code { fill: #22c55e; font-family: monospace; font-size: 9px; }
      .label { fill: #d946ef; font-family: monospace; font-size: 11px; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.05">
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#fff"/>
    </pattern>
    <rect width="1400" height="800" fill="url(#dots)"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1400" height="3" fill="url(#accentGrad)"/>

  <!-- Title -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#64748b" letter-spacing="1">020 - PWA BACKGROUND SYNC</text>
  <text x="700" y="52" text-anchor="middle" class="heading-lg">Service Worker Sync Architecture</text>

  <!-- ==================== TOP ROW: USER ACTIONS ==================== -->
  <g id="user-layer" transform="translate(40, 90)">
    <text x="0" y="0" class="label">USER / CLIENT</text>

    <!-- User submits form -->
    <rect x="0" y="20" width="180" height="70" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="90" y="48" text-anchor="middle" class="heading">User Submits Form</text>
    <text x="90" y="68" text-anchor="middle" class="text-sm">Contact, Feedback, etc.</text>

    <!-- Network check decision -->
    <g transform="translate(250, 20)">
      <polygon points="70,0 140,35 70,70 0,35" fill="#1e293b" stroke="#d946ef" stroke-width="2"/>
      <text x="70" y="32" text-anchor="middle" class="text-sm" fill="#d946ef">Online?</text>
      <text x="70" y="45" text-anchor="middle" class="text-muted">navigator.onLine</text>
    </g>

    <!-- Online path -->
    <rect x="460" y="20" width="140" height="70" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="530" y="45" text-anchor="middle" class="heading" fill="#22c55e">Send Directly</text>
    <text x="530" y="65" text-anchor="middle" class="text-sm">Normal HTTP POST</text>

    <!-- Offline path -->
    <rect x="460" y="120" width="140" height="70" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
    <text x="530" y="145" text-anchor="middle" class="heading" fill="#f97316">Queue Locally</text>
    <text x="530" y="165" text-anchor="middle" class="text-sm">FR-001: Store in IDB</text>
  </g>

  <!-- Arrows from user actions -->
  <line x1="220" y1="145" x2="248" y2="145" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="200" y="190" class="text-muted">submit()</text>

  <line x1="390" y1="125" x2="458" y2="125" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead-success)"/>
  <text x="410" y="115" class="text-sm" fill="#22c55e">YES</text>

  <line x1="320" y1="160" x2="320" y2="195" stroke="#f97316" stroke-width="2"/>
  <line x1="320" y1="195" x2="458" y2="195" stroke="#f97316" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
  <text x="350" y="175" class="text-sm" fill="#f97316">NO</text>

  <!-- ==================== MIDDLE ROW: SERVICE WORKER ==================== -->
  <g id="service-worker" transform="translate(40, 270)">
    <text x="0" y="0" class="label">SERVICE WORKER (FR-008)</text>

    <!-- Main SW box -->
    <rect x="0" y="20" width="620" height="180" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>

    <!-- SW icon -->
    <g transform="translate(20, 40)">
      <rect x="0" y="0" width="80" height="60" rx="6" fill="#334155"/>
      <text x="40" y="25" text-anchor="middle" class="text-sm" fill="#8b5cf6">Service</text>
      <text x="40" y="42" text-anchor="middle" class="text-sm" fill="#8b5cf6">Worker</text>
    </g>

    <!-- Event listeners -->
    <g transform="translate(120, 40)">
      <rect x="0" y="0" width="150" height="40" rx="4" fill="#0f172a" stroke="#475569"/>
      <text x="75" y="18" text-anchor="middle" class="code">sync.register('queue')</text>
      <text x="75" y="32" text-anchor="middle" class="text-muted">Background Sync API</text>

      <rect x="0" y="50" width="150" height="40" rx="4" fill="#0f172a" stroke="#475569"/>
      <text x="75" y="68" text-anchor="middle" class="code">online event</text>
      <text x="75" y="82" text-anchor="middle" class="text-muted">Fallback trigger</text>

      <rect x="0" y="100" width="150" height="40" rx="4" fill="#0f172a" stroke="#475569"/>
      <text x="75" y="118" text-anchor="middle" class="code">visibilitychange</text>
      <text x="75" y="132" text-anchor="middle" class="text-muted">FR-020: Fallback</text>
    </g>

    <!-- Sync processor -->
    <g transform="translate(290, 40)">
      <rect x="0" y="0" width="160" height="140" rx="6" fill="#0f172a" stroke="#22c55e"/>
      <text x="80" y="22" text-anchor="middle" class="heading" fill="#22c55e">Sync Processor</text>

      <text x="15" y="45" class="code">1. getQueuedItems()</text>
      <text x="15" y="62" class="code">2. for each: POST</text>
      <text x="15" y="79" class="code">3. onSuccess: remove</text>
      <text x="15" y="96" class="code">4. onFail: retry++</text>
      <text x="15" y="113" class="code">5. notify UI</text>
    </g>

    <!-- Retry logic badge -->
    <g transform="translate(470, 40)">
      <rect x="0" y="0" width="130" height="80" rx="4" fill="#ef4444" opacity="0.1" stroke="#ef4444"/>
      <text x="65" y="22" text-anchor="middle" class="text-sm" fill="#ef4444">Retry Logic</text>
      <text x="65" y="42" text-anchor="middle" class="text-muted">FR-009: Auto retry</text>
      <text x="65" y="58" text-anchor="middle" class="text-muted">FR-011: Max 3</text>
      <text x="65" y="74" text-anchor="middle" class="text-muted">FR-012: Keep failed</text>
    </g>
  </g>

  <!-- Arrow from queue to SW -->
  <line x1="530" y1="260" x2="530" y2="288" stroke="#f97316" stroke-width="2" marker-end="url(#arrowhead-orange)"/>

  <!-- ==================== BOTTOM LEFT: INDEXEDDB ==================== -->
  <g id="storage" transform="translate(40, 490)">
    <text x="0" y="0" class="label">LOCAL STORAGE (FR-002)</text>

    <rect x="0" y="20" width="280" height="160" rx="8" fill="#1e293b" stroke="#d946ef" stroke-width="2"/>

    <!-- DB icon -->
    <g transform="translate(20, 40)">
      <ellipse cx="30" cy="10" rx="30" ry="10" fill="#d946ef" opacity="0.3" stroke="#d946ef"/>
      <rect x="0" y="10" width="60" height="40" fill="#d946ef" opacity="0.2"/>
      <ellipse cx="30" cy="50" rx="30" ry="10" fill="#d946ef" opacity="0.3" stroke="#d946ef"/>
      <text x="30" y="35" text-anchor="middle" class="text-sm" fill="#d946ef">IDB</text>
    </g>

    <!-- Queue structure -->
    <g transform="translate(100, 40)">
      <text x="0" y="0" class="text-sm" fill="#d946ef">sync-queue store</text>

      <rect x="0" y="15" width="160" height="20" rx="2" fill="#0f172a"/>
      <text x="10" y="29" class="code">{ id: 1, type: 'contact', ... }</text>

      <rect x="0" y="40" width="160" height="20" rx="2" fill="#0f172a"/>
      <text x="10" y="54" class="code">{ id: 2, type: 'feedback',... }</text>

      <rect x="0" y="65" width="160" height="20" rx="2" fill="#0f172a"/>
      <text x="10" y="79" class="code">{ id: 3, type: 'message', ... }</text>

      <text x="0" y="105" class="text-muted">Persists across sessions</text>
      <text x="0" y="120" class="text-muted">FIFO order (FR-003)</text>
    </g>
  </g>

  <!-- Arrow from SW to IDB -->
  <line x1="200" y1="450" x2="200" y2="508" stroke="#d946ef" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="120" y="480" class="text-muted">read/write</text>

  <!-- ==================== BOTTOM CENTER: SERVER ==================== -->
  <g id="server" transform="translate(380, 490)">
    <text x="0" y="0" class="label">SERVER / API</text>

    <rect x="0" y="20" width="260" height="160" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>

    <!-- Server icon -->
    <g transform="translate(20, 45)">
      <rect x="0" y="0" width="50" height="40" rx="4" fill="#334155" stroke="#22c55e"/>
      <circle cx="15" cy="15" r="4" fill="#22c55e"/>
      <circle cx="35" cy="15" r="4" fill="#22c55e"/>
      <rect x="10" y="28" width="30" height="4" rx="2" fill="#22c55e" opacity="0.5"/>
    </g>

    <g transform="translate(90, 45)">
      <text x="0" y="0" class="heading" fill="#22c55e">API Endpoints</text>

      <text x="0" y="25" class="code">POST /api/contact</text>
      <text x="0" y="42" class="code">POST /api/feedback</text>
      <text x="0" y="59" class="code">POST /api/message</text>

      <text x="0" y="90" class="text-muted">Handles delayed submissions</text>
      <text x="0" y="105" class="text-muted">FR-018: Works with validation</text>
    </g>
  </g>

