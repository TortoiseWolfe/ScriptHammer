  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowhead-success" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <style>
      .heading-lg { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 20px; font-weight: bold; }
      .heading { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 14px; font-weight: bold; }
      .text-md { fill: #cbd5e1; font-family: system-ui, sans-serif; font-size: 12px; }
      .text-sm { fill: #94a3b8; font-family: system-ui, sans-serif; font-size: 10px; }
      .text-muted { fill: #64748b; font-family: system-ui, sans-serif; font-size: 10px; }
      .annotation { fill: #8b5cf6; font-family: monospace; font-size: 10px; }
      .code { fill: #22c55e; font-family: monospace; font-size: 9px; }
      .label { fill: #d946ef; font-family: monospace; font-size: 11px; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.05">
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#fff"/>
    </pattern>
    <rect width="1400" height="800" fill="url(#dots)"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1400" height="3" fill="url(#accentGrad)"/>

  <!-- Title -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#64748b" letter-spacing="1">020 - PWA BACKGROUND SYNC</text>
  <text x="700" y="52" text-anchor="middle" class="heading-lg">Retry Logic &amp; State Notifications</text>

  <!-- ==================== LEFT: RETRY STATE MACHINE ==================== -->
  <g id="state-machine" transform="translate(40, 90)">
    <text x="200" y="0" text-anchor="middle" class="label">QUEUE ITEM STATE MACHINE</text>

    <rect x="0" y="20" width="400" height="420" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>

    <!-- Queued state -->
    <rect x="130" y="45" width="140" height="50" rx="25" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="2"/>
    <text x="200" y="75" text-anchor="middle" class="heading" fill="#f97316">QUEUED</text>

    <!-- Arrow to Syncing -->
    <line x1="200" y1="100" x2="200" y2="130" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="215" y="120" class="text-muted">online</text>

    <!-- Syncing state -->
    <rect x="130" y="135" width="140" height="50" rx="25" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
    <text x="200" y="165" text-anchor="middle" class="heading" fill="#3b82f6">SYNCING</text>

    <!-- Arrow to Success -->
    <line x1="270" y1="160" x2="320" y2="160" stroke="#22c55e" stroke-width="2"/>
    <line x1="320" y1="160" x2="320" y2="230" stroke="#22c55e" stroke-width="2"/>
    <line x1="320" y1="230" x2="270" y2="230" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead-success)"/>
    <text x="330" y="200" class="text-sm" fill="#22c55e">200 OK</text>

    <!-- Success state -->
    <rect x="130" y="205" width="140" height="50" rx="25" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
    <text x="200" y="235" text-anchor="middle" class="heading" fill="#22c55e">SUCCESS</text>

    <!-- Arrow to Removed -->
    <line x1="200" y1="260" x2="200" y2="290" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead-success)"/>

    <!-- Removed state -->
    <rect x="130" y="295" width="140" height="50" rx="25" fill="#334155" stroke="#475569" stroke-width="2"/>
    <text x="200" y="325" text-anchor="middle" class="heading" fill="#94a3b8">REMOVED</text>
    <text x="200" y="365" text-anchor="middle" class="text-muted">FR-007: Clear from queue</text>

    <!-- Arrow to Retry (failure path) -->
    <line x1="130" y1="160" x2="80" y2="160" stroke="#ef4444" stroke-width="2"/>
    <line x1="80" y1="160" x2="80" y2="80" stroke="#ef4444" stroke-width="2"/>
    <line x1="80" y1="80" x2="128" y2="80" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowhead-red)"/>
    <text x="30" y="120" class="text-sm" fill="#ef4444">error</text>
    <text x="30" y="135" class="text-sm" fill="#ef4444">retry++</text>

    <!-- Max retries path -->
    <line x1="80" y1="160" x2="80" y2="395" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="80" y1="395" x2="128" y2="395" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowhead-red)"/>
    <text x="20" y="280" class="text-sm" fill="#ef4444">retry</text>
    <text x="20" y="295" class="text-sm" fill="#ef4444">&gt;= 3</text>

    <!-- Failed state -->
    <rect x="130" y="370" width="140" height="50" rx="25" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="2"/>
    <text x="200" y="400" text-anchor="middle" class="heading" fill="#ef4444">FAILED</text>
  </g>

  <!-- ==================== CENTER: MOBILE NOTIFICATION STATES ==================== -->
  <g id="mobile-notifications" transform="translate(480, 90)">
    <text x="160" y="0" text-anchor="middle" class="label">MOBILE - NOTIFICATION STATES</text>

    <!-- Phone frame 1: Syncing -->
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="150" height="260" rx="16" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <text x="75" y="20" text-anchor="middle" class="text-muted">Syncing...</text>

      <!-- Status bar area -->
      <rect x="10" y="30" width="130" height="50" rx="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6"/>

      <!-- Spinner -->
      <g transform="translate(30, 45)">
        <circle cx="0" cy="0" r="10" fill="none" stroke="#334155" stroke-width="2"/>
        <path d="M 0 -10 A 10 10 0 0 1 10 0" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite"/>
        </path>
      </g>
      <text x="50" y="50" class="text-sm" fill="#3b82f6">Syncing</text>
      <text x="50" y="65" class="text-muted">2 items</text>

      <!-- Progress bar -->
      <rect x="20" y="95" width="110" height="6" rx="3" fill="#334155"/>
      <rect x="20" y="95" width="55" height="6" rx="3" fill="#3b82f6"/>
      <text x="75" y="115" text-anchor="middle" class="text-muted">50%</text>

      <!-- Queue items -->
      <rect x="15" y="130" width="120" height="35" rx="4" fill="#22c55e" opacity="0.15" stroke="#22c55e"/>
      <text x="25" y="150" class="text-sm" fill="#22c55e">Contact</text>
      <text x="115" y="150" class="text-sm" fill="#22c55e">&#10003;</text>

      <rect x="15" y="170" width="120" height="35" rx="4" fill="#3b82f6" opacity="0.15" stroke="#3b82f6"/>
      <g transform="translate(25, 180)">
        <circle cx="5" cy="5" r="5" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
        <path d="M 5 0 A 5 5 0 0 1 10 5" fill="none" stroke="#3b82f6" stroke-width="1.5">
          <animateTransform attributeName="transform" type="rotate" from="0 5 5" to="360 5 5" dur="1s" repeatCount="indefinite"/>
        </path>
      </g>
      <text x="42" y="192" class="text-sm" fill="#3b82f6">Feedback</text>

      <rect x="15" y="210" width="120" height="35" rx="4" fill="#f97316" opacity="0.15" stroke="#f97316"/>
      <text x="25" y="230" class="text-sm" fill="#f97316">Message</text>
      <text x="100" y="230" class="text-muted">queued</text>
    </g>

    <!-- Phone frame 2: Success -->
    <g transform="translate(165, 20)">
      <rect x="0" y="0" width="150" height="260" rx="16" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <text x="75" y="20" text-anchor="middle" class="text-muted">Success</text>

      <!-- Success notification -->
      <rect x="10" y="30" width="130" height="80" rx="8" fill="#22c55e" opacity="0.15" stroke="#22c55e"/>

      <!-- Check icon -->
      <g transform="translate(75, 60)">
        <circle cx="0" cy="0" r="18" fill="#22c55e"/>
        <path d="M -8 0 L -3 5 L 8 -6" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="75" y="95" text-anchor="middle" class="text-sm" fill="#22c55e">All synced!</text>

      <!-- Success details -->
      <text x="75" y="130" text-anchor="middle" class="text-md" fill="#fff">3 messages sent</text>
      <text x="75" y="150" text-anchor="middle" class="text-muted">Just now</text>

      <!-- Dismiss button -->
      <rect x="30" y="170" width="90" height="30" rx="6" fill="#334155"/>
      <text x="75" y="190" text-anchor="middle" class="text-sm" fill="#fff">Dismiss</text>

      <!-- View sent -->
      <rect x="30" y="210" width="90" height="30" rx="6" fill="#22c55e"/>
      <text x="75" y="230" text-anchor="middle" class="text-sm" fill="#fff">View Sent</text>
    </g>
  </g>

  <!-- ==================== RIGHT: FAILURE HANDLING ==================== -->
  <g id="failure-states" transform="translate(820, 90)">
    <text x="270" y="0" text-anchor="middle" class="label">FAILURE HANDLING (FR-009 - FR-012)</text>

    <!-- Phone frame: Failure -->
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="200" height="390" rx="20" fill="#1e293b" stroke="#475569" stroke-width="2"/>
      <text x="100" y="25" text-anchor="middle" class="text-muted">Partial Failure</text>

      <!-- Mixed results banner -->
      <rect x="10" y="35" width="180" height="40" rx="6" fill="#eab308" opacity="0.15" stroke="#eab308"/>
      <text x="100" y="52" text-anchor="middle" class="text-sm" fill="#eab308">2 sent, 1 failed</text>
      <text x="100" y="68" text-anchor="middle" class="text-muted">after 3 retries</text>

      <!-- Success items -->
      <rect x="15" y="85" width="170" height="45" rx="6" fill="#22c55e" opacity="0.1" stroke="#22c55e"/>
      <text x="25" y="105" class="text-sm" fill="#22c55e">Contact Form</text>
      <text x="165" y="105" class="text-sm" fill="#22c55e">&#10003;</text>
      <text x="25" y="120" class="text-muted">Sent at 12:30 PM</text>

      <rect x="15" y="135" width="170" height="45" rx="6" fill="#22c55e" opacity="0.1" stroke="#22c55e"/>
      <text x="25" y="155" class="text-sm" fill="#22c55e">Feedback</text>
      <text x="165" y="155" class="text-sm" fill="#22c55e">&#10003;</text>
      <text x="25" y="170" class="text-muted">Sent at 12:31 PM</text>

      <!-- Failed item -->
      <rect x="15" y="190" width="170" height="80" rx="6" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="2"/>
      <text x="25" y="210" class="text-sm" fill="#ef4444">Message</text>
      <rect x="120" y="198" width="55" height="18" rx="9" fill="#ef4444" opacity="0.3"/>
      <text x="147" y="211" text-anchor="middle" class="text-muted" fill="#ef4444">3 retries</text>
      <text x="25" y="230" class="text-muted">Server error 500</text>

      <!-- Action buttons for failed item -->
      <rect x="25" y="245" width="70" height="24" rx="4" fill="#ef4444"/>
      <text x="60" y="261" text-anchor="middle" class="text-sm" fill="#fff">Retry</text>
      <rect x="105" y="245" width="70" height="24" rx="4" fill="#334155"/>
      <text x="140" y="261" text-anchor="middle" class="text-sm" fill="#94a3b8">Delete</text>

      <!-- Manual sync section -->
      <rect x="15" y="290" width="170" height="80" rx="6" fill="#334155"/>
      <text x="100" y="315" text-anchor="middle" class="text-sm" fill="#fff">Need help?</text>
      <text x="100" y="335" text-anchor="middle" class="text-muted">Try manual sync or</text>
      <text x="100" y="350" text-anchor="middle" class="text-muted">contact support</text>
    </g>

    <!-- Retry logic explanation -->
    <g transform="translate(220, 20)">
      <rect x="0" y="0" width="320" height="200" rx="8" fill="#0f172a" stroke="#8b5cf6" stroke-width="1"/>

      <text x="20" y="30" class="heading">Retry Configuration</text>

      <g transform="translate(20, 50)">
        <text x="0" y="0" class="annotation">FR-009</text>
        <text x="60" y="0" class="text-md">Auto-retry on failure</text>

        <text x="0" y="25" class="annotation">FR-010</text>
        <text x="60" y="25" class="text-md">Track retry count per item</text>

        <text x="0" y="50" class="annotation">FR-011</text>
        <text x="60" y="50" class="text-md">Max 3 attempts (configurable)</text>

        <text x="0" y="75" class="annotation">FR-012</text>
        <text x="60" y="75" class="text-md">Keep failed for manual retry</text>
      </g>

      <g transform="translate(20, 145)">
        <text x="0" y="0" class="text-sm" fill="#8b5cf6">Backoff Strategy:</text>
        <text x="0" y="18" class="code">delay = min(baseDelay * 2^retry, maxDelay)</text>
        <text x="0" y="35" class="text-muted">1s → 2s → 4s (max 30s)</text>
      </g>
    </g>

    <!-- Error types -->
    <g transform="translate(220, 240)">
      <rect x="0" y="0" width="320" height="170" rx="8" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>

      <text x="20" y="30" class="heading" fill="#ef4444">Error Handling</text>

      <g transform="translate(20, 50)">
        <!-- Transient -->
        <rect x="0" y="0" width="130" height="50" rx="4" fill="#eab308" opacity="0.1" stroke="#eab308"/>
        <text x="65" y="20" text-anchor="middle" class="text-sm" fill="#eab308">Transient</text>
        <text x="65" y="38" text-anchor="middle" class="text-muted">Auto-retry</text>

        <!-- Permanent -->
        <rect x="145" y="0" width="130" height="50" rx="4" fill="#ef4444" opacity="0.1" stroke="#ef4444"/>
        <text x="210" y="20" text-anchor="middle" class="text-sm" fill="#ef4444">Permanent</text>
        <text x="210" y="38" text-anchor="middle" class="text-muted">User action</text>
      </g>

      <g transform="translate(20, 115)">
        <text x="0" y="0" class="text-muted">408, 429, 500, 502, 503, 504 → Retry</text>
        <text x="0" y="18" class="text-muted">400, 401, 403, 404 → Mark failed</text>
        <text x="0" y="36" class="text-muted">Network error → Retry when online</text>
      </g>
    </g>
  </g>

  <!-- ==================== BOTTOM: SUCCESS CRITERIA ==================== -->
  <g id="criteria" transform="translate(40, 540)">
    <text x="0" y="0" class="label">SUCCESS CRITERIA</text>

    <rect x="0" y="15" width="420" height="100" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>

    <g transform="translate(20, 40)">
      <circle cx="6" cy="-4" r="5" fill="#22c55e"/>
      <text x="20" y="0" class="text-md">SC-002: Sync within 30s of reconnection</text>
    </g>
    <g transform="translate(20, 65)">
      <circle cx="6" cy="-4" r="5" fill="#22c55e"/>
      <text x="20" y="0" class="text-md">SC-003: Feedback for all state changes</text>
    </g>
    <g transform="translate(20, 90)">
      <circle cx="6" cy="-4" r="5" fill="#22c55e"/>
      <text x="20" y="0" class="text-md">SC-007: 95%+ eventually sync (excl. server errors)</text>
    </g>
  </g>

  <!-- ==================== BOTTOM: EDGE CASES ==================== -->
  <g id="edge-cases" transform="translate(480, 540)">
    <text x="0" y="0" class="label">EDGE CASES</text>

    <rect x="0" y="15" width="420" height="100" rx="8" fill="#1e293b" stroke="#eab308" stroke-width="1"/>

    <g transform="translate(20, 40)">
      <text x="0" y="0" class="text-sm" fill="#eab308">Multiple rapid submissions?</text>
      <text x="200" y="0" class="text-sm">→ Queue each, process FIFO</text>
    </g>
    <g transform="translate(20, 60)">
      <text x="0" y="0" class="text-sm" fill="#eab308">Browser closed mid-sync?</text>
      <text x="200" y="0" class="text-sm">→ Queue persists, resume later</text>
    </g>
    <g transform="translate(20, 80)">
      <text x="0" y="0" class="text-sm" fill="#eab308">Validation rules changed?</text>
      <text x="200" y="0" class="text-sm">→ Server handles, clear error</text>
    </g>
    <g transform="translate(20, 100)">
      <text x="0" y="0" class="text-sm" fill="#eab308">Low storage space?</text>
      <text x="200" y="0" class="text-sm">→ Warn user, cleanup old syncs</text>
    </g>
  </g>

  <!-- ==================== BOTTOM: FALLBACK ==================== -->
  <g id="fallback" transform="translate(920, 540)">
    <text x="0" y="0" class="label">GRACEFUL DEGRADATION (FR-020)</text>

    <rect x="0" y="15" width="420" height="100" rx="8" fill="#1e293b" stroke="#d946ef" stroke-width="1"/>

    <g transform="translate(20, 35)">
      <text x="0" y="0" class="heading">No Background Sync Support</text>

      <g transform="translate(0, 25)">
        <rect x="0" y="0" width="90" height="20" rx="10" fill="#3b82f6" opacity="0.3"/>
        <text x="45" y="14" text-anchor="middle" class="text-sm" fill="#3b82f6">Fallback 1</text>
        <text x="100" y="14" class="text-md">online event triggers sync</text>
      </g>
      <g transform="translate(0, 50)">
        <rect x="0" y="0" width="90" height="20" rx="10" fill="#d946ef" opacity="0.3"/>
        <text x="45" y="14" text-anchor="middle" class="text-sm" fill="#d946ef">Fallback 2</text>
        <text x="100" y="14" class="text-md">App visibility triggers sync</text>
      </g>
      <g transform="translate(0, 75)">
        <rect x="0" y="0" width="90" height="20" rx="10" fill="#f97316" opacity="0.3"/>
        <text x="45" y="14" text-anchor="middle" class="text-sm" fill="#f97316">Fallback 3</text>
        <text x="100" y="14" class="text-md">Manual "Sync Now" button</text>
      </g>
    </g>
  </g>

  <!-- Version badge -->
  <rect x="1280" y="770" width="110" height="22" rx="11" fill="#334155"/>
  <text x="1335" y="785" text-anchor="middle" class="text-muted">v1.0 | 2025-12-31</text>
</svg>
