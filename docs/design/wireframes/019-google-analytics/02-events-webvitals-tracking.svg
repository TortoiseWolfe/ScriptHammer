    <text x="25" y="70" class="code">  const { consent } = useConsent();</text>
    <text x="25" y="85" class="code">  </text>
    <text x="25" y="100" class="code">  const trackEvent = (name, params) => {</text>
    <text x="25" y="115" class="code">    if (!consent.analytics) return;</text>
    <text x="25" y="130" class="code">    gtag('event', name, params);</text>
    <text x="25" y="145" class="code">  };</text>
    <text x="25" y="160" class="code">  return { trackEvent };</text>
