      <rect width="100" height="35" rx="4" fill="#22c55e"/>
      <text x="50" y="22" text-anchor="middle" class="text-sm" fill="#fff">Fade In</text>
      <line x1="100" y1="35" x2="100" y2="50" stroke="#22c55e" stroke-width="2"/>
    </g>

    <!-- Event 6: Complete -->
    <g transform="translate(920, 50)">
      <rect width="100" height="35" rx="4" fill="#22c55e" stroke="#22c55e" stroke-width="2"/>
      <text x="50" y="22" text-anchor="middle" class="text-sm" fill="#fff">Complete</text>
    </g>

    <!-- Performance note -->
    <text x="550" y="155" text-anchor="middle" class="annotation">Total time: ~500ms (NFR-005: MUST complete within 500ms)</text>
  </g>

  <!-- EDGE CASES -->
  <g id="edge-cases" transform="translate(40, 500)">
    <text x="0" y="0" class="heading">EDGE CASES HANDLED</text>

    <rect x="0" y="15" width="400" height="250" rx="8" fill="#1e293b" stroke="#eab308"/>

    <!-- Edge Case 1 -->
    <g transform="translate(15, 35)">
      <rect width="370" height="50" rx="6" fill="#334155"/>
      <text x="15" y="20" class="text-md" fill="#eab308">Theme changed while Disqus loading</text>
      <text x="15" y="38" class="text-sm">→ Abort current load, restart with new theme</text>
    </g>

    <!-- Edge Case 2 -->
    <g transform="translate(15, 95)">
      <rect width="370" height="50" rx="6" fill="#334155"/>
      <text x="15" y="20" class="text-md" fill="#eab308">Theme changed while user typing comment</text>
      <text x="15" y="38" class="text-sm">→ Preserve draft, apply theme after submit/blur</text>
    </g>

    <!-- Edge Case 3 -->
    <g transform="translate(15, 155)">
      <rect width="370" height="50" rx="6" fill="#334155"/>
      <text x="15" y="20" class="text-md" fill="#eab308">System theme change while tab hidden</text>
      <text x="15" y="38" class="text-sm">→ Apply on visibility change (document.visibilityState)</text>
    </g>

    <!-- Edge Case 4 -->
    <g transform="translate(15, 215)">
      <rect width="370" height="35" rx="6" fill="#334155"/>
      <text x="15" y="22" class="text-md" fill="#eab308">Theme attribute removed from document</text>
      <text x="280" y="22" class="text-sm">→ Fallback to system</text>
    </g>
  </g>

  <!-- PERFORMANCE METRICS -->
  <g id="performance" transform="translate(460, 500)">
    <text x="0" y="0" class="heading">PERFORMANCE REQUIREMENTS</text>

    <rect x="0" y="15" width="340" height="250" rx="8" fill="#1e293b" stroke="#22c55e"/>

    <text x="20" y="50" class="text-md" fill="#22c55e">✓ NFR-004: Theme detection &lt; 10ms</text>
    <rect x="230" y="38" width="90" height="18" rx="4" fill="#22c55e" opacity="0.2"/>
    <text x="275" y="51" text-anchor="middle" class="text-sm" fill="#22c55e">PASS</text>

    <text x="20" y="85" class="text-md" fill="#22c55e">✓ NFR-005: Disqus reload &lt; 500ms</text>
    <rect x="230" y="73" width="90" height="18" rx="4" fill="#22c55e" opacity="0.2"/>
    <text x="275" y="86" text-anchor="middle" class="text-sm" fill="#22c55e">PASS</text>

    <text x="20" y="120" class="text-md" fill="#22c55e">✓ NFR-006: Zero CLS during change</text>
    <rect x="230" y="108" width="90" height="18" rx="4" fill="#22c55e" opacity="0.2"/>
    <text x="275" y="121" text-anchor="middle" class="text-sm" fill="#22c55e">PASS</text>

    <text x="20" y="155" class="text-md" fill="#22c55e">✓ NFR-007: Lazy-load Disqus script</text>
    <rect x="230" y="143" width="90" height="18" rx="4" fill="#22c55e" opacity="0.2"/>
    <text x="275" y="156" text-anchor="middle" class="text-sm" fill="#22c55e">PASS</text>

    <!-- CLS Prevention -->
    <rect x="15" y="175" width="310" height="80" rx="6" fill="#334155"/>
    <text x="170" y="198" text-anchor="middle" class="heading">CLS Prevention Strategy</text>
    <text x="25" y="220" class="text-sm">• Reserve height with min-height: 400px</text>
    <text x="25" y="238" class="text-sm">• Fade transition instead of abrupt swap</text>
  </g>

  <!-- OBSERVER CODE SAMPLE -->
  <g id="code-sample" transform="translate(820, 500)">
    <text x="0" y="0" class="heading">IMPLEMENTATION PATTERN</text>

    <rect x="0" y="15" width="520" height="250" rx="8" fill="#1e293b" stroke="#475569"/>

    <text x="20" y="45" class="annotation">// Theme observer setup</text>
    <text x="20" y="65" class="text-sm" fill="#d946ef">const</text>
    <text x="55" y="65" class="text-sm"> observer = </text>
    <text x="120" y="65" class="text-sm" fill="#d946ef">new</text>
    <text x="145" y="65" class="text-sm" fill="#fbbf24"> MutationObserver</text>
    <text x="270" y="65" class="text-sm">((mutations) =&gt; {</text>

    <text x="30" y="85" class="text-sm" fill="#d946ef">  const</text>
    <text x="70" y="85" class="text-sm"> theme = mutations[0]?.target.dataset.theme;</text>

    <text x="30" y="105" class="text-sm">  debounce(() =&gt; updateDisqusTheme(theme), 300);</text>

    <text x="20" y="125" class="text-sm">});</text>

    <text x="20" y="155" class="annotation">// System preference listener</text>
    <text x="20" y="175" class="text-sm">matchMedia(</text>
    <text x="92" y="175" class="text-sm" fill="#22c55e">'(prefers-color-scheme: dark)'</text>
    <text x="290" y="175" class="text-sm">)</text>

    <text x="30" y="195" class="text-sm">.addEventListener(</text>
    <text x="145" y="195" class="text-sm" fill="#22c55e">'change'</text>
    <text x="200" y="195" class="text-sm">, (e) =&gt; {</text>

    <text x="40" y="215" class="text-sm" fill="#d946ef">    if</text>
    <text x="60" y="215" class="text-sm"> (followSystem) updateDisqusTheme(</text>

    <text x="50" y="235" class="text-sm">      e.matches ? </text>
    <text x="160" y="235" class="text-sm" fill="#22c55e">'dark'</text>
    <text x="200" y="235" class="text-sm"> : </text>
    <text x="215" y="235" class="text-sm" fill="#fbbf24">'light'</text>
    <text x="255" y="235" class="text-sm">);</text>

    <text x="30" y="255" class="text-sm">  });</text>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
