      <text x="50" y="22" class="heading">User Theme Toggle</text>
      <text x="50" y="38" class="text-sm">data-theme attribute change</text>
    </g>

    <!-- Trigger 2: System Preference -->
    <g transform="translate(20, 100)">
      <rect width="220" height="50" rx="6" fill="#334155" stroke="#d946ef"/>
      <circle cx="25" cy="25" r="12" fill="#d946ef"/>
      <text x="22" y="30" font-family="system-ui" font-size="14" fill="#fff">2</text>
      <text x="50" y="22" class="heading">System Preference</text>
      <text x="50" y="38" class="text-sm">prefers-color-scheme change</text>
    </g>

    <!-- Trigger 3: URL Parameter -->
    <g transform="translate(20, 160)">
      <rect width="220" height="50" rx="6" fill="#334155" stroke="#22c55e"/>
      <circle cx="25" cy="25" r="12" fill="#22c55e"/>
      <text x="22" y="30" font-family="system-ui" font-size="14" fill="#fff">3</text>
      <text x="50" y="22" class="heading">URL Parameter</text>
      <text x="50" y="38" class="text-sm">?theme=dark in URL</text>
    </g>
  </g>

  <!-- DETECTION LAYER -->
  <g id="detection" transform="translate(320, 80)">
    <text x="0" y="0" class="label-flow">DETECTION (FR-010)</text>

    <rect x="0" y="15" width="280" height="200" rx="8" fill="#1e293b" stroke="#8b5cf6"/>

    <!-- MutationObserver -->
    <rect x="15" y="35" width="250" height="70" rx="6" fill="#334155"/>
    <text x="140" y="55" text-anchor="middle" class="heading">MutationObserver</text>
    <text x="25" y="75" class="annotation">observer.observe(document.documentElement, {</text>
    <text x="35" y="90" class="text-sm">attributes: true, attributeFilter: ['data-theme']</text>

    <!-- Media Query Listener -->
    <rect x="15" y="115" width="250" height="50" rx="6" fill="#334155"/>
    <text x="140" y="135" text-anchor="middle" class="heading">MediaQueryListener</text>
    <text x="25" y="152" class="annotation">matchMedia('(prefers-color-scheme: dark)')</text>

    <!-- Theme Change Event -->
    <rect x="15" y="175" width="250" height="35" rx="6" fill="#8b5cf6"/>
    <text x="140" y="198" text-anchor="middle" font-family="system-ui" font-size="12" fill="#fff" font-weight="bold">Emit: THEME_CHANGE Event</text>
  </g>

  <!-- DEBOUNCE LAYER -->
  <g id="debounce" transform="translate(620, 80)">
    <text x="0" y="0" class="label-flow">DEBOUNCE (FR-012)</text>

    <rect x="0" y="15" width="240" height="200" rx="8" fill="#1e293b" stroke="#eab308"/>

    <!-- Debounce Logic -->
    <text x="120" y="45" text-anchor="middle" class="heading" fill="#eab308">Rapid Change Protection</text>

    <!-- Timeline visualization -->
    <rect x="20" y="60" width="200" height="40" rx="4" fill="#334155"/>
    <line x1="30" y1="80" x2="210" y2="80" stroke="#475569" stroke-width="2"/>

    <!-- Change events -->
    <circle cx="50" cy="80" r="6" fill="#ef4444"/>
    <circle cx="80" cy="80" r="6" fill="#ef4444"/>
    <circle cx="100" cy="80" r="6" fill="#ef4444"/>
    <circle cx="180" cy="80" r="6" fill="#22c55e"/>

    <text x="50" y="68" text-anchor="middle" class="text-muted">×</text>
    <text x="80" y="68" text-anchor="middle" class="text-muted">×</text>
    <text x="100" y="68" text-anchor="middle" class="text-muted">×</text>
    <text x="180" y="68" text-anchor="middle" class="text-muted">✓</text>

    <!-- Debounce timer -->
    <rect x="20" y="110" width="200" height="45" rx="4" fill="#334155"/>
    <text x="30" y="130" class="annotation">debounceTime: 300ms</text>
    <text x="30" y="148" class="text-sm">Only final state is applied</text>

    <!-- Output -->
    <rect x="20" y="165" width="200" height="40" rx="6" fill="#22c55e"/>
    <text x="120" y="190" text-anchor="middle" font-family="system-ui" font-size="11" fill="#fff" font-weight="bold">Debounced Theme: dark</text>
  </g>

  <!-- DISQUS RELOAD -->
  <g id="reload" transform="translate(880, 80)">
    <text x="0" y="0" class="label-flow">DISQUS RELOAD (FR-011)</text>

    <rect x="0" y="15" width="260" height="200" rx="8" fill="#1e293b" stroke="#22c55e"/>

    <!-- Step 1 -->
    <g transform="translate(15, 35)">
      <rect width="230" height="45" rx="6" fill="#334155" stroke="#8b5cf6"/>
      <circle cx="20" cy="22" r="14" fill="#8b5cf6"/>
      <text x="17" y="27" font-family="system-ui" font-size="12" fill="#fff">1</text>
      <text x="45" y="20" class="text-md">Get theme config</text>
      <text x="45" y="36" class="text-sm">themeConfig[newTheme]</text>
    </g>

    <!-- Step 2 -->
    <g transform="translate(15, 90)">
      <rect width="230" height="45" rx="6" fill="#334155" stroke="#d946ef"/>
      <circle cx="20" cy="22" r="14" fill="#d946ef"/>
      <text x="17" y="27" font-family="system-ui" font-size="12" fill="#fff">2</text>
      <text x="45" y="20" class="text-md">Reset Disqus</text>
      <text x="45" y="36" class="annotation">DISQUS.reset({ reload: true })</text>
    </g>

    <!-- Step 3 -->
    <g transform="translate(15, 145)">
      <rect width="230" height="55" rx="6" fill="#334155" stroke="#22c55e"/>
      <circle cx="20" cy="27" r="14" fill="#22c55e"/>
      <text x="17" y="32" font-family="system-ui" font-size="12" fill="#fff">3</text>
      <text x="45" y="22" class="text-md">Apply new config</text>
      <text x="45" y="38" class="text-sm">colorScheme: dark</text>
      <text x="45" y="52" class="text-sm">accent: #661AE6</text>
    </g>
  </g>

  <!-- FLOW ARROWS -->
  <g id="flow-arrows">
    <!-- Triggers to Detection -->
    <path d="M300 180 L315 180" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowhead-violet)"/>

    <!-- Detection to Debounce -->
    <path d="M600 180 L615 180" stroke="#eab308" stroke-width="2" fill="none" marker-end="url(#arrowhead-yellow)"/>

    <!-- Debounce to Reload -->
    <path d="M860 180 L875 180" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)"/>
  </g>

  <!-- VISUAL TRANSITION TIMELINE -->
  <g id="timeline" transform="translate(40, 310)">
    <text x="0" y="0" class="label-flow">VISUAL TRANSITION TIMELINE (FR-013, NFR-001)</text>

    <rect x="0" y="15" width="1100" height="160" rx="8" fill="#1e293b" stroke="#475569"/>

    <!-- Timeline axis -->
    <line x1="40" y1="100" x2="1060" y2="100" stroke="#475569" stroke-width="2"/>

    <!-- Time markers -->
    <text x="40" y="130" text-anchor="middle" class="text-muted">0ms</text>
    <text x="200" y="130" text-anchor="middle" class="text-muted">50ms</text>
    <text x="400" y="130" text-anchor="middle" class="text-muted">100ms</text>
    <text x="600" y="130" text-anchor="middle" class="text-muted">300ms</text>
    <text x="800" y="130" text-anchor="middle" class="text-muted">500ms</text>
    <text x="1000" y="130" text-anchor="middle" class="text-muted">Done</text>

    <!-- Event 1: Theme Change Detected -->
    <g transform="translate(40, 50)">
      <rect width="150" height="35" rx="4" fill="#8b5cf6"/>
      <text x="75" y="22" text-anchor="middle" class="text-sm" fill="#fff">Theme Change</text>
      <line x1="0" y1="35" x2="0" y2="50" stroke="#8b5cf6" stroke-width="2"/>
    </g>

    <!-- Event 2: Debounce Wait -->
    <g transform="translate(200, 50)">
      <rect width="380" height="35" rx="4" fill="#eab308" opacity="0.3" stroke="#eab308" stroke-dasharray="4,2"/>
      <text x="190" y="22" text-anchor="middle" class="text-sm" fill="#eab308">Debounce Wait (300ms)</text>
    </g>

    <!-- Event 3: Disqus Fade Out -->
    <g transform="translate(600, 50)">
      <rect width="80" height="35" rx="4" fill="#ef4444" opacity="0.5"/>
      <text x="40" y="22" text-anchor="middle" class="text-sm" fill="#fff">Fade</text>
      <line x1="0" y1="35" x2="0" y2="50" stroke="#ef4444" stroke-width="2"/>
    </g>

    <!-- Event 4: Reset & Reload -->
    <g transform="translate(700, 50)">
      <rect width="80" height="35" rx="4" fill="#d946ef"/>
      <text x="40" y="22" text-anchor="middle" class="text-sm" fill="#fff">Reset</text>
