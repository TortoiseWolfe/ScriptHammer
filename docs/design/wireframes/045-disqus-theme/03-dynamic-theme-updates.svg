  <!-- Accent line top -->
  <rect x="0" y="0" width="1400" height="3" fill="url(#accentGrad)"/>

  <!-- Title -->
  <text x="700" y="32" text-anchor="middle" class="heading-lg">DYNAMIC THEME UPDATE FLOW</text>
  <text x="700" y="52" text-anchor="middle" class="text-muted">Theme Change Detection, Debouncing, and Disqus Reload (FR-010 to FR-014)</text>

  <!-- TRIGGER SOURCES -->
  <g id="triggers" transform="translate(40, 80)">
    <text x="0" y="0" class="label-flow">THEME CHANGE TRIGGERS</text>

    <rect x="0" y="15" width="260" height="200" rx="8" fill="#1e293b" stroke="#475569"/>

    <!-- Trigger 1: User Toggle -->
    <g transform="translate(20, 40)">
