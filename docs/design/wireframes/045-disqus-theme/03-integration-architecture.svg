  <!-- Title -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#8494a8" letter-spacing="1">DISQUS THEME INTEGRATION ARCHITECTURE</text>

  <!-- ==================== THEME DETECTION LAYER ==================== -->
  <g transform="translate(40, 50)">
    <text x="0" y="0" class="heading-lg">Theme Detection</text>

    <rect x="0" y="20" width="320" height="180" rx="8" fill="#1e293b" stroke="#8b5cf6"/>
    <text x="160" y="45" text-anchor="middle" class="heading" fill="#8b5cf6">ThemeDetector</text>

    <g transform="translate(15, 60)">
      <rect x="0" y="0" width="290" height="130" rx="4" fill="#334155"/>

      <text x="10" y="20" class="code">// FR-002: Extract theme</text>
      <text x="10" y="38" class="code">const theme = document</text>
      <text x="10" y="53" class="code">  .documentElement</text>
      <text x="10" y="68" class="code">  .getAttribute('data-theme');</text>

      <text x="10" y="90" class="code">// FR-014: System preference</text>
      <text x="10" y="108" class="code">matchMedia('(prefers-color-scheme: dark)')</text>
      <text x="10" y="123" class="code">  .addEventListener('change', handleChange);</text>
    </g>
  </g>

  <!-- ==================== THEME MAPPING SERVICE ==================== -->
  <g transform="translate(380, 50)">
    <text x="0" y="0" class="heading-lg">Theme Mapping</text>

    <rect x="0" y="20" width="340" height="180" rx="8" fill="#1e293b" stroke="#22c55e"/>
    <text x="170" y="45" text-anchor="middle" class="heading" fill="#22c55e">ThemeMappingService</text>

