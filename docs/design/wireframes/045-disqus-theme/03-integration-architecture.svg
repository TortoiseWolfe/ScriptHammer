      <text x="10" y="20" class="code">// FR-001: 32 theme mappings</text>
      <text x="10" y="38" class="text-sm">const THEME_MAP = {</text>
      <text x="20" y="53" class="text-sm">'light': { scheme: 'light', accent: '#570df8' },</text>
      <text x="20" y="68" class="text-sm">'dark': { scheme: 'dark', accent: '#661ae6' },</text>
      <text x="20" y="83" class="text-sm">'cupcake': { scheme: 'light', accent: '#65c3c8' },</text>
      <text x="20" y="98" class="text-sm">... // 29 more themes</text>
      <text x="10" y="113" class="text-sm">};</text>
      <text x="10" y="128" class="text-muted">FR-003: Determine light/dark | FR-004: Extract accent</text>
    </g>
  </g>

  <!-- ==================== CONSENT MANAGER ==================== -->
  <g transform="translate(740, 50)">
    <text x="0" y="0" class="heading-lg">Consent Integration</text>

    <rect x="0" y="20" width="280" height="180" rx="8" fill="#1e293b" stroke="#eab308"/>
