    <g transform="translate(15, 45)">
      <rect x="0" y="0" width="270" height="160" rx="4" fill="#334155"/>

      <text x="10" y="20" class="code">// Watch for theme changes</text>
      <text x="10" y="38" class="text-sm" fill="#fff">const observer = new MutationObserver(</text>
      <text x="20" y="53" class="text-sm" fill="#fff">(mutations) => {</text>
      <text x="30" y="68" class="text-sm" fill="#fff">if (themeChanged(mutations)) {</text>
      <text x="40" y="83" class="text-sm" fill="#fff">debounce(updateDisqusTheme);</text>
      <text x="30" y="98" class="text-sm" fill="#fff">}</text>
      <text x="20" y="113" class="text-sm" fill="#fff">}</text>
      <text x="10" y="128" class="text-sm" fill="#fff">);</text>

      <text x="10" y="150" class="text-muted">Observes: document.documentElement</text>
    </g>
