      <text x="10" y="20" class="code">// FR-015, NFR-008</text>
      <text x="10" y="38" class="text-md" fill="#fff">Consent States:</text>
      <text x="10" y="56" class="text-sm">• NOT_ASKED → Show prompt</text>
      <text x="10" y="71" class="text-sm">• DENIED → Show disabled message</text>
      <text x="10" y="86" class="text-sm">• GRANTED → Load Disqus</text>
      <text x="10" y="101" class="text-sm">• REVOKED → Unload Disqus (FR-019)</text>

      <text x="10" y="123" class="annotation">Syncs with 002-cookie-consent</text>
    </g>
  </g>

