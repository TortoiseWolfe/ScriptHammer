<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800">
  <!-- ============================================================
       GENERATED BY: /wireframe skill
       SOURCE: features/code-quality/045-disqus-theme/spec.md
       DATE: 2025-12-31
       DO NOT MANUALLY EDIT - Regenerate with /wireframe command
       ============================================================ -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
    <style>
      .heading-lg { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 20px; font-weight: bold; }
      .heading { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 14px; font-weight: bold; }
      .text-md { fill: #cbd5e1; font-family: system-ui, sans-serif; font-size: 12px; }
      .text-sm { fill: #94a3b8; font-family: system-ui, sans-serif; font-size: 10px; }
      .text-muted { fill: #64748b; font-family: system-ui, sans-serif; font-size: 10px; }
      .annotation { fill: #8b5cf6; font-family: monospace; font-size: 10px; }
      .label-state { fill: #22c55e; font-family: monospace; font-size: 11px; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.05">
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#fff"/>
    </pattern>
    <rect width="1400" height="800" fill="url(#dots)"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1400" height="3" fill="url(#accentGrad)"/>

  <!-- Title -->
  <text x="700" y="32" text-anchor="middle" class="heading-lg">DISQUS CONSENT STATES</text>
  <text x="700" y="52" text-anchor="middle" class="text-muted">Privacy-First Comment Loading (FR-015 to FR-020)</text>

  <!-- STATE 1: NOT CONSENTED (Placeholder) -->
  <g id="state-not-consented" transform="translate(40, 80)">
    <text x="0" y="0" class="label-state">STATE 1: NO CONSENT</text>

    <!-- Browser Frame -->
    <rect x="0" y="15" width="400" height="320" rx="8" fill="#1e293b" stroke="#475569"/>

    <!-- Page Header -->
    <rect x="10" y="25" width="380" height="40" rx="4" fill="#334155"/>
    <text x="25" y="50" class="heading">Blog Post Title</text>

    <!-- Article Content (abbreviated) -->
    <rect x="10" y="75" width="380" height="60" rx="4" fill="#334155" opacity="0.5"/>
    <text x="25" y="100" class="text-sm">Article content goes here...</text>
    <text x="25" y="118" class="text-sm">Lorem ipsum dolor sit amet...</text>

    <!-- Comment Section Placeholder -->
    <rect x="10" y="145" width="380" height="180" rx="8" fill="#334155" stroke="#eab308" stroke-width="2" stroke-dasharray="6,4"/>

    <!-- Placeholder Content -->
    <g transform="translate(200, 210)">
      <!-- Chat icon -->
      <rect x="-20" y="-30" width="40" height="35" rx="6" fill="none" stroke="#64748b" stroke-width="2"/>
      <circle cx="-8" cy="-12" r="3" fill="#64748b"/>
      <circle cx="0" cy="-12" r="3" fill="#64748b"/>
      <circle cx="8" cy="-12" r="3" fill="#64748b"/>
      <path d="M10 5 L20 15 L10 10 Z" fill="#64748b"/>
    </g>

    <text x="200" y="240" text-anchor="middle" class="heading">Comments Disabled</text>
    <text x="200" y="260" text-anchor="middle" class="text-sm">Enable third-party cookies to view comments</text>

    <!-- Enable Button -->
    <rect x="130" y="275" width="140" height="36" rx="6" fill="#8b5cf6"/>
    <text x="200" y="298" text-anchor="middle" font-family="system-ui" font-size="12" fill="#fff" font-weight="bold">Enable Comments</text>

    <!-- FR Reference -->
    <rect x="10" y="335" width="380" height="30" rx="4" fill="#1e293b" stroke="#8b5cf6"/>
    <text x="200" y="354" text-anchor="middle" class="annotation">FR-015: System MUST NOT load Disqus until consent granted</text>
  </g>

  <!-- STATE 2: CONSENT GRANTED (Loading) -->
  <g id="state-loading" transform="translate(490, 80)">
    <text x="0" y="0" class="label-state">STATE 2: LOADING</text>

    <!-- Browser Frame -->
    <rect x="0" y="15" width="400" height="320" rx="8" fill="#1e293b" stroke="#475569"/>

    <!-- Page Header -->
    <rect x="10" y="25" width="380" height="40" rx="4" fill="#334155"/>
    <text x="25" y="50" class="heading">Blog Post Title</text>

    <!-- Article Content -->
    <rect x="10" y="75" width="380" height="60" rx="4" fill="#334155" opacity="0.5"/>
    <text x="25" y="100" class="text-sm">Article content goes here...</text>
    <text x="25" y="118" class="text-sm">Lorem ipsum dolor sit amet...</text>

    <!-- Comment Section Loading -->
    <rect x="10" y="145" width="380" height="180" rx="8" fill="#334155" stroke="#8b5cf6"/>

    <!-- Loading Spinner -->
    <g transform="translate(200, 210)">
      <circle cx="0" cy="0" r="20" fill="none" stroke="#334155" stroke-width="3"/>
      <path d="M 0 -20 A 20 20 0 0 1 20 0" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite"/>
      </path>
    </g>

    <text x="200" y="260" text-anchor="middle" class="text-md">Loading Disqus comments...</text>
    <text x="200" y="280" text-anchor="middle" class="text-sm">Applying theme: dark</text>

    <!-- Flow Arrow -->
    <path d="M-25 235 L-50 235" stroke="#22c55e" stroke-width="2" fill="none" marker-start="url(#arrowhead-green)"/>

    <!-- FR Reference -->
    <rect x="10" y="335" width="380" height="30" rx="4" fill="#1e293b" stroke="#8b5cf6"/>
    <text x="200" y="354" text-anchor="middle" class="annotation">FR-018: System MUST load Disqus after consent granted</text>
  </g>

  <!-- STATE 3: LOADED (With Theme) -->
  <g id="state-loaded" transform="translate(940, 80)">
    <text x="0" y="0" class="label-state">STATE 3: LOADED</text>

    <!-- Browser Frame -->
    <rect x="0" y="15" width="400" height="320" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>

    <!-- Page Header -->
    <rect x="10" y="25" width="380" height="40" rx="4" fill="#334155"/>
    <text x="25" y="50" class="heading">Blog Post Title</text>

    <!-- Article Content -->
    <rect x="10" y="75" width="380" height="60" rx="4" fill="#334155" opacity="0.5"/>
    <text x="25" y="100" class="text-sm">Article content goes here...</text>
    <text x="25" y="118" class="text-sm">Lorem ipsum dolor sit amet...</text>

    <!-- Disqus Embed (Dark Theme) -->
    <rect x="10" y="145" width="380" height="180" rx="8" fill="#1d232a" stroke="#8b5cf6"/>

    <!-- Disqus Header -->
    <rect x="20" y="155" width="360" height="30" rx="4" fill="#334155"/>
    <text x="30" y="175" class="text-md" fill="#8b5cf6">3 Comments</text>
    <text x="300" y="175" class="text-sm">Sort by: Newest</text>

    <!-- Comment 1 -->
    <g transform="translate(20, 195)">
      <circle cx="15" cy="15" r="14" fill="#475569"/>
      <text x="12" y="20" font-family="system-ui" font-size="10" fill="#fff">JD</text>
      <text x="40" y="10" class="text-sm" fill="#fff">John Doe</text>
      <text x="40" y="24" class="text-muted">Great article! Love the dark theme.</text>
      <rect x="40" y="30" width="50" height="16" rx="3" fill="#8b5cf6" opacity="0.2"/>
      <text x="50" y="42" class="text-sm" fill="#8b5cf6">Reply</text>
    </g>

    <!-- Comment 2 -->
    <g transform="translate(20, 250)">
      <circle cx="15" cy="15" r="14" fill="#475569"/>
      <text x="10" y="20" font-family="system-ui" font-size="10" fill="#fff">AS</text>
      <text x="40" y="10" class="text-sm" fill="#fff">Alice Smith</text>
      <text x="40" y="24" class="text-muted">The theme switching is seamless!</text>
      <rect x="40" y="30" width="50" height="16" rx="3" fill="#8b5cf6" opacity="0.2"/>
      <text x="50" y="42" class="text-sm" fill="#8b5cf6">Reply</text>
    </g>

    <!-- FR Reference -->
    <rect x="10" y="335" width="380" height="30" rx="4" fill="#1e293b" stroke="#22c55e"/>
    <text x="200" y="354" text-anchor="middle" class="annotation" fill="#22c55e">Theme synchronized: Disqus dark ← DaisyUI dark</text>
  </g>

  <!-- STATE 4: CONSENT REVOKED -->
  <g id="state-revoked" transform="translate(40, 430)">
    <text x="0" y="0" class="label-state" fill="#ef4444">STATE 4: CONSENT REVOKED</text>

    <!-- Browser Frame -->
    <rect x="0" y="15" width="400" height="320" rx="8" fill="#1e293b" stroke="#ef4444"/>

    <!-- Page Header -->
    <rect x="10" y="25" width="380" height="40" rx="4" fill="#334155"/>
    <text x="25" y="50" class="heading">Blog Post Title</text>

    <!-- Article Content -->
    <rect x="10" y="75" width="380" height="60" rx="4" fill="#334155" opacity="0.5"/>
    <text x="25" y="100" class="text-sm">Article content goes here...</text>
    <text x="25" y="118" class="text-sm">Lorem ipsum dolor sit amet...</text>

    <!-- Comment Section - Back to Placeholder -->
    <rect x="10" y="145" width="380" height="180" rx="8" fill="#334155" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4"/>

    <!-- Warning Icon -->
    <g transform="translate(200, 200)">
      <circle cx="0" cy="0" r="20" fill="none" stroke="#ef4444" stroke-width="2"/>
      <text x="0" y="6" text-anchor="middle" font-family="system-ui" font-size="20" fill="#ef4444" font-weight="bold">!</text>
    </g>

    <text x="200" y="245" text-anchor="middle" class="heading" fill="#ef4444">Comments Disabled</text>
    <text x="200" y="265" text-anchor="middle" class="text-sm">You've revoked consent for third-party services</text>

    <!-- Re-enable Button -->
    <rect x="130" y="280" width="140" height="36" rx="6" fill="#475569"/>
    <text x="200" y="303" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8">Re-enable Comments</text>

    <!-- FR Reference -->
    <rect x="10" y="335" width="380" height="30" rx="4" fill="#1e293b" stroke="#ef4444"/>
    <text x="200" y="354" text-anchor="middle" class="annotation" fill="#ef4444">FR-019: Disqus unloads when consent withdrawn</text>
  </g>

  <!-- CONSENT FLOW DIAGRAM -->
  <g id="consent-flow" transform="translate(490, 430)">
    <text x="0" y="0" class="heading">CONSENT STATE MACHINE</text>

    <rect x="0" y="15" width="420" height="320" rx="8" fill="#1e293b" stroke="#475569"/>

    <!-- State Boxes -->
    <!-- Not Asked -->
    <rect x="20" y="40" width="100" height="40" rx="6" fill="#334155" stroke="#eab308"/>
    <text x="70" y="65" text-anchor="middle" class="text-sm" fill="#eab308">NOT_ASKED</text>

    <!-- Denied -->
    <rect x="160" y="40" width="100" height="40" rx="6" fill="#334155" stroke="#ef4444"/>
    <text x="210" y="65" text-anchor="middle" class="text-sm" fill="#ef4444">DENIED</text>

    <!-- Granted -->
    <rect x="300" y="40" width="100" height="40" rx="6" fill="#334155" stroke="#22c55e"/>
    <text x="350" y="65" text-anchor="middle" class="text-sm" fill="#22c55e">GRANTED</text>

    <!-- Revoked -->
    <rect x="160" y="120" width="100" height="40" rx="6" fill="#334155" stroke="#ef4444"/>
    <text x="210" y="145" text-anchor="middle" class="text-sm" fill="#ef4444">REVOKED</text>

    <!-- Transitions -->
    <!-- NOT_ASKED -> DENIED -->
    <path d="M120 60 L155 60" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-red)"/>
    <text x="137" y="52" text-anchor="middle" class="text-muted">reject</text>

    <!-- NOT_ASKED -> GRANTED -->
    <path d="M120 65 Q210 100 295 65" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-green)"/>
    <text x="210" y="92" text-anchor="middle" class="text-muted">accept</text>

    <!-- DENIED -> GRANTED -->
    <path d="M260 55 L295 55" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-green)"/>
    <text x="277" y="48" text-anchor="middle" class="text-muted">enable</text>

    <!-- GRANTED -> REVOKED -->
    <path d="M350 80 L350 100 Q350 110 340 115 L265 135" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-red)"/>
    <text x="315" y="100" class="text-muted">withdraw</text>

    <!-- REVOKED -> GRANTED -->
    <path d="M260 125 L300 100 Q310 95 320 95 L350 95 L350 85" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-green)"/>
    <text x="320" y="118" class="text-muted">re-enable</text>

    <!-- Actions Table -->
    <rect x="20" y="180" width="380" height="145" rx="6" fill="#334155"/>
    <text x="210" y="200" text-anchor="middle" class="heading">State Actions</text>

    <text x="30" y="225" class="text-sm" fill="#eab308">NOT_ASKED:</text>
    <text x="110" y="225" class="text-sm">Show placeholder + prompt</text>

    <text x="30" y="248" class="text-sm" fill="#ef4444">DENIED:</text>
    <text x="110" y="248" class="text-sm">Show placeholder + info message</text>

    <text x="30" y="271" class="text-sm" fill="#22c55e">GRANTED:</text>
    <text x="110" y="271" class="text-sm">Load Disqus with theme</text>

    <text x="30" y="294" class="text-sm" fill="#ef4444">REVOKED:</text>
    <text x="110" y="294" class="text-sm">Unload Disqus, show placeholder</text>
  </g>

  <!-- PRIVACY REQUIREMENTS -->
  <g id="privacy-requirements" transform="translate(940, 430)">
    <text x="0" y="0" class="heading">PRIVACY REQUIREMENTS</text>

    <rect x="0" y="15" width="400" height="160" rx="8" fill="#1e293b" stroke="#8b5cf6"/>

    <text x="20" y="45" class="text-md" fill="#22c55e">✓ NFR-008: No Disqus load without consent</text>
    <text x="20" y="70" class="text-md" fill="#22c55e">✓ NFR-009: Consent persists across sessions</text>
    <text x="20" y="95" class="text-md" fill="#22c55e">✓ NFR-010: Syncs with consent manager</text>
    <text x="20" y="120" class="text-md" fill="#22c55e">✓ FR-016: Placeholder when no consent</text>
    <text x="20" y="145" class="text-md" fill="#22c55e">✓ FR-017: Enable action on placeholder</text>

    <!-- Dependency Note -->
    <rect x="0" y="190" width="400" height="60" rx="8" fill="#1e293b" stroke="#eab308"/>
    <text x="20" y="215" class="heading" fill="#eab308">DEPENDENCIES</text>
    <text x="20" y="235" class="text-sm">019-Google Analytics: Consent framework</text>
    <text x="200" y="235" class="text-sm">002-Cookie Consent: Storage</text>

    <!-- Edge Cases -->
    <rect x="0" y="265" width="400" height="85" rx="8" fill="#1e293b" stroke="#475569"/>
    <text x="20" y="290" class="heading">EDGE CASES HANDLED</text>
    <text x="20" y="312" class="text-sm">• Consent cookie expires → re-prompt</text>
    <text x="20" y="330" class="text-sm">• Consent granted but Disqus fails → show error, not placeholder</text>
    <text x="200" y="312" class="text-sm">• Multiple consent categories → check correct category</text>
    <text x="200" y="330" class="text-sm">• Typing when consent revoked → warn before unload</text>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
