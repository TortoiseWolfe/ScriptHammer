<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7ddf5"/>
      <stop offset="100%" stop-color="#b8d4f0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- CENTERED TITLE with text-anchor="middle" -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="18" font-weight="700" fill="#4b5563" letter-spacing="1">
    USER AUTHENTICATION - PROFILE AND SESSION MANAGEMENT
  </text>

  <!-- Section labels -->
  <text x="40" y="52" fill="#8b5cf6" font-family="system-ui, sans-serif"
        font-size="18" font-weight="bold">DESKTOP (16:9)</text>
  <text x="1500" y="52" fill="#d946ef" font-family="system-ui, sans-serif"
        font-size="15" font-weight="bold">MOBILE</text>

  <!-- DESKTOP (1280x720) -->
  <g id="desktop" transform="translate(40, 60)">
    <rect width="1280" height="720" rx="8" fill="#e8d4b8" stroke="#b8a080"/>

    <!-- Header include -->
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>

    <!-- Profile Page Title -->
    <text x="640" y="75" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="24" font-weight="bold" fill="#374151">Account Settings</text>

    <!-- Two-Column Layout -->
    <!-- Left Column: Profile Info -->
    <g transform="translate(40, 100)">
      <rect width="580" height="500" rx="8" fill="#f5f0e6" stroke="#b8a080"/>
      <text x="20" y="35" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#374151">Profile Information</text>

      <!-- Avatar and Name -->
      <g transform="translate(20, 55)">
        <circle cx="40" cy="40" r="40" fill="#dcc8a8" stroke="#b8a080"/>
        <text x="40" y="45" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="24" fill="#374151">JD</text>
        <text x="100" y="30" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#374151">John Doe</text>
        <text x="100" y="55" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">john.doe@example.com</text>
        <text x="100" y="75" font-family="system-ui, sans-serif" font-size="14" fill="#22c55e">Email Verified</text>
      </g>

      <!-- Display Name Field -->
      <g transform="translate(20, 160)">
        <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Display Name</text>
        <rect y="10" width="540" height="44" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="15" y="38" font-family="system-ui, sans-serif" font-size="14" fill="#374151">John Doe</text>
      </g>

      <!-- Username Field -->
      <g transform="translate(20, 235)">
        <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Username</text>
        <rect y="10" width="540" height="44" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="15" y="38" font-family="system-ui, sans-serif" font-size="14" fill="#374151">@johndoe</text>
      </g>

      <!-- Save Changes Button -->
      <g transform="translate(20, 310)">
        <rect width="200" height="44" rx="6" fill="#8b5cf6"/>
        <text x="100" y="28" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="16" font-weight="bold" fill="#ffffff">Save Changes</text>
      </g>

      <!-- Danger Zone -->
      <g transform="translate(20, 380)">
        <rect width="540" height="100" rx="6" fill="#fef2f2" stroke="#dc2626"/>
        <text x="20" y="30" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#991b1b">Danger Zone</text>
        <text x="20" y="55" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Permanently delete your account and all data</text>
        <rect x="20" y="68" width="180" height="36" rx="6" fill="#dc2626"/>
        <text x="110" y="91" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#ffffff">Delete Account</text>
      </g>
    </g>

    <!-- Right Column: Session Management -->
    <g transform="translate(660, 100)">
      <rect width="580" height="500" rx="8" fill="#f5f0e6" stroke="#b8a080"/>
      <text x="20" y="35" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#374151">Active Sessions</text>

      <!-- Current Session -->
      <g transform="translate(20, 55)">
        <rect width="540" height="90" rx="6" fill="#dcfce7" stroke="#22c55e"/>
        <text x="20" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#166534">Current Session</text>
        <text x="20" y="48" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Chrome on macOS - San Francisco, CA</text>
        <text x="20" y="70" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Active now</text>
        <rect x="420" y="25" width="100" height="32" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
        <text x="470" y="46" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" fill="#6b7280">This device</text>
      </g>

      <!-- Other Session 1 -->
      <g transform="translate(20, 160)">
        <rect width="540" height="80" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="20" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Safari on iPhone</text>
        <text x="20" y="48" font-family="system-ui, sans-serif" font-size="14" fill="#374151">New York, NY - Last active 2 hours ago</text>
        <rect x="420" y="20" width="100" height="32" rx="4" fill="#dc2626"/>
        <text x="470" y="41" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#ffffff">Revoke</text>
      </g>

      <!-- Other Session 2 -->
      <g transform="translate(20, 255)">
        <rect width="540" height="80" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="20" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Firefox on Windows</text>
        <text x="20" y="48" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Austin, TX - Last active 3 days ago</text>
        <rect x="420" y="20" width="100" height="32" rx="4" fill="#dc2626"/>
        <text x="470" y="41" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#ffffff">Revoke</text>
      </g>

      <!-- Revoke All Button -->
      <g transform="translate(20, 360)">
        <rect width="250" height="44" rx="6" fill="#f5f0e6" stroke="#dc2626"/>
        <text x="125" y="28" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#dc2626">Revoke All Other Sessions</text>
      </g>

      <!-- Change Password -->
      <g transform="translate(20, 420)">
        <rect width="540" height="65" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="20" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Password</text>
        <text x="20" y="48" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Last changed 30 days ago</text>
        <rect x="380" y="12" width="140" height="36" rx="4" fill="#8b5cf6"/>
        <text x="450" y="35" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#ffffff">Change</text>
      </g>
    </g>

    <!-- Footer include -->
    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>
  </g>

  <!-- DESKTOP CALLOUTS -->
  <g id="desktop-callouts">
    <circle cx="660" cy="280" r="14" fill="#dc2626"/>
    <text x="660" y="285" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">1</text>

    <circle cx="660" cy="540" r="14" fill="#dc2626"/>
    <text x="660" y="545" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">2</text>

    <circle cx="1280" cy="220" r="14" fill="#dc2626"/>
    <text x="1280" y="225" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">3</text>

    <circle cx="1280" cy="420" r="14" fill="#dc2626"/>
    <text x="1280" y="425" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">4</text>
  </g>

  <!-- MOBILE (360x720) -->
  <g id="mobile" transform="translate(1360, 60)">
    <rect width="360" height="720" rx="24" fill="#e8d4b8" stroke="#b8a080"/>

    <!-- Header include -->
    <use href="includes/header-mobile.svg#mobile-header-group" x="0" y="0"/>

    <!-- Mobile Profile Page -->
    <g transform="translate(15, 70)">
      <text x="165" y="20" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="18" font-weight="bold" fill="#374151">Account</text>

      <!-- Profile Card -->
      <g transform="translate(0, 35)">
        <rect width="330" height="100" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
        <circle cx="50" cy="50" r="35" fill="#dcc8a8" stroke="#b8a080"/>
        <text x="50" y="55" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="20" fill="#374151">JD</text>
        <text x="105" y="40" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">John Doe</text>
        <text x="105" y="60" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">john.doe@example.com</text>
        <text x="105" y="80" font-family="system-ui, sans-serif" font-size="14" fill="#22c55e">Verified</text>
      </g>

      <!-- Settings List -->
      <g transform="translate(0, 150)">
        <rect width="330" height="180" rx="6" fill="#f5f0e6" stroke="#b8a080"/>

        <g transform="translate(15, 15)">
          <text x="0" y="15" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Edit Profile</text>
          <text x="285" y="15" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">&gt;</text>
        </g>

        <line x1="15" y1="45" x2="315" y2="45" stroke="#b8a080"/>

        <g transform="translate(15, 55)">
          <text x="0" y="15" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Change Password</text>
          <text x="285" y="15" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">&gt;</text>
        </g>

        <line x1="15" y1="85" x2="315" y2="85" stroke="#b8a080"/>

        <g transform="translate(15, 95)">
          <text x="0" y="15" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Active Sessions</text>
          <text x="250" y="15" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">3</text>
          <text x="285" y="15" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">&gt;</text>
        </g>

        <line x1="15" y1="125" x2="315" y2="125" stroke="#b8a080"/>

        <g transform="translate(15, 135)">
          <text x="0" y="15" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Sign Out</text>
          <text x="285" y="15" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">&gt;</text>
        </g>
      </g>

      <!-- Danger Zone -->
      <g transform="translate(0, 345)">
        <rect width="330" height="80" rx="6" fill="#fef2f2" stroke="#dc2626"/>
        <text x="15" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#991b1b">Danger Zone</text>
        <rect x="15" y="40" width="150" height="32" rx="4" fill="#dc2626"/>
        <text x="90" y="61" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#ffffff">Delete Account</text>
      </g>
    </g>

    <!-- Footer include -->
    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
  </g>

  <!-- MOBILE CALLOUTS -->
  <g id="mobile-callouts">
    <circle cx="1750" cy="180" r="14" fill="#dc2626"/>
    <text x="1750" y="185" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">1</text>

    <circle cx="1750" cy="310" r="14" fill="#dc2626"/>
    <text x="1750" y="315" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">2</text>

    <circle cx="1750" cy="420" r="14" fill="#dc2626"/>
    <text x="1750" y="425" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">3</text>

    <circle cx="1750" cy="520" r="14" fill="#dc2626"/>
    <text x="1750" y="525" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">4</text>
  </g>

  <!-- ANNOTATIONS -->
  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>

    <!-- Column 1: US-006 Profile Management -->
    <g transform="translate(20, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" font-weight="bold" fill="#ffffff">1</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Profile Management</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">As a registered user, I need to manage</text>
      <text x="40" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">my profile and account settings.</text>
      <a href="#US-006"><rect x="40" y="62" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">US-006</text></a>
      <a href="#FR-024"><rect x="101" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="128" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-024</text></a>
      <a href="#FR-025"><rect x="162" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="189" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-025</text></a>
    </g>

    <!-- Column 2: Account Deletion -->
    <g transform="translate(470, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" font-weight="bold" fill="#ffffff">2</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Account Deletion</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Delete account and cascade delete</text>
      <text x="40" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">all associated data.</text>
      <a href="#US-006"><rect x="40" y="62" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">US-006</text></a>
      <a href="#FR-027"><rect x="101" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="128" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-027</text></a>
      <a href="#FR-028"><rect x="162" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="189" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-028</text></a>
    </g>

    <!-- Column 3: Session Management -->
    <g transform="translate(920, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" font-weight="bold" fill="#ffffff">3</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Active Sessions</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">View all active sessions and revoke</text>
      <text x="40" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">access from other devices.</text>
      <a href="#US-005"><rect x="40" y="62" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">US-005</text></a>
      <a href="#US-002"><rect x="101" y="62" width="55" height="22" rx="4" fill="#0891b2"/><text x="128" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">US-002</text></a>
      <a href="#FR-029"><rect x="162" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="189" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-029</text></a>
      <a href="#FR-030"><rect x="223" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="250" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-030</text></a>
    </g>

    <!-- Column 4: Security -->
    <g transform="translate(1370, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" font-weight="bold" fill="#ffffff">4</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Protected Access</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Route protection ensures only</text>
      <text x="40" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">authenticated users access this page.</text>
      <a href="#US-005"><rect x="40" y="62" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">US-005</text></a>
      <a href="#FR-017"><rect x="101" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="128" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-017</text></a>
      <a href="#SC-004"><rect x="162" y="62" width="55" height="22" rx="4" fill="#ea580c"/><text x="189" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">SC-004</text></a>
    </g>
  </g>

  <!-- SIGNATURE -->
  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif"
        font-size="18" font-weight="bold">
    003:03 | User Authentication - Profile and Session Management | ScriptHammer
  </text>
</svg>
