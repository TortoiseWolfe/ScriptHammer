    <!-- Breadcrumb -->
    <text x="880" y="90" text-anchor="end" class="text-muted">Dashboard / Settings</text>

    <!-- Left sidebar - Navigation -->
    <rect x="40" y="120" width="200" height="580" rx="8" fill="#1e293b"/>

    <!-- Profile link (active) -->
    <rect x="50" y="135" width="180" height="40" rx="6" fill="#8b5cf6" opacity="0.2"/>
    <rect x="50" y="135" width="4" height="40" rx="2" fill="#8b5cf6"/>
    <text x="70" y="160" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="12">👤 Profile</text>

    <!-- Security link -->
    <rect x="50" y="185" width="180" height="40" rx="6" fill="transparent"/>
    <text x="70" y="210" class="text-md">🔒 Security</text>

    <!-- Sessions link -->
    <rect x="50" y="235" width="180" height="40" rx="6" fill="transparent"/>
    <text x="70" y="260" class="text-md">📱 Sessions</text>

    <!-- Notifications link -->
    <rect x="50" y="285" width="180" height="40" rx="6" fill="transparent"/>
    <text x="70" y="310" class="text-md">🔔 Notifications</text>

