    <!-- Warning card -->
    <rect x="20" y="145" width="320" height="160" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
    <text x="180" y="175" text-anchor="middle" class="heading" fill="#ef4444">Delete Your Account</text>

    <text x="40" y="205" class="text-sm">This action is permanent and cannot</text>
    <text x="40" y="225" class="text-sm">be undone. All your data will be</text>
    <text x="40" y="245" class="text-sm">permanently deleted including:</text>

    <text x="50" y="275" class="text-muted">• Profile information</text>
    <text x="50" y="290" class="text-muted">• Payment history</text>

    <!-- Confirmation input -->
    <text x="40" y="340" class="text-sm">Type "DELETE" to confirm:</text>
    <rect x="40" y="350" width="280" height="36" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
    <text x="55" y="373" class="text-muted">DELETE</text>

    <!-- Delete button (disabled state) -->
    <rect x="40" y="405" width="280" height="44" rx="8" fill="#7f1d1d" opacity="0.5"/>
    <text x="180" y="432" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="13">Delete My Account</text>

    <!-- Cancel option -->
    <text x="180" y="480" text-anchor="middle" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="12">Cancel and go back</text>

    <!-- GDPR note -->
    <rect x="20" y="510" width="320" height="80" rx="8" fill="#334155"/>
    <text x="40" y="535" class="text-sm">📋 GDPR Rights</text>
    <text x="40" y="555" class="text-muted">You can also request a copy of</text>
    <text x="40" y="570" class="text-muted">your data before deletion.</text>
    <text x="40" y="580" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="10">Export My Data →</text>

    <!-- Verification required note -->
    <rect x="20" y="605" width="320" height="60" rx="8" fill="#1e293b"/>
    <text x="40" y="630" class="text-sm">🔐 Re-authentication Required</text>
