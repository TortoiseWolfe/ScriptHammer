      <rect x="20" y="375" width="400" height="40" rx="6" fill="#ffffff" stroke="#d1d5db"/>
      <text x="35" y="400" class="text-md">@johndoe</text>
      <text x="20" y="430" class="text-muted">scripthammer.com/@johndoe</text>

