    <rect x="50" y="635" width="180" height="40" rx="6" fill="#7f1d1d" opacity="0.3"/>
    <text x="70" y="660" fill="#ef4444" font-family="system-ui, sans-serif" font-size="12">⚠ Delete Account</text>

    <!-- Main content area -->
    <rect x="250" y="120" width="440" height="580" rx="8" fill="#1e293b"/>

    <!-- Profile section header -->
    <text x="270" y="155" class="heading">Profile Information</text>
    <text x="270" y="175" class="text-sm">Update your account profile details</text>

    <!-- Avatar section -->
    <circle cx="330" cy="240" r="40" fill="#334155"/>
    <text x="330" y="250" text-anchor="middle" fill="#8b5cf6" font-size="24">JD</text>
    <rect x="390" y="220" width="120" height="32" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="450" y="240" text-anchor="middle" class="text-sm">Change Avatar</text>

    <!-- Display name field -->
    <text x="270" y="310" class="text-sm">Display Name</text>
    <rect x="270" y="320" width="400" height="36" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="285" y="343" class="text-md">John Doe</text>

    <!-- Username field -->
    <text x="270" y="380" class="text-sm">Username</text>
    <rect x="270" y="390" width="400" height="36" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="285" y="413" class="text-md">@johndoe</text>

    <!-- Email field (read-only) -->
    <text x="270" y="450" class="text-sm">Email Address</text>
    <rect x="270" y="460" width="400" height="36" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" opacity="0.5"/>
    <text x="285" y="483" class="text-muted">john@example.com</text>
    <text x="650" y="483" text-anchor="end" class="text-sm" fill="#22c55e">✓ Verified</text>

    <!-- Bio field -->
    <text x="270" y="520" class="text-sm">Bio</text>
    <rect x="270" y="530" width="400" height="80" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="285" y="555" class="text-muted">Tell us a little about yourself...</text>

    <!-- Save button -->
    <rect x="270" y="630" width="120" height="40" rx="8" fill="url(#accentGrad)"/>
    <text x="330" y="656" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Save Changes</text>

    <rect x="400" y="630" width="100" height="40" rx="8" fill="#334155"/>
    <text x="450" y="656" text-anchor="middle" class="text-md">Cancel</text>

    <!-- Right panel - Active Sessions -->
    <rect x="700" y="120" width="240" height="580" rx="8" fill="#1e293b"/>

    <text x="720" y="155" class="heading">Active Sessions</text>
    <text x="720" y="175" class="text-sm">Devices signed into your account</text>

    <!-- Current session -->
    <rect x="710" y="195" width="220" height="80" rx="6" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
    <text x="725" y="220" class="text-sm" fill="#22c55e">● Current Session</text>
    <text x="725" y="240" class="text-md">Chrome on macOS</text>
    <text x="725" y="260" class="text-muted">San Francisco, CA • Active now</text>

    <!-- Other session 1 -->
    <rect x="710" y="285" width="220" height="80" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="725" y="310" class="text-md">Safari on iPhone</text>
    <text x="725" y="330" class="text-muted">San Francisco, CA • 2 hours ago</text>
    <text x="910" y="355" text-anchor="end" fill="#ef4444" font-family="system-ui, sans-serif" font-size="10">Revoke</text>

    <!-- Other session 2 -->
    <rect x="710" y="375" width="220" height="80" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="725" y="400" class="text-md">Firefox on Windows</text>
    <text x="725" y="420" class="text-muted">New York, NY • Yesterday</text>
    <text x="910" y="445" text-anchor="end" fill="#ef4444" font-family="system-ui, sans-serif" font-size="10">Revoke</text>

    <!-- Revoke all button -->
    <rect x="710" y="470" width="220" height="36" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
    <text x="820" y="494" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="11">Revoke All Other Sessions</text>

    <!-- Session count -->
    <text x="720" y="540" class="text-muted">3 active sessions</text>
    <text x="720" y="560" class="text-muted">30-day session: Enabled</text>
  </g>

  <!-- MOBILE SECTION -->
  <text x="980" y="52" class="label-mobile">MOBILE - DELETE ACCOUNT</text>

  <g id="mobile-view" transform="translate(980, 60)">
