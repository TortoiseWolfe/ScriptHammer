      <rect x="20" y="455" width="120" height="40" rx="6" fill="#8b5cf6"/>
      <text x="80" y="480" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="bold">Save Changes</text>

