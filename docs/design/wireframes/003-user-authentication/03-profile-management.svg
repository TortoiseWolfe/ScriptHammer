    <text x="120" y="755" text-anchor="middle" class="text-muted">View/update profile</text>

    <rect x="700" y="720" width="160" height="50" rx="4" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
    <text x="780" y="740" text-anchor="middle" class="annotation">FR-029/030</text>
    <text x="780" y="755" text-anchor="middle" class="text-muted">View/revoke sessions</text>
  </g>

  <!-- Leader lines -->
  <g id="leader-lines">
    <line x1="120" y1="720" x2="350" y2="390" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,2"/>
    <line x1="780" y1="720" x2="820" y2="540" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,2"/>
