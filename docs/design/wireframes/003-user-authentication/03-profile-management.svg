  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#64748b" letter-spacing="1">PROFILE MANAGEMENT &amp; SESSIONS</text>

  <!-- DESKTOP SECTION -->
  <text x="40" y="52" class="label-desktop">DESKTOP - PROFILE &amp; SETTINGS</text>

  <g id="desktop-view">
