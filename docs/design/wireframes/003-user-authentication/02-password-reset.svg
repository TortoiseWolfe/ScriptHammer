    <circle cx="880" cy="180" r="30" fill="#f0fdf4" stroke="#86efac"/>
    <text x="880" y="190" text-anchor="middle" font-size="24">🔒</text>

    <!-- New Password -->
    <text x="760" y="230" class="heading-sm">New Password</text>
    <rect x="760" y="240" width="240" height="40" rx="6" fill="#f9fafb" stroke="#22c55e" stroke-width="2"/>
    <text x="775" y="265" class="text-muted">••••••••••••</text>

    <!-- Strength Indicator -->
    <rect x="760" y="290" width="60" height="4" rx="2" fill="#22c55e"/>
    <rect x="825" y="290" width="60" height="4" rx="2" fill="#22c55e"/>
    <rect x="890" y="290" width="60" height="4" rx="2" fill="#22c55e"/>
    <rect x="955" y="290" width="45" height="4" rx="2" fill="#e5e7eb"/>
    <text x="760" y="310" class="success-text">Strong</text>

    <!-- Confirm Password -->
    <text x="760" y="340" class="heading-sm">Confirm Password</text>
    <rect x="760" y="350" width="240" height="40" rx="6" fill="#f9fafb" stroke="#22c55e" stroke-width="2"/>
    <text x="775" y="375" class="text-muted">••••••••••••</text>
    <text x="980" y="375" class="success-text">✓</text>

    <!-- Requirements -->
    <rect x="760" y="405" width="240" height="60" rx="6" fill="#f0fdf4"/>
    <text x="775" y="425" class="success-text">✓ 8+ chars, upper, lower, number, special</text>
    <text x="775" y="445" class="success-text">✓ Passwords match</text>

    <!-- Reset Button -->
    <rect x="760" y="480" width="240" height="44" rx="6" fill="#8b5cf6"/>
    <text x="880" y="508" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="bold">Reset Password</text>

