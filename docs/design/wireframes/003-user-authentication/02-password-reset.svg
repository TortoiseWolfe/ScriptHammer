    <circle cx="180" cy="100" r="16" fill="#8b5cf6"/>
    <text x="180" y="105" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="12" font-weight="bold">1</text>
    <text x="180" y="130" text-anchor="middle" class="heading">Request Reset</text>

    <!-- Icon -->
    <circle cx="180" cy="180" r="30" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="180" y="190" text-anchor="middle" font-size="24">🔑</text>

    <!-- Description -->
    <text x="180" y="235" text-anchor="middle" class="text-md">Forgot your password?</text>
    <text x="180" y="255" text-anchor="middle" class="text-sm">Enter your email to receive a reset link.</text>

    <!-- Email Field -->
    <text x="60" y="290" class="heading-sm">Email Address</text>
    <rect x="60" y="300" width="200" height="40" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
