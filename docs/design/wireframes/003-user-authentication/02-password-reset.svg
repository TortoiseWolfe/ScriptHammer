    <!-- Error state: Expired link -->
    <!-- Warning icon -->
    <circle cx="180" cy="130" r="45" fill="#fef3c7" stroke="#eab308" stroke-width="2"/>
    <text x="180" y="142" text-anchor="middle" font-size="36" fill="#eab308">!</text>

    <!-- Title -->
