    <rect x="60" y="455" width="200" height="40" rx="6" fill="#fef2f2" stroke="#fecaca"/>
    <text x="75" y="478" class="error-text">✗ Email not found</text>

    <!-- Arrow -->
    <line x1="330" y1="295" x2="370" y2="295" stroke="#8b5cf6" stroke-width="2"/>
    <polygon points="370,290 380,295 370,300" fill="#8b5cf6"/>

    <!-- Step 2: Check Email -->
    <rect x="390" y="70" width="280" height="450" rx="8" fill="#ffffff" stroke="#e5e7eb"/>

