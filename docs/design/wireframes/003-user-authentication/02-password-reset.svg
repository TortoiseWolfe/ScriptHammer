<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800">
  <!-- ============================================================
       GENERATED BY: /wireframe skill
       SOURCE: features/foundation/003-user-authentication/spec.md
       DATE: 2026-01-01
       THEME: Light (UX/Frontend) - v3 True Parchment
       DO NOT MANUALLY EDIT - Regenerate with /wireframe command
       ============================================================ -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c7ddf5"/>
      <stop offset="100%" style="stop-color:#b8d4f0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
    <style>
      .heading-lg { fill: #1a1a2e; font-family: system-ui, sans-serif; font-size: 24px; font-weight: 800; }
      .heading { fill: #1a1a2e; font-family: system-ui, sans-serif; font-size: 16px; font-weight: 700; }
      .text-md { fill: #2d3748; font-family: system-ui, sans-serif; font-size: 14px; font-weight: 500; }
      .text-sm { fill: #4a5568; font-family: system-ui, sans-serif; font-size: 12px; font-weight: 500; }
      .text-muted { fill: #5a6577; font-family: system-ui, sans-serif; font-size: 11px; font-weight: 500; }
      .annotation { fill: #8b5cf6; font-family: monospace; font-size: 12px; font-weight: 600; }
      .label-desktop { fill: #8b5cf6; font-family: monospace; font-size: 13px; font-weight: bold; }
      .label-mobile { fill: #d946ef; font-family: monospace; font-size: 13px; font-weight: bold; }
      .input-label { fill: #2d3748; font-family: system-ui, sans-serif; font-size: 12px; font-weight: 600; }
      .link-text { fill: #8b5cf6; font-family: system-ui, sans-serif; font-size: 12px; font-weight: 500; }
      .btn-text { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 14px; font-weight: 600; }
      .success-text { fill: #22c55e; font-family: system-ui, sans-serif; font-size: 12px; font-weight: 500; }
      .error-text { fill: #ef4444; font-family: system-ui, sans-serif; font-size: 11px; font-weight: 500; }
      .step-number { fill: #8b5cf6; font-family: system-ui, sans-serif; font-size: 18px; font-weight: 800; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.35">
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#6b8cba"/>
    </pattern>
    <rect width="1400" height="800" fill="url(#dots)"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1400" height="3" fill="url(#accentGrad)"/>

  <!-- Title -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#5a6577" letter-spacing="1">USER AUTHENTICATION - PASSWORD RESET FLOW</text>

  <!-- ==================== STEP 1: REQUEST ==================== -->
  <text x="40" y="52" class="label-desktop">STEP 1: REQUEST RESET</text>

  <g id="step1-request" transform="translate(40, 60)">
    <rect x="0" y="0" width="280" height="380" rx="12" fill="#e8d4b8" stroke="#b8a080" stroke-width="1"/>

    <!-- Step indicator -->
    <circle cx="30" cy="30" r="18" fill="#8b5cf6"/>
    <text x="30" y="36" text-anchor="middle" class="btn-text">1</text>

    <!-- Icon placeholder -->
    <circle cx="140" cy="100" r="35" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="140" y="108" text-anchor="middle" class="heading">?</text>

    <!-- Title -->
    <text x="140" y="165" text-anchor="middle" class="heading">Forgot Password?</text>
    <text x="140" y="185" text-anchor="middle" class="text-sm">Enter your email address</text>
    <text x="140" y="200" text-anchor="middle" class="text-sm">and we'll send you a reset link</text>

    <!-- Email field -->
    <text x="25" y="235" class="input-label">Email Address</text>
    <rect x="25" y="245" width="230" height="40" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="40" y="270" class="text-muted">you@example.com</text>

    <!-- Submit button -->
    <rect x="25" y="305" width="230" height="40" rx="6" fill="#8b5cf6"/>
    <text x="140" y="330" text-anchor="middle" class="btn-text">Send Reset Link</text>

    <!-- Back link -->
    <text x="140" y="365" text-anchor="middle" class="link-text">Back to Sign In</text>
  </g>

  <!-- ==================== STEP 2: EMAIL SENT ==================== -->
  <text x="340" y="52" class="label-desktop">STEP 2: EMAIL SENT</text>

  <g id="step2-sent" transform="translate(340, 60)">
    <rect x="0" y="0" width="280" height="380" rx="12" fill="#e8d4b8" stroke="#b8a080" stroke-width="1"/>

    <!-- Step indicator -->
    <circle cx="30" cy="30" r="18" fill="#8b5cf6"/>
    <text x="30" y="36" text-anchor="middle" class="btn-text">2</text>

    <!-- Success icon -->
    <circle cx="140" cy="100" r="35" fill="#dcfce7" stroke="#22c55e"/>
    <text x="140" y="110" text-anchor="middle" font-size="28" fill="#22c55e">&#x2713;</text>

    <!-- Title -->
    <text x="140" y="165" text-anchor="middle" class="heading">Check Your Email</text>
    <text x="140" y="190" text-anchor="middle" class="text-sm">We've sent a password reset</text>
    <text x="140" y="208" text-anchor="middle" class="text-sm">link to:</text>
    <text x="140" y="235" text-anchor="middle" class="text-md" font-weight="600">user@example.com</text>

    <!-- Instructions -->
    <rect x="25" y="260" width="230" height="60" rx="6" fill="#dcc8a8"/>
    <text x="140" y="285" text-anchor="middle" class="text-sm">Link expires in 1 hour</text>
    <text x="140" y="305" text-anchor="middle" class="text-muted">Check spam folder if not found</text>

    <!-- Resend -->
    <text x="140" y="345" text-anchor="middle" class="text-sm">Didn't receive it?</text>
    <text x="140" y="365" text-anchor="middle" class="link-text">Resend email</text>
  </g>

  <!-- ==================== STEP 3: RESET FORM ==================== -->
  <text x="640" y="52" class="label-desktop">STEP 3: NEW PASSWORD</text>

  <g id="step3-reset" transform="translate(640, 60)">
    <rect x="0" y="0" width="280" height="380" rx="12" fill="#e8d4b8" stroke="#b8a080" stroke-width="1"/>

    <!-- Step indicator -->
    <circle cx="30" cy="30" r="18" fill="#8b5cf6"/>
    <text x="30" y="36" text-anchor="middle" class="btn-text">3</text>

    <!-- Icon -->
    <circle cx="140" cy="85" r="30" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="140" y="93" text-anchor="middle" class="heading">&#x1F512;</text>

    <!-- Title -->
    <text x="140" y="140" text-anchor="middle" class="heading">Set New Password</text>
    <text x="140" y="158" text-anchor="middle" class="text-sm">Create a strong password</text>

    <!-- New password -->
    <text x="25" y="190" class="input-label">New Password</text>
    <rect x="25" y="200" width="230" height="40" rx="6" fill="#f5f0e6" stroke="#b8a080"/>

    <!-- Confirm password -->
    <text x="25" y="260" class="input-label">Confirm Password</text>
    <rect x="25" y="270" width="230" height="40" rx="6" fill="#f5f0e6" stroke="#b8a080"/>

    <!-- Requirements -->
    <text x="25" y="330" class="text-muted">Min 8 chars, upper, lower, number, special</text>

    <!-- Submit -->
    <rect x="25" y="345" width="230" height="40" rx="6" fill="#8b5cf6"/>
    <text x="140" y="370" text-anchor="middle" class="btn-text">Reset Password</text>
  </g>

  <!-- ==================== MOBILE SECTION ==================== -->
  <text x="960" y="52" class="label-mobile">MOBILE - EXPIRED STATE</text>

  <g id="mobile-view" transform="translate(960, 60)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="360" height="700" rx="24" fill="#c8b898" stroke="#a08860" stroke-width="2"/>
    <!-- Screen -->
    <rect x="10" y="10" width="340" height="680" rx="16" fill="#e8d4b8"/>
    <!-- Status bar -->
    <rect x="10" y="10" width="340" height="28" rx="16" fill="#dcc8a8"/>
    <text x="30" y="28" class="text-sm">9:41</text>

    <!-- Error state: Expired link -->
    <!-- Warning icon -->
    <circle cx="180" cy="150" r="45" fill="#fef3c7" stroke="#eab308" stroke-width="2"/>
    <text x="180" y="162" text-anchor="middle" font-size="36" fill="#eab308">!</text>

    <!-- Title -->
    <text x="180" y="230" text-anchor="middle" class="heading-lg">Link Expired</text>
    <text x="180" y="260" text-anchor="middle" class="text-md">This password reset link</text>
    <text x="180" y="280" text-anchor="middle" class="text-md">has expired</text>

    <!-- Explanation -->
    <rect x="30" y="310" width="280" height="80" rx="8" fill="#dcc8a8"/>
    <text x="170" y="340" text-anchor="middle" class="text-sm">Password reset links are valid</text>
    <text x="170" y="360" text-anchor="middle" class="text-sm">for 1 hour for security reasons</text>
    <text x="170" y="380" text-anchor="middle" class="text-muted">(FR-011)</text>

    <!-- Request new link button -->
    <rect x="30" y="420" width="280" height="48" rx="6" fill="#8b5cf6"/>
    <text x="170" y="450" text-anchor="middle" class="btn-text">Request New Link</text>

    <!-- Back to sign in -->
    <text x="170" y="500" text-anchor="middle" class="link-text">Back to Sign In</text>

    <!-- Divider -->
    <line x1="50" y1="540" x2="290" y2="540" stroke="#b8a080"/>

    <!-- Help text -->
    <text x="170" y="575" text-anchor="middle" class="text-sm">Need help?</text>
    <text x="170" y="595" text-anchor="middle" class="link-text">Contact Support</text>

    <!-- Home indicator -->
    <rect x="140" y="665" width="80" height="5" rx="2.5" fill="#b8a080"/>
  </g>

  <!-- ==================== FLOW ARROWS ==================== -->
  <g id="flow-arrows">
    <!-- Arrow 1→2 -->
    <line x1="320" y1="250" x2="340" y2="250" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowhead)"/>
    <!-- Arrow 2→3 -->
    <line x1="620" y1="250" x2="640" y2="250" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- ==================== ANNOTATIONS ==================== -->
  <g id="annotations" transform="translate(0, 460)">
    <rect x="40" y="0" width="280" height="80" rx="8" fill="#e8d4b8" stroke="#8b5cf6" stroke-width="1"/>
    <text x="55" y="22" class="annotation">User Story 3</text>
    <text x="55" y="42" class="text-sm">Password reset via email</text>
    <text x="55" y="60" class="text-muted">FR-010: Reset functionality</text>
    <text x="55" y="75" class="text-muted">FR-011: 1 hour expiration</text>

    <rect x="340" y="0" width="280" height="80" rx="8" fill="#e8d4b8" stroke="#8b5cf6" stroke-width="1"/>
    <text x="355" y="22" class="annotation">Email Delivery</text>
    <text x="355" y="42" class="text-sm">Edge case: delivery failure</text>
    <text x="355" y="60" class="text-muted">Show error immediately</text>
    <text x="355" y="75" class="text-muted">Manual retry required</text>

    <rect x="640" y="0" width="280" height="80" rx="8" fill="#e8d4b8" stroke="#8b5cf6" stroke-width="1"/>
    <text x="655" y="22" class="annotation">SC-005</text>
    <text x="655" y="42" class="text-sm">Complete flow in &lt;2 min</text>
    <text x="655" y="60" class="text-muted">Request → Email → Reset → Sign in</text>
  </g>

  <!-- ==================== SUCCESS STATE INSET ==================== -->
  <g id="success-state" transform="translate(40, 560)">
    <rect x="0" y="0" width="880" height="110" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
    <text x="20" y="25" class="heading" fill="#166534">Password Reset Complete</text>
    <text x="20" y="50" class="text-md" fill="#166534">Your password has been successfully updated.</text>
    <text x="20" y="75" class="text-sm" fill="#166534">You can now sign in with your new password.</text>
    <rect x="20" y="85" width="140" height="32" rx="6" fill="#22c55e"/>
    <text x="90" y="106" text-anchor="middle" class="btn-text">Sign In Now</text>

    <!-- Checkmark -->
    <circle cx="830" cy="55" r="30" fill="#22c55e"/>
    <text x="830" y="65" text-anchor="middle" font-size="28" fill="#ffffff">&#x2713;</text>
  </g>

  <!-- Footer -->
  <text x="700" y="780" text-anchor="middle" class="text-muted">003-user-authentication | Password Reset Flow | ScriptHammer</text>
</svg>
