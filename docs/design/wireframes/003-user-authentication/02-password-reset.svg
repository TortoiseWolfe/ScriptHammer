  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
    <style>
      .heading-lg { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 20px; font-weight: bold; }
      .heading { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 14px; font-weight: bold; }
      .text-md { fill: #cbd5e1; font-family: system-ui, sans-serif; font-size: 12px; }
      .text-sm { fill: #94a3b8; font-family: system-ui, sans-serif; font-size: 10px; }
      .text-muted { fill: #64748b; font-family: system-ui, sans-serif; font-size: 10px; }
      .annotation { fill: #8b5cf6; font-family: monospace; font-size: 10px; }
      .label-desktop { fill: #8b5cf6; font-family: monospace; font-size: 11px; font-weight: bold; }
      .label-mobile { fill: #d946ef; font-family: monospace; font-size: 11px; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.05">
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#fff"/>
    </pattern>
    <rect width="1400" height="800" fill="url(#dots)"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1400" height="3" fill="url(#accentGrad)"/>

  <!-- Title -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#64748b" letter-spacing="1">PASSWORD RESET FLOW</text>

  <!-- DESKTOP SECTION - 3-step flow -->
  <text x="40" y="52" class="label-desktop">DESKTOP - PASSWORD RESET STEPS</text>

  <g id="desktop-view">
    <!-- Step indicators -->
    <g transform="translate(160, 80)">
      <!-- Step 1 - Active -->
      <circle cx="0" cy="20" r="16" fill="#8b5cf6"/>
      <text x="0" y="25" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">1</text>
      <text x="0" y="50" text-anchor="middle" class="text-sm" fill="#8b5cf6">Request</text>

      <!-- Connector -->
      <line x1="20" y1="20" x2="100" y2="20" stroke="#475569" stroke-width="2" stroke-dasharray="4,4"/>

      <!-- Step 2 -->
      <circle cx="120" cy="20" r="16" fill="#334155" stroke="#475569" stroke-width="2"/>
      <text x="120" y="25" text-anchor="middle" class="text-muted">2</text>
      <text x="120" y="50" text-anchor="middle" class="text-muted">Email</text>

      <!-- Connector -->
      <line x1="140" y1="20" x2="220" y2="20" stroke="#475569" stroke-width="2" stroke-dasharray="4,4"/>

      <!-- Step 3 -->
      <circle cx="240" cy="20" r="16" fill="#334155" stroke="#475569" stroke-width="2"/>
      <text x="240" y="25" text-anchor="middle" class="text-muted">3</text>
      <text x="240" y="50" text-anchor="middle" class="text-muted">Reset</text>
    </g>

    <!-- Step 1: Request Reset -->
    <rect x="40" y="150" width="280" height="350" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="180" y="185" text-anchor="middle" class="heading">Forgot Password</text>
    <text x="180" y="205" text-anchor="middle" class="text-sm">Enter your email to receive a reset link</text>

    <text x="60" y="245" class="text-sm">Email Address</text>
    <rect x="60" y="255" width="240" height="36" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="75" y="278" class="text-muted">you@example.com</text>

    <rect x="60" y="310" width="240" height="40" rx="8" fill="url(#accentGrad)"/>
    <text x="180" y="336" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Send Reset Link</text>

    <text x="180" y="380" text-anchor="middle" class="text-sm">Remember your password?</text>
    <text x="180" y="400" text-anchor="middle" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="11">Back to Sign In</text>

    <!-- Expiry note -->
    <rect x="60" y="430" width="240" height="40" rx="6" fill="#334155"/>
    <text x="180" y="450" text-anchor="middle" class="text-muted">⏱ Link expires in 1 hour</text>
    <text x="180" y="465" text-anchor="middle" class="text-muted">(FR-011)</text>

    <!-- Step 2: Check Email -->
    <rect x="340" y="150" width="280" height="350" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="480" y="185" text-anchor="middle" class="heading">Check Your Email</text>

    <!-- Email icon -->
    <rect x="440" y="220" width="80" height="60" rx="8" fill="#334155" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="450" y="230" width="60" height="40" rx="4" fill="#0f172a"/>
    <polygon points="480,230 450,255 510,255" fill="#8b5cf6" opacity="0.5"/>

    <text x="480" y="310" text-anchor="middle" class="text-md">We sent a password reset link to</text>
    <text x="480" y="330" text-anchor="middle" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="12">user@example.com</text>

    <text x="480" y="370" text-anchor="middle" class="text-sm">Didn't receive the email?</text>
    <text x="480" y="390" text-anchor="middle" class="text-sm">Check spam folder or</text>
    <text x="480" y="410" text-anchor="middle" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="11">resend link</text>

    <!-- Timer indication -->
    <rect x="360" y="440" width="240" height="32" rx="6" fill="#334155"/>
    <text x="480" y="460" text-anchor="middle" class="text-muted">Resend available in 59s</text>

    <!-- Step 3: Set New Password -->
    <rect x="640" y="150" width="280" height="350" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="780" y="185" text-anchor="middle" class="heading">Set New Password</text>
    <text x="780" y="205" text-anchor="middle" class="text-sm">Create a strong password</text>

    <text x="660" y="245" class="text-sm">New Password</text>
    <rect x="660" y="255" width="240" height="36" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="675" y="278" class="text-muted">••••••••</text>

    <!-- Password requirements -->
    <text x="660" y="310" class="text-sm" fill="#22c55e">✓ 8+ characters</text>
    <text x="660" y="325" class="text-sm" fill="#22c55e">✓ Uppercase letter</text>
    <text x="660" y="340" class="text-sm" fill="#64748b">○ Number</text>
    <text x="660" y="355" class="text-sm" fill="#64748b">○ Special character</text>

    <text x="660" y="385" class="text-sm">Confirm Password</text>
    <rect x="660" y="395" width="240" height="36" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>

    <rect x="660" y="450" width="240" height="40" rx="8" fill="#334155"/>
    <text x="780" y="476" text-anchor="middle" class="text-muted">Reset Password</text>
  </g>

  <!-- MOBILE SECTION - Success State -->
  <text x="980" y="52" class="label-mobile">MOBILE - SUCCESS STATE</text>

  <g id="mobile-view" transform="translate(980, 60)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="360" height="700" rx="24" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <rect x="10" y="10" width="340" height="680" rx="16" fill="#0f172a"/>

    <!-- Status bar -->
    <rect x="10" y="10" width="340" height="28" rx="16" fill="#1e293b"/>
    <text x="30" y="28" class="text-sm">9:41</text>
    <text x="320" y="28" text-anchor="end" class="text-sm">📶 🔋</text>

    <!-- Success content -->
    <!-- Checkmark circle -->
    <circle cx="180" cy="200" r="50" fill="#22c55e" opacity="0.15"/>
    <circle cx="180" cy="200" r="40" fill="#22c55e" opacity="0.3"/>
    <circle cx="180" cy="200" r="30" fill="#22c55e"/>
    <text x="180" y="210" text-anchor="middle" fill="#fff" font-size="24">✓</text>

    <text x="180" y="280" text-anchor="middle" class="heading-lg">Password Reset!</text>
    <text x="180" y="310" text-anchor="middle" class="text-md">Your password has been</text>
    <text x="180" y="330" text-anchor="middle" class="text-md">successfully updated.</text>

    <text x="180" y="375" text-anchor="middle" class="text-sm">You can now sign in with</text>
    <text x="180" y="395" text-anchor="middle" class="text-sm">your new password.</text>

    <!-- CTA -->
    <rect x="30" y="440" width="300" height="44" rx="8" fill="url(#accentGrad)"/>
    <text x="180" y="468" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Sign In Now</text>

    <!-- Security note -->
    <rect x="30" y="510" width="300" height="80" rx="8" fill="#334155"/>
    <text x="180" y="535" text-anchor="middle" class="text-sm">🔒 Security Tip</text>
    <text x="180" y="555" text-anchor="middle" class="text-muted">All other sessions have been</text>
    <text x="180" y="570" text-anchor="middle" class="text-muted">signed out for your protection.</text>

    <!-- Expired link error state (smaller, below) -->
    <rect x="30" y="610" width="300" height="60" rx="8" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
    <text x="180" y="635" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="11">⚠ Link expired</text>
    <text x="180" y="655" text-anchor="middle" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="11">Request new link →</text>
  </g>

  <!-- Annotations -->
  <g id="annotations">
    <rect x="40" y="530" width="200" height="50" rx="4" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
    <text x="140" y="550" text-anchor="middle" class="annotation">FR-010/011</text>
    <text x="140" y="565" text-anchor="middle" class="text-muted">Reset via email, 1hr expiry</text>

    <rect x="640" y="530" width="200" height="50" rx="4" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
    <text x="740" y="550" text-anchor="middle" class="annotation">FR-003</text>
    <text x="740" y="565" text-anchor="middle" class="text-muted">Password requirements</text>
  </g>

  <!-- Flow arrows -->
  <g id="flow-arrows">
    <path d="M325 325 L335 325" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M625 325 L635 325" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
  </defs>
</svg>