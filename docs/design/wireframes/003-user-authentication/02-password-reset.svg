    <rect x="40" y="650" width="120" height="25" rx="4" fill="#ffffff" stroke="#8b5cf6"/>
    <text x="100" y="667" text-anchor="middle" class="annotation">FR-010</text>

    <rect x="440" y="650" width="130" height="25" rx="4" fill="#ffffff" stroke="#8b5cf6"/>
    <text x="505" y="667" text-anchor="middle" class="annotation">FR-011: 1hr expiry</text>

    <rect x="760" y="650" width="120" height="25" rx="4" fill="#ffffff" stroke="#8b5cf6"/>
    <text x="820" y="667" text-anchor="middle" class="annotation">FR-003</text>
