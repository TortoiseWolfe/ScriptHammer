      <circle cx="0" cy="0" r="12" fill="#8b5cf6"/>
      <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">1</text>
      <line x1="15" y1="0" x2="80" y2="0" stroke="#8b5cf6" stroke-width="2"/>
      <circle cx="95" cy="0" r="12" fill="#d1d5db"/>
