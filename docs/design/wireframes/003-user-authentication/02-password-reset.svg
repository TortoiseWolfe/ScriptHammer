    <line x1="680" y1="295" x2="720" y2="295" stroke="#8b5cf6" stroke-width="2"/>
    <polygon points="720,290 730,295 720,300" fill="#8b5cf6"/>

    <!-- Step 3: Set New Password -->
    <rect x="740" y="70" width="280" height="450" rx="8" fill="#ffffff" stroke="#e5e7eb"/>

    <!-- Step Indicator -->
    <circle cx="880" cy="100" r="16" fill="#8b5cf6"/>
