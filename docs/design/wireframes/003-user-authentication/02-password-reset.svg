      .text-muted { fill: #9ca3af; font-family: system-ui, sans-serif; font-size: 10px; }
      .annotation { fill: #8b5cf6; font-family: monospace; font-size: 10px; }
      .label-desktop { fill: #8b5cf6; font-family: monospace; font-size: 11px; font-weight: bold; }
      .label-mobile { fill: #d946ef; font-family: monospace; font-size: 11px; font-weight: bold; }
      .error-text { fill: #ef4444; font-family: system-ui, sans-serif; font-size: 10px; }
      .success-text { fill: #22c55e; font-family: system-ui, sans-serif; font-size: 10px; }
      .link-text { fill: #8b5cf6; font-family: system-ui, sans-serif; font-size: 11px; }
      .step-active { fill: #8b5cf6; }
      .step-inactive { fill: #d1d5db; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.4">
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
