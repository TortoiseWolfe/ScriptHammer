    <rect x="420" y="290" width="220" height="30" rx="4" fill="#f3f4f6"/>
    <text x="530" y="310" text-anchor="middle" class="text-md">user@example.com</text>

    <!-- Instructions -->
    <rect x="410" y="340" width="240" height="80" rx="6" fill="#fffbeb" stroke="#fef08a"/>
    <text x="430" y="365" class="text-sm" fill="#92400e">⏱ Link expires in 1 hour</text>
    <text x="430" y="385" class="text-sm" fill="#92400e">📥 Check spam folder if not received</text>
    <text x="430" y="405" class="text-sm" fill="#92400e">🔄 You can request a new link below</text>

    <!-- Resend Button -->
    <rect x="420" y="440" width="220" height="36" rx="6" fill="#ffffff" stroke="#8b5cf6"/>
    <text x="530" y="464" text-anchor="middle" class="link-text">Resend Email</text>

