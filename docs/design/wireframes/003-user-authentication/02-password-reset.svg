  <text x="40" y="52" class="label-desktop">DESKTOP - 3 STEP FLOW</text>

  <g id="desktop-view">
    <!-- Step 1: Request Reset -->
    <rect x="40" y="70" width="280" height="450" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>

