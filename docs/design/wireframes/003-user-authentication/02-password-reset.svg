    <text x="40" y="545" class="text-sm" fill="#92400e">⏱ Reset links expire in 1 hour</text>
    <text x="40" y="565" class="text-sm" fill="#92400e">📥 Check your spam folder</text>

    <!-- Back Link -->
    <text x="160" y="610" text-anchor="middle" class="link-text">← Back to Sign In</text>

    <!-- Bottom nav hint -->
