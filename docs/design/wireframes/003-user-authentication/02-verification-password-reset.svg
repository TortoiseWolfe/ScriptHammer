<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7ddf5"/>
      <stop offset="100%" stop-color="#b8d4f0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- CENTERED TITLE with text-anchor="middle" -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="18" font-weight="700" fill="#4b5563" letter-spacing="1">
    USER AUTHENTICATION - VERIFICATION AND PASSWORD RESET
  </text>

  <!-- Section labels -->
  <text x="40" y="52" fill="#8b5cf6" font-family="system-ui, sans-serif"
        font-size="18" font-weight="bold">DESKTOP (16:9)</text>
  <text x="1500" y="52" fill="#d946ef" font-family="system-ui, sans-serif"
        font-size="15" font-weight="bold">MOBILE</text>

  <!-- DESKTOP (1280x720) -->
  <g id="desktop" transform="translate(40, 60)">
    <rect width="1280" height="720" rx="8" fill="#e8d4b8" stroke="#b8a080"/>

    <!-- Header include -->
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>

    <!-- Three-Panel Layout -->
    <!-- Panel 1: Email Verification -->
    <g transform="translate(40, 80)">
      <rect width="380" height="520" rx="8" fill="#f5f0e6" stroke="#b8a080"/>
      <text x="190" y="40" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="20" font-weight="bold" fill="#374151">Email Verification</text>

      <!-- Verification Pending State -->
      <g transform="translate(30, 70)">
        <rect width="320" height="140" rx="6" fill="#dcc8a8" stroke="#b8a080"/>
        <text x="160" y="35" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="16" font-weight="bold" fill="#374151">Verify Your Email</text>
        <text x="160" y="60" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" fill="#4b5563">We sent a verification link to</text>
        <text x="160" y="80" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#374151">user@example.com</text>
        <rect x="60" y="95" width="200" height="36" rx="6" fill="#8b5cf6"/>
        <text x="160" y="118" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#ffffff">Resend Email</text>
      </g>

      <!-- Verification Success State -->
      <g transform="translate(30, 230)">
        <rect width="320" height="100" rx="6" fill="#dcfce7" stroke="#22c55e"/>
        <text x="160" y="30" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="16" font-weight="bold" fill="#166534">Email Verified!</text>
        <text x="160" y="55" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" fill="#4b5563">Your account is now active.</text>
        <text x="160" y="80" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" fill="#8b5cf6" text-decoration="underline">Continue to Sign In</text>
      </g>

      <!-- Verification Expired State -->
      <g transform="translate(30, 350)">
        <rect width="320" height="130" rx="6" fill="#fef2f2" stroke="#dc2626"/>
        <text x="160" y="30" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="16" font-weight="bold" fill="#991b1b">Link Expired</text>
        <text x="160" y="55" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" fill="#4b5563">Verification link has expired.</text>
        <text x="160" y="75" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" fill="#4b5563">Please request a new one.</text>
        <rect x="60" y="90" width="200" height="32" rx="6" fill="#8b5cf6"/>
        <text x="160" y="111" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#ffffff">Resend</text>
      </g>
    </g>

    <!-- Panel 2: Password Reset Request -->
    <g transform="translate(450, 80)">
      <rect width="380" height="520" rx="8" fill="#f5f0e6" stroke="#b8a080"/>
      <text x="190" y="40" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="20" font-weight="bold" fill="#374151">Forgot Password</text>

      <!-- Request Reset Form -->
      <g transform="translate(30, 70)">
        <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Enter your email to receive a reset link</text>

        <text x="0" y="40" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Email</text>
        <rect y="50" width="320" height="44" rx="6" fill="#e8d4b8" stroke="#b8a080"/>

        <rect y="110" width="320" height="44" rx="6" fill="#8b5cf6"/>
        <text x="160" y="138" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="16" font-weight="bold" fill="#ffffff">Send Reset Link</text>
      </g>

      <!-- Email Sent Confirmation -->
      <g transform="translate(30, 260)">
        <rect width="320" height="100" rx="6" fill="#dcc8a8" stroke="#b8a080"/>
        <text x="160" y="30" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="16" font-weight="bold" fill="#374151">Check Your Email</text>
        <text x="160" y="55" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" fill="#4b5563">We sent a password reset link.</text>
        <text x="160" y="80" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" fill="#6b7280">Link expires in 1 hour.</text>
      </g>

      <!-- Back to Sign In -->
      <g transform="translate(30, 380)">
        <text x="160" y="0" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" fill="#8b5cf6" text-decoration="underline">Back to Sign In</text>
      </g>
    </g>

    <!-- Panel 3: Set New Password -->
    <g transform="translate(860, 80)">
      <rect width="380" height="520" rx="8" fill="#f5f0e6" stroke="#b8a080"/>
      <text x="190" y="40" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="20" font-weight="bold" fill="#374151">Set New Password</text>

      <!-- New Password Form -->
      <g transform="translate(30, 70)">
        <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">New Password</text>
        <rect y="10" width="320" height="44" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="0" y="70" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Min 8 chars, mixed case, number, special</text>

        <text x="0" y="105" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Confirm Password</text>
        <rect y="115" width="320" height="44" rx="6" fill="#e8d4b8" stroke="#b8a080"/>

        <rect y="180" width="320" height="44" rx="6" fill="#8b5cf6"/>
        <text x="160" y="208" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="16" font-weight="bold" fill="#ffffff">Update Password</text>
      </g>

      <!-- Password Updated Success -->
      <g transform="translate(30, 320)">
        <rect width="320" height="100" rx="6" fill="#dcfce7" stroke="#22c55e"/>
        <text x="160" y="30" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="16" font-weight="bold" fill="#166534">Password Updated!</text>
        <text x="160" y="55" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" fill="#4b5563">You can now sign in with your</text>
        <text x="160" y="75" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" fill="#4b5563">new password.</text>
      </g>

      <!-- Reset Link Expired -->
      <g transform="translate(30, 440)">
        <rect width="320" height="65" rx="6" fill="#fef2f2" stroke="#dc2626"/>
        <text x="160" y="25" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#991b1b">Reset Link Expired</text>
        <text x="160" y="48" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" fill="#8b5cf6" text-decoration="underline">Request new reset link</text>
      </g>
    </g>

    <!-- Footer include -->
    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>
  </g>

  <!-- DESKTOP CALLOUTS -->
  <g id="desktop-callouts">
    <circle cx="460" cy="200" r="14" fill="#dc2626"/>
    <text x="460" y="205" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">1</text>

    <circle cx="870" cy="200" r="14" fill="#dc2626"/>
    <text x="870" y="205" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">2</text>

    <circle cx="1280" cy="200" r="14" fill="#dc2626"/>
    <text x="1280" y="205" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">3</text>

    <circle cx="460" cy="500" r="14" fill="#dc2626"/>
    <text x="460" y="505" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">4</text>
  </g>

  <!-- MOBILE (360x720) -->
  <g id="mobile" transform="translate(1360, 60)">
    <rect width="360" height="720" rx="24" fill="#e8d4b8" stroke="#b8a080"/>

    <!-- Header include -->
    <use href="includes/header-mobile.svg#mobile-header-group" x="0" y="0"/>

    <!-- Mobile Password Reset Flow -->
    <g transform="translate(20, 70)">
      <text x="160" y="20" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="18" font-weight="bold" fill="#374151">Reset Password</text>

      <!-- Email Input -->
      <g transform="translate(0, 45)">
        <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Email</text>
        <rect y="8" width="320" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
      </g>

      <!-- Send Reset Button -->
      <g transform="translate(0, 115)">
        <rect width="320" height="48" rx="6" fill="#8b5cf6"/>
        <text x="160" y="30" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="16" font-weight="bold" fill="#ffffff">Send Reset Link</text>
      </g>

      <!-- Check Email Message -->
      <g transform="translate(0, 185)">
        <rect width="320" height="90" rx="6" fill="#dcc8a8" stroke="#b8a080"/>
        <text x="160" y="25" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="16" font-weight="bold" fill="#374151">Check Your Email</text>
        <text x="160" y="50" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" fill="#4b5563">We sent a reset link.</text>
        <text x="160" y="72" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" fill="#6b7280">Expires in 1 hour.</text>
      </g>

      <!-- New Password Form -->
      <g transform="translate(0, 295)">
        <rect width="320" height="200" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
        <text x="160" y="25" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="16" font-weight="bold" fill="#374151">Set New Password</text>

        <text x="15" y="55" font-family="system-ui, sans-serif" font-size="14" fill="#374151">New Password</text>
        <rect x="15" y="65" width="290" height="65" rx="4" fill="#e8d4b8" stroke="#b8a080"/>

        <text x="15" y="120" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Confirm Password</text>
        <rect x="15" y="140" width="290" height="65" rx="4" fill="#e8d4b8" stroke="#b8a080"/>

        <rect x="15" y="180" width="290" height="40" rx="6" fill="#8b5cf6"/>
        <text x="160" y="206" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#ffffff">Update Password</text>
      </g>

      <!-- Back Link -->
      <text x="160" y="520" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" fill="#8b5cf6" text-decoration="underline">Back to Sign In</text>
    </g>

    <!-- Footer include -->
    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
  </g>

  <!-- MOBILE CALLOUTS -->
  <g id="mobile-callouts">
    <circle cx="1750" cy="180" r="14" fill="#dc2626"/>
    <text x="1750" y="185" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">1</text>

    <circle cx="1750" cy="300" r="14" fill="#dc2626"/>
    <text x="1750" y="305" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">2</text>

    <circle cx="1750" cy="450" r="14" fill="#dc2626"/>
    <text x="1750" y="455" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">3</text>

    <circle cx="1750" cy="600" r="14" fill="#dc2626"/>
    <text x="1750" y="605" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">4</text>
  </g>

  <!-- ANNOTATIONS -->
  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>

    <!-- Column 1: US-007 Unverified User -->
    <g transform="translate(20, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" font-weight="bold" fill="#ffffff">1</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Email Verification</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">As an unverified user, I need clear</text>
      <text x="40" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">guidance to verify my email.</text>
      <a href="#US-007"><rect x="40" y="62" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">US-007</text></a>
      <a href="#US-001"><rect x="101" y="62" width="55" height="22" rx="4" fill="#0891b2"/><text x="128" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">US-001</text></a>
      <a href="#FR-004"><rect x="162" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="189" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-004</text></a>
      <a href="#FR-005"><rect x="223" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="250" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-005</text></a>
    </g>

    <!-- Column 2: US-003 Password Reset Request -->
    <g transform="translate(470, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" font-weight="bold" fill="#ffffff">2</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Password Reset Request</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">As a user who forgot my password,</text>
      <text x="40" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">I need to reset it via email.</text>
      <a href="#US-003"><rect x="40" y="62" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">US-003</text></a>
      <a href="#FR-010"><rect x="101" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="128" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-010</text></a>
      <a href="#FR-011"><rect x="162" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="189" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-011</text></a>
      <a href="#SC-005"><rect x="223" y="62" width="55" height="22" rx="4" fill="#ea580c"/><text x="250" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">SC-005</text></a>
    </g>

    <!-- Column 3: Set New Password -->
    <g transform="translate(920, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" font-weight="bold" fill="#ffffff">3</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Set New Password</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Password must meet security</text>
      <text x="40" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">requirements (8+ chars, mixed).</text>
      <a href="#US-003"><rect x="40" y="62" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">US-003</text></a>
      <a href="#FR-003"><rect x="101" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="128" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-003</text></a>
      <a href="#FR-026"><rect x="162" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="189" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-026</text></a>
    </g>

    <!-- Column 4: Security Measures -->
    <g transform="translate(1370, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" font-weight="bold" fill="#ffffff">4</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Link Expiration</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Reset links expire after 1 hour.</text>
      <text x="40" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Verification links expire after 24h.</text>
      <a href="#US-007"><rect x="40" y="62" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">US-007</text></a>
      <a href="#FR-005"><rect x="101" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="128" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-005</text></a>
      <a href="#FR-011"><rect x="162" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="189" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-011</text></a>
    </g>
  </g>

  <!-- SIGNATURE -->
  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif"
        font-size="18" font-weight="bold">
    003:02 | User Authentication - Verification and Password Reset | ScriptHammer
  </text>
</svg>
