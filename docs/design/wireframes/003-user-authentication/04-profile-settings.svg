    <text x="180" y="60" text-anchor="middle" class="heading">Delete Account</text>

    <!-- Warning box -->
    <rect x="20" y="80" width="300" height="100" rx="8" fill="#fef2f2" stroke="#ef4444"/>
    <text x="170" y="105" text-anchor="middle" class="heading" fill="#991b1b">&#x26A0; Warning</text>
    <text x="170" y="130" text-anchor="middle" class="text-sm" fill="#991b1b">This action cannot be undone.</text>
    <text x="170" y="150" text-anchor="middle" class="text-sm" fill="#991b1b">All your data will be permanently</text>
