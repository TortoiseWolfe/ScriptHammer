<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800">
  <!-- ============================================================
       GENERATED BY: /wireframe skill
       SOURCE: features/foundation/003-user-authentication/spec.md
       DATE: 2026-01-01
       THEME: Light (UX/Frontend) - v3 True Parchment
       REGENERATED WITH FEEDBACK: features/foundation/003-user-authentication/WIREFRAME_ISSUES.md
       Fixed: All nav items 44px, Upload/Remove buttons 44px, Revoke links have tap targets
       ============================================================ -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c7ddf5"/>
      <stop offset="100%" style="stop-color:#b8d4f0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
    <style>
      .heading-lg { fill: #1a1a2e; font-family: system-ui, sans-serif; font-size: 24px; font-weight: 800; }
      .heading { fill: #1a1a2e; font-family: system-ui, sans-serif; font-size: 16px; font-weight: 700; }
      .text-md { fill: #2d3748; font-family: system-ui, sans-serif; font-size: 14px; font-weight: 500; }
      .text-sm { fill: #374151; font-family: system-ui, sans-serif; font-size: 12px; font-weight: 500; }
      .text-muted { fill: #4b5563; font-family: system-ui, sans-serif; font-size: 11px; font-weight: 500; }
      .annotation { fill: #6d28d9; font-family: monospace; font-size: 12px; font-weight: 600; }
      .label-desktop { fill: #8b5cf6; font-family: monospace; font-size: 13px; font-weight: bold; }
      .label-mobile { fill: #d946ef; font-family: monospace; font-size: 13px; font-weight: bold; }
      .input-label { fill: #2d3748; font-family: system-ui, sans-serif; font-size: 12px; font-weight: 600; }
      .link-text { fill: #8b5cf6; font-family: system-ui, sans-serif; font-size: 12px; font-weight: 500; }
      .btn-text { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 14px; font-weight: 600; }
      .danger-text { fill: #ef4444; font-family: system-ui, sans-serif; font-size: 12px; font-weight: 500; }
      .section-title { fill: #4b5563; font-family: system-ui, sans-serif; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.35">
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#6b8cba"/>
    </pattern>
    <rect width="1400" height="800" fill="url(#dots)"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1400" height="3" fill="url(#accentGrad)"/>

  <!-- Title -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4b5563" letter-spacing="1">USER AUTHENTICATION - PROFILE &amp; SETTINGS</text>

  <!-- ==================== DESKTOP LAYOUT ==================== -->
  <text x="40" y="52" class="label-desktop">DESKTOP</text>

  <!-- Sidebar Navigation -->
  <g id="sidebar" transform="translate(40, 60)">
    <rect x="0" y="0" width="200" height="680" rx="8" fill="#e8d4b8" stroke="#b8a080"/>

    <!-- User info -->
    <circle cx="100" cy="50" r="35" fill="#dcc8a8" stroke="#8b5cf6" stroke-width="2"/>
    <text x="100" y="56" text-anchor="middle" class="heading">JD</text>
    <text x="100" y="105" text-anchor="middle" class="text-md" font-weight="700">John Doe</text>
    <text x="100" y="122" text-anchor="middle" class="text-muted">john@example.com</text>

    <line x1="20" y1="145" x2="180" y2="145" stroke="#b8a080"/>

    <!-- Nav items - ALL 44px height for WCAG AAA -->
    <rect x="10" y="160" width="180" height="44" rx="6" fill="#8b5cf6"/>
    <text x="25" y="188" class="btn-text">Profile</text>

    <rect x="10" y="212" width="180" height="44" rx="6" fill="transparent"/>
    <text x="25" y="240" class="text-md">Security</text>

    <rect x="10" y="264" width="180" height="44" rx="6" fill="transparent"/>
    <text x="25" y="292" class="text-md">Sessions</text>

    <rect x="10" y="316" width="180" height="44" rx="6" fill="transparent"/>
    <text x="25" y="344" class="text-md">Notifications</text>

    <line x1="20" y1="375" x2="180" y2="375" stroke="#b8a080"/>

    <!-- Danger zone - 44px -->
    <rect x="10" y="390" width="180" height="44" rx="6" fill="transparent"/>
    <text x="25" y="418" class="danger-text">Delete Account</text>

    <!-- Sign out - 44px -->
    <rect x="10" y="620" width="180" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="100" y="648" text-anchor="middle" class="text-md">Sign Out</text>
  </g>

  <!-- Main Content: Profile Tab -->
  <g id="profile-content" transform="translate(260, 60)">
    <rect x="0" y="0" width="440" height="680" rx="8" fill="#e8d4b8" stroke="#b8a080"/>

    <text x="25" y="35" class="heading-lg">Profile Settings</text>
    <text x="25" y="55" class="text-muted">Manage your public profile information</text>

    <!-- Avatar section -->
    <text x="25" y="90" class="section-title">PROFILE PICTURE</text>
    <circle cx="70" cy="145" r="40" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="70" y="153" text-anchor="middle" class="heading">JD</text>

    <!-- Upload/Remove buttons - NOW 44px height (was 32px) -->
    <rect x="130" y="123" width="100" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="180" y="151" text-anchor="middle" class="text-sm">Upload</text>
    <rect x="240" y="123" width="80" height="44" rx="6" fill="transparent" stroke="#b8a080"/>
    <text x="280" y="151" text-anchor="middle" class="text-sm">Remove</text>

    <line x1="25" y1="195" x2="415" y2="195" stroke="#b8a080"/>

    <!-- Display Name -->
    <text x="25" y="225" class="section-title">DISPLAY NAME</text>
    <text x="25" y="250" class="input-label">Display Name</text>
    <rect x="25" y="260" width="390" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="40" y="288" class="text-md">John Doe</text>

    <!-- Username -->
    <text x="25" y="330" class="input-label">Username</text>
    <rect x="25" y="340" width="390" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="40" y="368" class="text-md">@johndoe</text>

    <!-- Bio -->
    <text x="25" y="410" class="input-label">Bio (optional)</text>
    <rect x="25" y="420" width="390" height="80" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="40" y="445" class="text-muted">Tell us about yourself...</text>

    <line x1="25" y1="520" x2="415" y2="520" stroke="#b8a080"/>

    <!-- Email (read-only) -->
    <text x="25" y="550" class="section-title">EMAIL ADDRESS</text>
    <rect x="25" y="565" width="390" height="44" rx="6" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="40" y="593" class="text-md">john@example.com</text>
    <text x="380" y="593" text-anchor="end" class="text-muted">verified</text>

    <!-- Save button - 44px -->
    <rect x="25" y="625" width="150" height="44" rx="6" fill="#8b5cf6"/>
    <text x="100" y="653" text-anchor="middle" class="btn-text">Save Changes</text>
  </g>

  <!-- Detail Panel: Sessions -->
  <g id="sessions-panel" transform="translate(720, 60)">
    <rect x="0" y="0" width="240" height="680" rx="8" fill="#e8d4b8" stroke="#b8a080"/>

    <text x="20" y="35" class="heading">Active Sessions</text>
    <text x="20" y="55" class="text-muted">Manage your devices</text>

    <!-- Current session -->
    <rect x="15" y="75" width="210" height="95" rx="6" fill="#dcfce7" stroke="#22c55e"/>
    <text x="25" y="95" class="text-sm" fill="#166534">Current Session</text>
    <text x="25" y="115" class="text-md">Chrome on macOS</text>
    <text x="25" y="135" class="text-muted">San Francisco, CA</text>
    <text x="25" y="155" class="text-muted">Active now</text>

    <!-- Other session 1 with Revoke tap target -->
    <rect x="15" y="185" width="210" height="95" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="25" y="205" class="text-sm">Safari on iPhone</text>
    <text x="25" y="225" class="text-md">Mobile App</text>
    <text x="25" y="245" class="text-muted">New York, NY</text>
    <text x="25" y="265" class="text-muted">2 hours ago</text>
    <!-- Revoke tap target - NOW 60x44 for WCAG AAA (Issue #3 fix) -->
    <rect x="150" y="243" width="60" height="44" rx="3" fill="transparent"/>
    <text x="200" y="268" text-anchor="end" class="danger-text">Revoke</text>

    <!-- Other session 2 with Revoke tap target -->
    <rect x="15" y="295" width="210" height="95" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="25" y="315" class="text-sm">Firefox on Windows</text>
    <text x="25" y="335" class="text-md">Desktop</text>
    <text x="25" y="355" class="text-muted">London, UK</text>
    <text x="25" y="375" class="text-muted">3 days ago</text>
    <!-- Revoke tap target - NOW 60x44 for WCAG AAA (Issue #3 fix) -->
    <rect x="150" y="353" width="60" height="44" rx="3" fill="transparent"/>
    <text x="200" y="378" text-anchor="end" class="danger-text">Revoke</text>

    <line x1="15" y1="410" x2="225" y2="410" stroke="#b8a080"/>

    <!-- Revoke all - 44px -->
    <rect x="15" y="430" width="210" height="44" rx="6" fill="#fef2f2" stroke="#ef4444"/>
    <text x="120" y="458" text-anchor="middle" class="danger-text">Revoke All Other Sessions</text>

    <!-- FR references -->
    <rect x="15" y="495" width="210" height="80" rx="6" fill="#dcc8a8"/>
    <text x="25" y="515" class="annotation">FR-029, FR-030</text>
    <text x="25" y="535" class="text-muted">View active sessions</text>
    <text x="25" y="555" class="text-muted">Revoke any session</text>
  </g>

  <!-- ==================== MOBILE SECTION ==================== -->
  <text x="1000" y="52" class="label-mobile">MOBILE - DELETE ACCOUNT</text>

  <g id="mobile-view" transform="translate(1000, 60)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="360" height="700" rx="24" fill="#c8b898" stroke="#a08860" stroke-width="2"/>
    <!-- Screen -->
    <rect x="10" y="10" width="340" height="680" rx="16" fill="#e8d4b8"/>
    <!-- Status bar -->
    <rect x="10" y="10" width="340" height="28" rx="16" fill="#dcc8a8"/>
    <text x="30" y="28" class="text-sm">9:41</text>

    <!-- Back button + title - 44px tap target -->
    <rect x="20" y="45" width="44" height="44" rx="6" fill="transparent"/>
    <text x="30" y="72" class="link-text">&#x2190; Settings</text>
    <text x="180" y="72" text-anchor="middle" class="heading">Delete Account</text>

    <!-- Warning box -->
    <rect x="20" y="100" width="300" height="100" rx="8" fill="#fef2f2" stroke="#ef4444"/>
    <text x="170" y="125" text-anchor="middle" class="heading" fill="#991b1b">&#x26A0; Warning</text>
    <text x="170" y="150" text-anchor="middle" class="text-sm" fill="#991b1b">This action cannot be undone.</text>
    <text x="170" y="170" text-anchor="middle" class="text-sm" fill="#991b1b">All your data will be permanently</text>
    <text x="170" y="190" text-anchor="middle" class="text-sm" fill="#991b1b">deleted.</text>

    <!-- What will be deleted -->
    <text x="30" y="230" class="section-title">WHAT WILL BE DELETED:</text>
    <rect x="20" y="245" width="300" height="130" rx="8" fill="#dcc8a8"/>
    <text x="35" y="270" class="text-sm">&#x2022; Your profile and account info</text>
    <text x="35" y="295" class="text-sm">&#x2022; All payment history</text>
    <text x="35" y="320" class="text-sm">&#x2022; All saved preferences</text>
    <text x="35" y="345" class="text-sm">&#x2022; All active sessions</text>
    <text x="35" y="365" class="text-muted">(FR-028: Cascade delete)</text>

    <!-- Confirmation - 44px input -->
    <text x="30" y="405" class="input-label">Type "DELETE" to confirm</text>
    <rect x="20" y="415" width="300" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="35" y="443" class="text-muted">DELETE</text>

    <!-- Password confirmation - 44px input -->
    <text x="30" y="485" class="input-label">Enter your password</text>
    <rect x="20" y="495" width="300" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>

    <!-- Delete button - 48px for mobile -->
    <rect x="20" y="560" width="300" height="48" rx="6" fill="#ef4444"/>
    <text x="170" y="590" text-anchor="middle" class="btn-text">Delete My Account</text>

    <!-- Cancel - 44px tap target -->
    <rect x="120" y="620" width="100" height="44" rx="3" fill="transparent"/>
    <text x="170" y="648" text-anchor="middle" class="link-text">Cancel</text>

    <!-- Home indicator -->
    <rect x="140" y="670" width="80" height="5" rx="2.5" fill="#b8a080"/>
  </g>

  <!-- ==================== ANNOTATIONS ==================== -->
  <!-- Moved from y=735 to y=750 to avoid overlap with content ending at y=740 (Issue #4 fix) -->
  <g id="annotations" transform="translate(40, 750)">
    <text x="0" y="0" class="annotation">User Story 6: FR-024 to FR-030</text>
    <text x="0" y="15" class="text-muted">Profile management, password change, account deletion with cascade delete</text>

    <text x="500" y="0" class="annotation">FR-031, FR-032, FR-033</text>
    <text x="500" y="15" class="text-muted">All profile changes logged (except passwords), audit trail retained</text>
  </g>

  <!-- Footer -->
  <text x="700" y="780" text-anchor="middle" class="text-muted">003-user-authentication | Profile &amp; Settings | ScriptHammer</text>
</svg>
