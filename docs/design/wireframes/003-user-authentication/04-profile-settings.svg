    <text x="25" y="260" class="text-muted">2 hours ago</text>
    <text x="200" y="260" text-anchor="end" class="danger-text">Revoke</text>

    <!-- Other session 2 -->
    <rect x="15" y="285" width="210" height="90" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="25" y="305" class="text-sm">Firefox on Windows</text>
    <text x="25" y="325" class="text-md">Desktop</text>
    <text x="25" y="345" class="text-muted">London, UK</text>
