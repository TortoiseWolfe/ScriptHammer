<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7ddf5"/>
      <stop offset="100%" stop-color="#b8d4f0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- CENTERED TITLE with text-anchor="middle" -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="18" font-weight="700" fill="#4b5563" letter-spacing="1">
    USER AUTHENTICATION - REGISTRATION AND SIGN IN
  </text>

  <!-- Section labels -->
  <text x="40" y="52" fill="#8b5cf6" font-family="system-ui, sans-serif"
        font-size="18" font-weight="bold">DESKTOP (16:9)</text>
  <text x="1500" y="52" fill="#d946ef" font-family="system-ui, sans-serif"
        font-size="15" font-weight="bold">MOBILE</text>

  <!-- DESKTOP (1280x720) -->
  <g id="desktop" transform="translate(40, 60)">
    <rect width="1280" height="720" rx="8" fill="#e8d4b8" stroke="#b8a080"/>

    <!-- Header include -->
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>

    <!-- Split Layout: Sign In (left) | Registration (right) -->
    <g transform="translate(40, 80)">
      <!-- Sign In Form -->
      <rect width="580" height="520" rx="8" fill="#f5f0e6" stroke="#b8a080"/>
      <text x="290" y="40" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="22" font-weight="bold" fill="#374151">Sign In</text>

      <!-- Email Input -->
      <g transform="translate(40, 70)">
        <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Email</text>
        <rect y="10" width="500" height="44" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="15" y="38" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">you@example.com</text>
      </g>

      <!-- Password Input -->
      <g transform="translate(40, 145)">
        <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Password</text>
        <rect y="10" width="500" height="44" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="15" y="38" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">••••••••</text>
      </g>

      <!-- Remember Me Checkbox -->
      <g transform="translate(40, 215)">
        <rect width="20" height="20" rx="4" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="30" y="16" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Remember me for 30 days</text>
        <text x="320" y="16" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6" text-decoration="underline">Forgot password?</text>
      </g>

      <!-- Sign In Button -->
      <g transform="translate(40, 260)">
        <rect width="500" height="48" rx="6" fill="#8b5cf6"/>
        <text x="250" y="30" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="16" font-weight="bold" fill="#ffffff">Sign In</text>
      </g>

      <!-- Divider -->
      <g transform="translate(40, 330)">
        <line x1="0" y1="0" x2="200" y2="0" stroke="#b8a080" stroke-width="1"/>
        <text x="250" y="5" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" fill="#6b7280">or continue with</text>
        <line x1="300" y1="0" x2="500" y2="0" stroke="#b8a080" stroke-width="1"/>
      </g>

      <!-- OAuth Buttons -->
      <g transform="translate(40, 360)">
        <rect width="240" height="48" rx="6" fill="#f5f0e6" stroke="#374151"/>
        <text x="120" y="30" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#374151">Sign in with GitHub</text>
      </g>
      <g transform="translate(300, 360)">
        <rect width="240" height="48" rx="6" fill="#f5f0e6" stroke="#374151"/>
        <text x="120" y="30" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#374151">Sign in with Google</text>
      </g>

      <!-- Sign Up Link -->
      <g transform="translate(40, 440)">
        <text x="210" y="0" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" fill="#6b7280">Don't have an account?</text>
        <text x="360" y="0" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#8b5cf6" text-decoration="underline">Sign up</text>
      </g>
    </g>

    <!-- Registration Form (right side) -->
    <g transform="translate(660, 80)">
      <rect width="580" height="520" rx="8" fill="#f5f0e6" stroke="#b8a080"/>
      <text x="290" y="40" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="22" font-weight="bold" fill="#374151">Create Account</text>

      <!-- Email Input -->
      <g transform="translate(40, 70)">
        <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Email</text>
        <rect y="10" width="500" height="44" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
      </g>

      <!-- Password Input -->
      <g transform="translate(40, 145)">
        <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Password</text>
        <rect y="10" width="500" height="44" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="15" y="70" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Min 8 chars, uppercase, lowercase, number, special</text>
      </g>

      <!-- Confirm Password -->
      <g transform="translate(40, 235)">
        <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Confirm Password</text>
        <rect y="10" width="500" height="44" rx="6" fill="#e8d4b8" stroke="#b8a080"/>
      </g>

      <!-- Terms Checkbox -->
      <g transform="translate(40, 310)">
        <rect width="20" height="20" rx="4" fill="#e8d4b8" stroke="#b8a080"/>
        <text x="30" y="16" font-family="system-ui, sans-serif" font-size="14" fill="#374151">I agree to the Terms of Service and Privacy Policy</text>
      </g>

      <!-- Create Account Button -->
      <g transform="translate(40, 355)">
        <rect width="500" height="48" rx="6" fill="#8b5cf6"/>
        <text x="250" y="30" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="16" font-weight="bold" fill="#ffffff">Create Account</text>
      </g>

      <!-- Verification Notice -->
      <g transform="translate(40, 425)">
        <rect width="500" height="70" rx="6" fill="#dcc8a8" stroke="#b8a080"/>
        <text x="20" y="25" font-family="system-ui, sans-serif" font-size="14" fill="#374151">After registration, you'll receive a verification email.</text>
        <text x="20" y="48" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Click the link within 24 hours to activate your account.</text>
      </g>
    </g>

    <!-- Footer include -->
    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>
  </g>

  <!-- DESKTOP CALLOUTS -->
  <g id="desktop-callouts">
    <circle cx="660" cy="280" r="14" fill="#dc2626"/>
    <text x="660" y="285" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">1</text>

    <circle cx="660" cy="400" r="14" fill="#dc2626"/>
    <text x="660" y="405" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">2</text>

    <circle cx="1280" cy="280" r="14" fill="#dc2626"/>
    <text x="1280" y="285" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">3</text>

    <circle cx="1280" cy="540" r="14" fill="#dc2626"/>
    <text x="1280" y="545" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">4</text>
  </g>

  <!-- MOBILE (360x720) -->
  <g id="mobile" transform="translate(1360, 60)">
    <rect width="360" height="720" rx="24" fill="#e8d4b8" stroke="#b8a080"/>

    <!-- Header include -->
    <use href="includes/header-mobile.svg#mobile-header-group" x="0" y="0"/>

    <!-- Mobile Sign In Form -->
    <g transform="translate(20, 70)">
      <text x="160" y="20" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="18" font-weight="bold" fill="#374151">Sign In</text>

      <!-- Email -->
      <g transform="translate(0, 40)">
        <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Email</text>
        <rect y="8" width="320" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
      </g>

      <!-- Password -->
      <g transform="translate(0, 105)">
        <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Password</text>
        <rect y="8" width="320" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
      </g>

      <!-- Remember Me -->
      <g transform="translate(0, 170)">
        <rect width="20" height="20" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
        <text x="28" y="15" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Remember me</text>
      </g>

      <!-- Sign In Button -->
      <g transform="translate(0, 205)">
        <rect width="320" height="48" rx="6" fill="#8b5cf6"/>
        <text x="160" y="30" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="16" font-weight="bold" fill="#ffffff">Sign In</text>
      </g>

      <!-- Forgot Password -->
      <text x="160" y="280" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" fill="#8b5cf6" text-decoration="underline">Forgot password?</text>

      <!-- Divider -->
      <g transform="translate(0, 300)">
        <line x1="0" y1="0" x2="100" y2="0" stroke="#b8a080"/>
        <text x="160" y="5" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" fill="#6b7280">or</text>
        <line x1="220" y1="0" x2="320" y2="0" stroke="#b8a080"/>
      </g>

      <!-- OAuth Buttons -->
      <g transform="translate(0, 320)">
        <rect width="320" height="44" rx="6" fill="#f5f0e6" stroke="#374151"/>
        <text x="160" y="28" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#374151">Continue with GitHub</text>
      </g>

      <g transform="translate(0, 375)">
        <rect width="320" height="44" rx="6" fill="#f5f0e6" stroke="#374151"/>
        <text x="160" y="28" text-anchor="middle" font-family="system-ui, sans-serif"
              font-size="14" font-weight="bold" fill="#374151">Continue with Google</text>
      </g>

      <!-- Sign Up Link -->
      <g transform="translate(0, 450)">
        <text x="100" y="0" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">New here?</text>
        <text x="170" y="0" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#8b5cf6">Create account</text>
      </g>
    </g>

    <!-- Footer include -->
    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
  </g>

  <!-- MOBILE CALLOUTS -->
  <g id="mobile-callouts">
    <circle cx="1750" cy="200" r="14" fill="#dc2626"/>
    <text x="1750" y="205" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">1</text>

    <circle cx="1750" cy="340" r="14" fill="#dc2626"/>
    <text x="1750" y="345" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">2</text>

    <circle cx="1750" cy="460" r="14" fill="#dc2626"/>
    <text x="1750" y="465" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">3</text>

    <circle cx="1750" cy="560" r="14" fill="#dc2626"/>
    <text x="1750" y="565" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="14" font-weight="bold" fill="#ffffff">4</text>
  </g>

  <!-- ANNOTATIONS -->
  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>

    <!-- Column 1: US-002 Sign In -->
    <g transform="translate(20, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" font-weight="bold" fill="#ffffff">1</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">User Sign In</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">As a registered user, I need to sign in</text>
      <text x="40" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">to access my account and payments.</text>
      <a href="#US-002"><rect x="40" y="62" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">US-002</text></a>
      <a href="#FR-006"><rect x="101" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="128" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-006</text></a>
      <a href="#FR-013"><rect x="162" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="189" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-013</text></a>
      <a href="#SC-002"><rect x="223" y="62" width="55" height="22" rx="4" fill="#ea580c"/><text x="250" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">SC-002</text></a>
    </g>

    <!-- Column 2: US-004 OAuth -->
    <g transform="translate(470, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" font-weight="bold" fill="#ffffff">2</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">OAuth Sign In</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">As a user preferring social login, I can</text>
      <text x="40" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">authenticate via GitHub or Google.</text>
      <a href="#US-004"><rect x="40" y="62" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">US-004</text></a>
      <a href="#FR-007"><rect x="101" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="128" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-007</text></a>
      <a href="#FR-008"><rect x="162" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="189" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-008</text></a>
      <a href="#SC-006"><rect x="223" y="62" width="55" height="22" rx="4" fill="#ea580c"/><text x="250" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">SC-006</text></a>
    </g>

    <!-- Column 3: US-001 Registration -->
    <g transform="translate(920, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" font-weight="bold" fill="#ffffff">3</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Email Registration</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">As a new user, I need to create an</text>
      <text x="40" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">account with email and password.</text>
      <a href="#US-001"><rect x="40" y="62" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">US-001</text></a>
      <a href="#FR-001"><rect x="101" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="128" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-001</text></a>
      <a href="#FR-003"><rect x="162" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="189" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-003</text></a>
      <a href="#SC-001"><rect x="223" y="62" width="55" height="22" rx="4" fill="#ea580c"/><text x="250" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">SC-001</text></a>
    </g>

    <!-- Column 4: Email Verification Notice -->
    <g transform="translate(1370, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif"
            font-size="14" font-weight="bold" fill="#ffffff">4</text>
      <text x="40" y="14" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#374151">Email Verification</text>
      <text x="40" y="34" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Verification email sent after signup.</text>
      <text x="40" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Link expires after 24 hours.</text>
      <a href="#US-001"><rect x="40" y="62" width="55" height="22" rx="4" fill="#0891b2"/><text x="67" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">US-001</text></a>
      <a href="#FR-004"><rect x="101" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="128" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-004</text></a>
      <a href="#FR-005"><rect x="162" y="62" width="55" height="22" rx="4" fill="#2563eb"/><text x="189" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">FR-005</text></a>
    </g>
  </g>

  <!-- SIGNATURE -->
  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif"
        font-size="18" font-weight="bold">
    003:01 | User Authentication - Registration and Sign In | ScriptHammer
  </text>
</svg>
