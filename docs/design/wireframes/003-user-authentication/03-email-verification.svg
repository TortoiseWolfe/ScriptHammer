<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800">
  <!-- ============================================================
       GENERATED BY: /wireframe skill
       SOURCE: features/foundation/003-user-authentication/spec.md
       DATE: 2026-01-01
       THEME: Light (UX/Frontend) - v3 True Parchment
       REGENERATED WITH FEEDBACK: features/foundation/003-user-authentication/WIREFRAME_ISSUES.md
       Fixed: Resend button touch target now 44px (was 40px)
       ============================================================ -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c7ddf5"/>
      <stop offset="100%" style="stop-color:#b8d4f0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
    <style>
      .heading-lg { fill: #1a1a2e; font-family: system-ui, sans-serif; font-size: 24px; font-weight: 800; }
      .heading { fill: #1a1a2e; font-family: system-ui, sans-serif; font-size: 16px; font-weight: 700; }
      .text-md { fill: #2d3748; font-family: system-ui, sans-serif; font-size: 14px; font-weight: 500; }
      .text-sm { fill: #374151; font-family: system-ui, sans-serif; font-size: 12px; font-weight: 500; }
      .text-muted { fill: #4b5563; font-family: system-ui, sans-serif; font-size: 11px; font-weight: 500; }
      .annotation { fill: #6d28d9; font-family: monospace; font-size: 12px; font-weight: 600; }
      .label-desktop { fill: #8b5cf6; font-family: monospace; font-size: 13px; font-weight: bold; }
      .label-mobile { fill: #d946ef; font-family: monospace; font-size: 13px; font-weight: bold; }
      .link-text { fill: #8b5cf6; font-family: system-ui, sans-serif; font-size: 12px; font-weight: 500; }
      .btn-text { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 14px; font-weight: 600; }
      .state-label { fill: #4b5563; font-family: system-ui, sans-serif; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.35">
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#6b8cba"/>
    </pattern>
    <rect width="1400" height="800" fill="url(#dots)"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1400" height="3" fill="url(#accentGrad)"/>

  <!-- Title -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4b5563" letter-spacing="1">USER AUTHENTICATION - EMAIL VERIFICATION STATES</text>

  <!-- ==================== STATE 1: PENDING ==================== -->
  <text x="40" y="52" class="label-desktop">PENDING VERIFICATION</text>

  <g id="state-pending" transform="translate(40, 60)">
    <rect x="0" y="0" width="300" height="410" rx="12" fill="#e8d4b8" stroke="#b8a080" stroke-width="1"/>

    <!-- State badge -->
    <rect x="200" y="15" width="85" height="24" rx="12" fill="#fef3c7" stroke="#eab308"/>
    <text x="242" y="32" text-anchor="middle" class="text-muted" fill="#92400e">PENDING</text>

    <!-- Email icon -->
    <circle cx="150" cy="100" r="45" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="150" y="110" text-anchor="middle" font-size="32">&#x2709;</text>

    <!-- Title -->
    <text x="150" y="175" text-anchor="middle" class="heading-lg">Verify Your Email</text>
    <text x="150" y="200" text-anchor="middle" class="text-md">We sent a verification link to:</text>
    <text x="150" y="225" text-anchor="middle" class="text-md" font-weight="700">user@example.com</text>

    <!-- Instructions box -->
    <rect x="25" y="250" width="250" height="70" rx="8" fill="#dcc8a8"/>
    <text x="150" y="275" text-anchor="middle" class="text-sm">Click the link in your email</text>
    <text x="150" y="295" text-anchor="middle" class="text-sm">to activate your account</text>
    <text x="150" y="315" text-anchor="middle" class="text-muted">Link expires in 24 hours</text>

    <!-- Resend button - NOW 44px height (was 40px) -->
    <rect x="25" y="335" width="250" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="150" y="363" text-anchor="middle" class="text-md">Resend Verification Email</text>

    <!-- Help link with tap target -->
    <rect x="25" y="390" width="250" height="24" rx="3" fill="transparent"/>
    <text x="150" y="405" text-anchor="middle" class="link-text">Wrong email? Update it here</text>
  </g>

  <!-- ==================== STATE 2: SUCCESS ==================== -->
  <text x="360" y="52" class="label-desktop">VERIFIED SUCCESS</text>

  <g id="state-success" transform="translate(360, 60)">
    <rect x="0" y="0" width="300" height="410" rx="12" fill="#e8d4b8" stroke="#22c55e" stroke-width="2"/>

    <!-- State badge -->
    <rect x="200" y="15" width="85" height="24" rx="12" fill="#dcfce7" stroke="#22c55e"/>
    <text x="242" y="32" text-anchor="middle" class="text-muted" fill="#166534">VERIFIED</text>

    <!-- Success icon -->
    <circle cx="150" cy="100" r="45" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="150" y="115" text-anchor="middle" font-size="40" fill="#22c55e">&#x2713;</text>

    <!-- Title -->
    <text x="150" y="175" text-anchor="middle" class="heading-lg">Email Verified!</text>
    <text x="150" y="200" text-anchor="middle" class="text-md">Your account is now active</text>

    <!-- What's next box -->
    <rect x="25" y="230" width="250" height="100" rx="8" fill="#dcfce7"/>
    <text x="150" y="255" text-anchor="middle" class="heading" fill="#166534">What's Next?</text>
    <text x="150" y="280" text-anchor="middle" class="text-sm" fill="#166534">You now have full access to:</text>
    <text x="45" y="300" class="text-sm" fill="#166534">&#x2022; Payment features</text>
    <text x="45" y="318" class="text-sm" fill="#166534">&#x2022; Your profile settings</text>

    <!-- Continue button - 44px height -->
    <rect x="25" y="345" width="250" height="44" rx="6" fill="#22c55e"/>
    <text x="150" y="373" text-anchor="middle" class="btn-text">Go to Dashboard</text>
  </g>

  <!-- ==================== STATE 3: EXPIRED ==================== -->
  <text x="680" y="52" class="label-desktop">LINK EXPIRED</text>

  <g id="state-expired" transform="translate(680, 60)">
    <rect x="0" y="0" width="300" height="410" rx="12" fill="#e8d4b8" stroke="#ef4444" stroke-width="2"/>

    <!-- State badge -->
    <rect x="200" y="15" width="85" height="24" rx="12" fill="#fef2f2" stroke="#ef4444"/>
    <text x="242" y="32" text-anchor="middle" class="text-muted" fill="#991b1b">EXPIRED</text>

    <!-- Error icon -->
    <circle cx="150" cy="100" r="45" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="150" y="115" text-anchor="middle" font-size="40" fill="#ef4444">&#x2717;</text>

    <!-- Title -->
    <text x="150" y="175" text-anchor="middle" class="heading-lg">Link Expired</text>
    <text x="150" y="200" text-anchor="middle" class="text-md">This verification link</text>
    <text x="150" y="220" text-anchor="middle" class="text-md">is no longer valid</text>

    <!-- Explanation -->
    <rect x="25" y="245" width="250" height="70" rx="8" fill="#fef2f2"/>
    <text x="150" y="270" text-anchor="middle" class="text-sm" fill="#991b1b">Verification links expire after</text>
    <text x="150" y="290" text-anchor="middle" class="text-sm" fill="#991b1b">24 hours for security reasons</text>
    <text x="150" y="310" text-anchor="middle" class="text-muted">(FR-005)</text>

    <!-- Resend button - 44px height -->
    <rect x="25" y="330" width="250" height="44" rx="6" fill="#8b5cf6"/>
    <text x="150" y="358" text-anchor="middle" class="btn-text">Send New Link</text>

    <!-- Contact support with tap target -->
    <rect x="25" y="385" width="250" height="24" rx="3" fill="transparent"/>
    <text x="150" y="400" text-anchor="middle" class="link-text">Need help? Contact support</text>
  </g>

  <!-- ==================== MOBILE SECTION ==================== -->
  <text x="1020" y="52" class="label-mobile">MOBILE - UNVERIFIED BLOCK</text>

  <g id="mobile-view" transform="translate(1020, 60)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="340" height="680" rx="24" fill="#c8b898" stroke="#a08860" stroke-width="2"/>
    <!-- Screen -->
    <rect x="10" y="10" width="320" height="660" rx="16" fill="#e8d4b8"/>
    <!-- Status bar -->
    <rect x="10" y="10" width="320" height="28" rx="16" fill="#dcc8a8"/>
    <text x="28" y="28" class="text-sm">9:41</text>

    <!-- Blocked access state (User Story 7) -->
    <!-- Warning banner -->
    <rect x="20" y="50" width="300" height="50" rx="8" fill="#fef3c7" stroke="#eab308"/>
    <text x="170" y="70" text-anchor="middle" class="text-sm" fill="#92400e">&#x26A0; Email verification required</text>
    <text x="170" y="88" text-anchor="middle" class="text-muted" fill="#92400e">to access payment features</text>

    <!-- Lock icon -->
    <circle cx="170" cy="165" r="50" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="170" y="180" text-anchor="middle" font-size="40">&#x1F512;</text>

    <!-- Title -->
    <text x="170" y="250" text-anchor="middle" class="heading-lg">Access Restricted</text>
    <text x="170" y="280" text-anchor="middle" class="text-md">Please verify your email</text>
    <text x="170" y="300" text-anchor="middle" class="text-md">before accessing payments</text>

    <!-- User email -->
    <rect x="30" y="325" width="260" height="50" rx="8" fill="#dcc8a8"/>
    <text x="160" y="348" text-anchor="middle" class="text-sm">Verification email sent to:</text>
    <text x="160" y="368" text-anchor="middle" class="text-md" font-weight="700">user@example.com</text>

    <!-- Resend button - 48px for mobile (thumb-friendly) -->
    <rect x="30" y="395" width="260" height="48" rx="6" fill="#8b5cf6"/>
    <text x="160" y="425" text-anchor="middle" class="btn-text">Resend Verification</text>

    <!-- Check inbox - 48px -->
    <rect x="30" y="455" width="260" height="48" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="160" y="485" text-anchor="middle" class="text-md">Open Email App</text>

    <!-- Change email with tap target -->
    <rect x="30" y="520" width="260" height="44" rx="3" fill="transparent"/>
    <text x="160" y="547" text-anchor="middle" class="link-text">Use different email address</text>

    <!-- Sign out option with tap target -->
    <rect x="30" y="575" width="260" height="44" rx="3" fill="transparent"/>
    <text x="160" y="590" text-anchor="middle" class="text-muted">Signed in as user@example.com</text>
    <text x="160" y="608" text-anchor="middle" class="link-text">Sign out</text>

    <!-- Home indicator -->
    <rect x="130" y="650" width="80" height="5" rx="2.5" fill="#b8a080"/>
  </g>

  <!-- ==================== ANNOTATIONS ==================== -->
  <g id="annotations" transform="translate(40, 490)">
    <rect x="0" y="0" width="300" height="100" rx="8" fill="#e8d4b8" stroke="#8b5cf6" stroke-width="1"/>
    <text x="15" y="22" class="annotation">User Story 1 &amp; 7</text>
    <text x="15" y="42" class="text-sm">Email verification required</text>
    <text x="15" y="62" class="text-muted">FR-004: Send verification on signup</text>
    <text x="15" y="77" class="text-muted">FR-005: 24-hour expiration</text>
    <text x="15" y="92" class="text-muted">FR-018: Block unverified from payments</text>

    <rect x="320" y="0" width="300" height="100" rx="8" fill="#e8d4b8" stroke="#8b5cf6" stroke-width="1"/>
    <text x="335" y="22" class="annotation">Success Criteria</text>
    <text x="335" y="42" class="text-sm">SC-001: Registration &lt;3 min</text>
    <text x="335" y="62" class="text-muted">signup &#x2192; verify &#x2192; sign in</text>
    <text x="335" y="82" class="text-muted">Includes email delivery time</text>

    <rect x="640" y="0" width="300" height="100" rx="8" fill="#e8d4b8" stroke="#8b5cf6" stroke-width="1"/>
    <text x="655" y="22" class="annotation">Edge Cases</text>
    <text x="655" y="42" class="text-sm">Email delivery failure:</text>
    <text x="655" y="62" class="text-muted">Show error immediately</text>
    <text x="655" y="82" class="text-muted">"Failed to send. Please try again."</text>
  </g>

  <!-- ==================== FLOW DIAGRAM ==================== -->
  <g id="flow" transform="translate(40, 610)">
    <rect x="0" y="0" width="620" height="80" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="310" y="22" text-anchor="middle" class="heading">Verification Flow</text>

    <!-- Flow steps -->
    <rect x="20" y="35" width="80" height="30" rx="4" fill="#8b5cf6"/>
    <text x="60" y="55" text-anchor="middle" class="btn-text" font-size="10">Signup</text>

    <text x="115" y="55" class="text-md">&#x2192;</text>

    <rect x="130" y="35" width="100" height="30" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="180" y="55" text-anchor="middle" class="text-sm">Email Sent</text>

    <text x="245" y="55" class="text-md">&#x2192;</text>

    <rect x="260" y="35" width="100" height="30" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="310" y="55" text-anchor="middle" class="text-sm">Click Link</text>

    <text x="375" y="55" class="text-md">&#x2192;</text>

    <rect x="390" y="35" width="100" height="30" rx="4" fill="#22c55e"/>
    <text x="440" y="55" text-anchor="middle" class="btn-text" font-size="10">Verified</text>

    <text x="505" y="55" class="text-md">&#x2192;</text>

    <rect x="520" y="35" width="80" height="30" rx="4" fill="#dcfce7" stroke="#22c55e"/>
    <text x="560" y="55" text-anchor="middle" class="text-sm" fill="#166534">Access</text>
  </g>

  <!-- Footer -->
  <text x="60" y="780" text-anchor="start" class="text-muted">003-user-authentication | Email Verification States | ScriptHammer</text>
</svg>
