<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
    <style>
      .heading-lg { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 20px; font-weight: bold; }
      .heading { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 14px; font-weight: bold; }
      .text-md { fill: #cbd5e1; font-family: system-ui, sans-serif; font-size: 12px; }
      .text-sm { fill: #94a3b8; font-family: system-ui, sans-serif; font-size: 10px; }
      .text-muted { fill: #64748b; font-family: system-ui, sans-serif; font-size: 10px; }
      .annotation { fill: #8b5cf6; font-family: monospace; font-size: 10px; }
      .label-desktop { fill: #8b5cf6; font-family: monospace; font-size: 11px; font-weight: bold; }
      .label-mobile { fill: #d946ef; font-family: monospace; font-size: 11px; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.05">
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#fff"/>
    </pattern>
    <rect width="1400" height="800" fill="url(#dots)"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1400" height="3" fill="url(#accentGrad)"/>

  <!-- Title -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#64748b" letter-spacing="1">USER DASHBOARD</text>

  <!-- DESKTOP SECTION (left) -->
  <text x="40" y="52" class="label-desktop">DESKTOP</text>

  <g id="desktop-view">
    <!-- Header Bar: x=40, width=900 -->
    <rect x="40" y="60" width="900" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <circle cx="70" cy="85" r="16" fill="#8b5cf6"/>
    <text x="70" y="89" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="bold">D</text>
    <text x="95" y="82" class="heading">Dashboard</text>
    <text x="95" y="96" class="text-sm">/dashboard</text>

    <!-- User avatar in header -->
    <circle cx="900" cy="85" r="16" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="900" y="89" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">JD</text>

    <!-- Search box -->
    <rect x="720" y="72" width="150" height="28" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="735" y="90" class="text-muted">Search...</text>

    <!-- Sidebar: x=40, width=200 -->
    <rect x="40" y="120" width="200" height="620" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>

    <!-- Sidebar nav items -->
    <rect x="50" y="135" width="180" height="40" rx="6" fill="#8b5cf6"/>
    <text x="80" y="160" fill="#fff" font-family="system-ui" font-size="13">Dashboard</text>

    <text x="80" y="200" class="text-md">Activity</text>
    <text x="80" y="235" class="text-md">Settings</text>
    <text x="80" y="270" class="text-md">Profile</text>
    <text x="80" y="305" class="text-md">Help</text>

    <!-- Sidebar annotation -->
    <rect x="50" y="700" width="180" height="30" rx="4" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="140" y="720" text-anchor="middle" class="annotation">200px sidebar</text>

    <!-- Main Content Area: x=250, width=440 -->
    <rect x="250" y="120" width="440" height="620" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>

    <!-- Welcome message -->
    <text x="275" y="155" class="heading-lg">Welcome back, John</text>
    <text x="275" y="178" class="text-sm">Here's your recent activity</text>

    <!-- Activity List Header -->
    <text x="275" y="215" class="heading">Recent Activity</text>
    <text x="640" y="215" class="text-muted">Last 5</text>

    <!-- Activity Items -->
    <g id="activity-1">
      <rect x="265" y="230" width="410" height="65" rx="6" fill="#334155"/>
      <circle cx="295" cy="262" r="14" fill="#22c55e"/>
      <text x="295" y="267" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11">✓</text>
      <text x="320" y="252" class="text-md">Completed profile setup</text>
      <text x="320" y="272" class="text-sm">2 hours ago</text>
      <text x="620" y="262" class="text-muted">Profile</text>
    </g>

    <g id="activity-2">
      <rect x="265" y="305" width="410" height="65" rx="6" fill="#334155"/>
      <circle cx="295" cy="337" r="14" fill="#8b5cf6"/>
      <text x="295" y="342" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11">↑</text>
      <text x="320" y="327" class="text-md">Uploaded new document</text>
      <text x="320" y="347" class="text-sm">5 hours ago</text>
      <text x="620" y="337" class="text-muted">Files</text>
    </g>

    <g id="activity-3">
      <rect x="265" y="380" width="410" height="65" rx="6" fill="#334155"/>
      <circle cx="295" cy="412" r="14" fill="#eab308"/>
      <text x="295" y="417" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11">!</text>
      <text x="320" y="402" class="text-md">Password change reminder</text>
      <text x="320" y="422" class="text-sm">1 day ago</text>
      <text x="620" y="412" class="text-muted">Security</text>
    </g>

    <g id="activity-4">
      <rect x="265" y="455" width="410" height="65" rx="6" fill="#334155"/>
      <circle cx="295" cy="487" r="14" fill="#8b5cf6"/>
      <text x="295" y="492" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11">+</text>
      <text x="320" y="477" class="text-md">Added new team member</text>
      <text x="320" y="497" class="text-sm">2 days ago</text>
      <text x="620" y="487" class="text-muted">Team</text>
    </g>

    <g id="activity-5">
      <rect x="265" y="530" width="410" height="65" rx="6" fill="#334155"/>
      <circle cx="295" cy="562" r="14" fill="#22c55e"/>
      <text x="295" y="567" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11">✓</text>
      <text x="320" y="552" class="text-md">Account verified</text>
      <text x="320" y="572" class="text-sm">3 days ago</text>
      <text x="620" y="562" class="text-muted">Account</text>
    </g>

    <!-- Main annotation -->
    <rect x="265" y="700" width="410" height="30" rx="4" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="470" y="720" text-anchor="middle" class="annotation">440px main content</text>

    <!-- Detail Panel: x=700, width=240 -->
    <rect x="700" y="120" width="240" height="620" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>

    <!-- Account Status -->
    <text x="720" y="155" class="heading">Account Status</text>

    <rect x="715" y="170" width="210" height="90" rx="6" fill="#334155"/>
    <text x="825" y="200" text-anchor="middle" class="text-md">Plan: Pro</text>
    <rect x="760" y="215" width="120" height="28" rx="14" fill="#22c55e"/>
    <text x="820" y="234" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="bold">Active</text>

    <!-- Quick Actions -->
    <text x="720" y="295" class="heading">Quick Actions</text>

    <rect x="715" y="310" width="210" height="40" rx="6" fill="#8b5cf6"/>
    <text x="820" y="336" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">New Project</text>

    <rect x="715" y="360" width="210" height="40" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="820" y="386" text-anchor="middle" class="text-md">Invite Team</text>

    <rect x="715" y="410" width="210" height="40" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="820" y="436" text-anchor="middle" class="text-md">View Reports</text>

    <rect x="715" y="460" width="210" height="40" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="820" y="486" text-anchor="middle" class="text-md">Settings</text>

    <!-- Stats -->
    <text x="720" y="535" class="heading">This Week</text>

    <rect x="715" y="550" width="100" height="80" rx="6" fill="#334155"/>
    <text x="765" y="590" text-anchor="middle" class="heading-lg">12</text>
    <text x="765" y="615" text-anchor="middle" class="text-muted">Tasks</text>

    <rect x="825" y="550" width="100" height="80" rx="6" fill="#334155"/>
    <text x="875" y="590" text-anchor="middle" class="heading-lg">3</text>
    <text x="875" y="615" text-anchor="middle" class="text-muted">Projects</text>

    <!-- Detail annotation -->
    <rect x="715" y="700" width="210" height="30" rx="4" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="820" y="720" text-anchor="middle" class="annotation">240px detail</text>
  </g>

  <!-- MOBILE SECTION (right) -->
  <text x="980" y="52" class="label-mobile">MOBILE</text>

  <g id="mobile-view" transform="translate(980, 60)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="360" height="700" rx="24" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <!-- Screen area -->
    <rect x="10" y="10" width="340" height="680" rx="16" fill="#0f172a"/>

    <!-- Status bar -->
    <rect x="10" y="10" width="340" height="28" rx="16" fill="#1e293b"/>
    <text x="30" y="28" class="text-sm">9:41</text>
    <text x="310" y="28" class="text-sm">100%</text>

    <!-- Mobile Header -->
    <rect x="20" y="48" width="320" height="50" rx="8" fill="#1e293b"/>
    <text x="40" y="78" class="heading">Dashboard</text>
    <circle cx="310" cy="73" r="16" fill="#334155"/>
    <text x="310" y="77" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">JD</text>

    <!-- Welcome -->
    <text x="30" y="125" class="heading-lg">Welcome back, John</text>

    <!-- Account Status Card -->
    <rect x="20" y="140" width="320" height="70" rx="8" fill="#334155"/>
    <text x="40" y="165" class="text-md">Plan: Pro</text>
    <rect x="40" y="175" width="80" height="20" rx="10" fill="#22c55e"/>
    <text x="80" y="189" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="10" font-weight="bold">Active</text>
    <text x="260" y="168" class="heading-lg">12</text>
    <text x="260" y="188" class="text-muted">Tasks</text>
    <text x="310" y="168" class="heading-lg">3</text>
    <text x="310" y="188" class="text-muted">Projects</text>

    <!-- Recent Activity -->
    <text x="30" y="235" class="heading">Recent Activity</text>

    <!-- Mobile Activity Cards -->
    <rect x="20" y="250" width="320" height="56" rx="6" fill="#334155"/>
    <circle cx="45" cy="278" r="10" fill="#22c55e"/>
    <text x="45" y="282" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="8">✓</text>
    <text x="65" y="272" class="text-md">Completed profile setup</text>
    <text x="65" y="288" class="text-sm">2 hours ago</text>

    <rect x="20" y="316" width="320" height="56" rx="6" fill="#334155"/>
    <circle cx="45" cy="344" r="10" fill="#8b5cf6"/>
    <text x="45" y="348" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="8">↑</text>
    <text x="65" y="338" class="text-md">Uploaded new document</text>
    <text x="65" y="354" class="text-sm">5 hours ago</text>

    <rect x="20" y="382" width="320" height="56" rx="6" fill="#334155"/>
    <circle cx="45" cy="410" r="10" fill="#eab308"/>
    <text x="45" y="414" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="8">!</text>
    <text x="65" y="404" class="text-md">Password change reminder</text>
    <text x="65" y="420" class="text-sm">1 day ago</text>

    <rect x="20" y="448" width="320" height="56" rx="6" fill="#334155"/>
    <circle cx="45" cy="476" r="10" fill="#8b5cf6"/>
    <text x="45" y="480" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="8">+</text>
    <text x="65" y="470" class="text-md">Added new team member</text>
    <text x="65" y="486" class="text-sm">2 days ago</text>

    <rect x="20" y="514" width="320" height="56" rx="6" fill="#334155"/>
    <circle cx="45" cy="542" r="10" fill="#22c55e"/>
    <text x="45" y="546" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="8">✓</text>
    <text x="65" y="536" class="text-md">Account verified</text>
    <text x="65" y="552" class="text-sm">3 days ago</text>

    <!-- Bottom Navigation (Quick Actions) -->
    <rect x="10" y="630" width="340" height="60" rx="16" fill="#1e293b"/>

    <!-- Nav items -->
    <g transform="translate(50, 645)">
      <rect x="0" y="0" width="50" height="32" rx="6" fill="#8b5cf6"/>
      <text x="25" y="21" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="10">Home</text>
    </g>
    <g transform="translate(115, 645)">
      <rect x="0" y="0" width="50" height="32" rx="6" fill="#334155"/>
      <text x="25" y="21" text-anchor="middle" class="text-sm">New</text>
    </g>
    <g transform="translate(180, 645)">
      <rect x="0" y="0" width="50" height="32" rx="6" fill="#334155"/>
      <text x="25" y="21" text-anchor="middle" class="text-sm">Team</text>
    </g>
    <g transform="translate(245, 645)">
      <rect x="0" y="0" width="50" height="32" rx="6" fill="#334155"/>
      <text x="25" y="21" text-anchor="middle" class="text-sm">More</text>
    </g>
  </g>
</svg>
