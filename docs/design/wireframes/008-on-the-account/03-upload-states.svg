  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
    <style>
      .heading-lg { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 20px; font-weight: bold; }
      .heading { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 14px; font-weight: bold; }
      .text-md { fill: #cbd5e1; font-family: system-ui, sans-serif; font-size: 12px; }
      .text-sm { fill: #94a3b8; font-family: system-ui, sans-serif; font-size: 10px; }
      .text-muted { fill: #64748b; font-family: system-ui, sans-serif; font-size: 10px; }
      .annotation { fill: #8b5cf6; font-family: monospace; font-size: 10px; }
      .label-desktop { fill: #8b5cf6; font-family: monospace; font-size: 11px; font-weight: bold; }
      .label-mobile { fill: #d946ef; font-family: monospace; font-size: 11px; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.05">
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#fff"/>
    </pattern>
    <rect width="1400" height="800" fill="url(#dots)"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1400" height="3" fill="url(#accentGrad)"/>

  <!-- Title -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#64748b" letter-spacing="1">UPLOAD STATES &amp; ERROR HANDLING (FR-015 to FR-027)</text>

  <!-- UPLOADING STATE -->
  <text x="40" y="60" class="heading-lg">1. Uploading (FR-016)</text>
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="400" height="180" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>

    <!-- Avatar with progress -->
    <circle cx="80" cy="90" r="50" fill="#334155" stroke="#8b5cf6" stroke-width="3"/>

    <!-- Animated spinner -->
    <g transform="translate(80, 90)">
      <circle cx="0" cy="0" r="20" fill="none" stroke="#334155" stroke-width="3"/>
      <path d="M 0 -20 A 20 20 0 0 1 20 0" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Progress bar -->
    <rect x="150" y="70" width="220" height="8" rx="4" fill="#334155"/>
    <rect x="150" y="70" width="140" height="8" rx="4" fill="#8b5cf6"/>

    <text x="150" y="60" class="text-md">Uploading avatar...</text>
    <text x="150" y="100" class="text-sm">64% complete</text>

    <!-- Cancel option -->
    <text x="150" y="130" class="text-muted" style="cursor:pointer">Cancel upload</text>

    <!-- ARIA live region indicator -->
    <rect x="150" y="145" width="200" height="20" rx="4" fill="#0f172a" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="160" y="159" class="annotation">aria-live="polite"</text>
  </g>

  <!-- SUCCESS STATE -->
  <text x="480" y="60" class="heading-lg">2. Success (FR-015)</text>
  <g transform="translate(480, 80)">
    <rect x="0" y="0" width="400" height="180" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>

    <!-- Avatar with checkmark -->
    <circle cx="80" cy="90" r="50" fill="#475569" stroke="#22c55e" stroke-width="3"/>
    <text x="80" y="95" text-anchor="middle" class="text-muted">📷</text>

    <!-- Success badge -->
    <circle cx="115" cy="125" r="16" fill="#22c55e"/>
    <text x="115" y="130" text-anchor="middle" fill="#fff" font-size="14">✓</text>

    <text x="150" y="80" fill="#22c55e" font-size="14" font-weight="bold">Avatar Updated!</text>
    <text x="150" y="105" class="text-md">Your new profile picture is now live.</text>

    <!-- Actions -->
    <rect x="150" y="130" width="100" height="32" rx="6" fill="#334155"/>
    <text x="200" y="151" text-anchor="middle" class="text-sm">Replace</text>

    <rect x="260" y="130" width="100" height="32" rx="6" fill="transparent" stroke="#ef4444" stroke-width="1"/>
    <text x="310" y="151" text-anchor="middle" fill="#ef4444" font-size="10">Remove</text>
  </g>

  <!-- ERROR: INVALID FILE TYPE -->
  <text x="40" y="290" class="heading-lg">3. Invalid File Type (FR-002, FR-017)</text>
  <g transform="translate(40, 310)">
    <rect x="0" y="0" width="400" height="150" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>

    <!-- Error icon -->
    <circle cx="50" cy="75" r="30" fill="#7f1d1d"/>
    <text x="50" y="82" text-anchor="middle" fill="#ef4444" font-size="24">⚠</text>

    <text x="100" y="50" fill="#ef4444" font-size="14" font-weight="bold">Invalid File Format</text>
    <text x="100" y="75" class="text-md">Please upload a JPEG, PNG, or WebP image.</text>
    <text x="100" y="95" class="text-muted">You selected: document.pdf</text>

    <rect x="100" y="110" width="120" height="32" rx="6" fill="#8b5cf6"/>
    <text x="160" y="131" text-anchor="middle" fill="#fff" font-size="11">Try Again</text>
  </g>

  <!-- ERROR: FILE TOO LARGE -->
  <text x="480" y="290" class="heading-lg">4. File Too Large (FR-003, FR-017)</text>
  <g transform="translate(480, 310)">
    <rect x="0" y="0" width="400" height="150" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>

    <!-- Error icon -->
    <circle cx="50" cy="75" r="30" fill="#7f1d1d"/>
    <text x="50" y="82" text-anchor="middle" fill="#ef4444" font-size="24">📦</text>

    <text x="100" y="50" fill="#ef4444" font-size="14" font-weight="bold">File Too Large</text>
    <text x="100" y="75" class="text-md">Image must be under 5MB.</text>
    <text x="100" y="95" class="text-muted">Your file: 12.4MB</text>

    <rect x="100" y="110" width="160" height="32" rx="6" fill="#8b5cf6"/>
    <text x="180" y="131" text-anchor="middle" fill="#fff" font-size="11">Choose Smaller File</text>
  </g>

  <!-- ERROR: UPLOAD FAILED -->
  <text x="40" y="490" class="heading-lg">5. Upload Failed - Network Error (FR-017, FR-018)</text>
  <g transform="translate(40, 510)">
    <rect x="0" y="0" width="400" height="170" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>

    <!-- Error icon -->
    <circle cx="50" cy="85" r="30" fill="#7f1d1d"/>
    <text x="50" y="92" text-anchor="middle" fill="#ef4444" font-size="24">📡</text>

    <text x="100" y="50" fill="#ef4444" font-size="14" font-weight="bold">Upload Failed</text>
    <text x="100" y="75" class="text-md">Check your connection and try again.</text>
    <text x="100" y="95" class="text-muted">Error: Network request failed</text>

    <!-- Retry button -->
    <rect x="100" y="115" width="100" height="36" rx="6" fill="#8b5cf6"/>
    <text x="150" y="138" text-anchor="middle" fill="#fff" font-size="12">🔄 Retry</text>

    <!-- Cancel -->
    <text x="220" y="138" class="text-muted" style="cursor:pointer">Cancel</text>
  </g>

  <!-- REMOVE CONFIRMATION -->
  <text x="480" y="490" class="heading-lg">6. Remove Confirmation (FR-021, FR-022)</text>
  <g transform="translate(480, 510)">
    <rect x="0" y="0" width="400" height="170" rx="8" fill="#1e293b" stroke="#eab308" stroke-width="2"/>

    <!-- Warning icon -->
    <circle cx="50" cy="85" r="30" fill="#422006"/>
    <text x="50" y="92" text-anchor="middle" fill="#eab308" font-size="24">🗑️</text>

    <text x="100" y="50" fill="#eab308" font-size="14" font-weight="bold">Remove Avatar?</text>
    <text x="100" y="75" class="text-md">Your profile will show default initials.</text>
    <text x="100" y="95" class="text-muted">This action cannot be undone.</text>

    <!-- Actions -->
    <rect x="100" y="115" width="100" height="36" rx="6" fill="transparent" stroke="#475569" stroke-width="1"/>
    <text x="150" y="138" text-anchor="middle" class="text-md">Cancel</text>

    <rect x="210" y="115" width="140" height="36" rx="6" fill="#ef4444"/>
    <text x="280" y="138" text-anchor="middle" fill="#fff" font-size="12">Remove Avatar</text>
  </g>

  <!-- MOBILE ERROR STATES -->
  <text x="920" y="60" class="label-mobile">MOBILE ERROR TOAST</text>
  <g transform="translate(920, 80)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="320" height="400" rx="20" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <rect x="8" y="8" width="304" height="384" rx="14" fill="#0f172a"/>

    <!-- Status bar -->
    <rect x="8" y="8" width="304" height="24" rx="14" fill="#1e293b"/>
    <text x="24" y="24" class="text-sm">9:41</text>

    <!-- Content underneath (blurred/dimmed) -->
    <rect x="20" y="80" width="280" height="250" rx="8" fill="#1e293b" opacity="0.5"/>

    <!-- Error toast overlay -->
    <rect x="20" y="320" width="280" height="60" rx="8" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
    <text x="40" y="345" fill="#ef4444" font-size="12" font-weight="bold">⚠ Upload Failed</text>
    <text x="40" y="365" fill="#fca5a5" font-size="10">Tap to retry</text>
    <text x="280" y="350" fill="#fca5a5" font-size="14">✕</text>
  </g>

  <!-- ACCESSIBILITY NOTES -->
  <text x="920" y="510" class="heading">Accessibility (FR-023 to FR-027)</text>
  <g transform="translate(920, 530)">
    <rect x="0" y="0" width="320" height="200" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>

    <text x="15" y="30" class="text-sm" fill="#22c55e">✓ FR-023: Keyboard navigation</text>
    <text x="15" y="55" class="text-sm" fill="#22c55e">✓ FR-024: Screen reader announcements</text>
    <text x="15" y="80" class="text-sm" fill="#22c55e">✓ FR-025: Crop keyboard controls</text>
    <text x="15" y="105" class="text-sm" fill="#22c55e">✓ FR-026: Visible focus indicators</text>
    <text x="15" y="130" class="text-sm" fill="#22c55e">✓ FR-027: ARIA live regions for errors</text>

    <rect x="15" y="150" width="290" height="35" rx="4" fill="#0f172a"/>
    <text x="25" y="172" fill="#d946ef" font-family="monospace" font-size="9">&lt;div role="status" aria-live="polite"&gt;</text>
  </g>

  <!-- Bottom annotation -->
  <rect x="40" y="770" width="500" height="25" rx="4" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <text x="60" y="787" class="annotation">All error messages announced via ARIA live regions | 44×44px touch targets (NFR-004)</text>
