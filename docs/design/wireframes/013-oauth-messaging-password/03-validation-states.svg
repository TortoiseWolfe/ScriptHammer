    <rect x="510" y="290" width="380" height="40" rx="6" fill="#422006" stroke="#eab308" stroke-width="1"/>
    <text x="530" y="313" fill="#fbbf24" font-size="10">⚠️ Stronger passwords protect your messages better.</text>
    <text x="530" y="325" class="text-muted">Use 12+ chars with mixed case, numbers, symbols.</text>

