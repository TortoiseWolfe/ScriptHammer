    <rect x="510" y="182" width="95" height="4" rx="2" fill="#ef4444"/>
    <rect x="610" y="182" width="95" height="4" rx="2" fill="#334155"/>
    <rect x="710" y="182" width="95" height="4" rx="2" fill="#334155"/>
