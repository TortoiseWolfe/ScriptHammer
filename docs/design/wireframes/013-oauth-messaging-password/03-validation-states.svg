    <g transform="translate(600, 520)">
      <circle cx="0" cy="0" r="16" fill="none" stroke="#334155" stroke-width="3"/>
      <path d="M 0 -16 A 16 16 0 0 1 16 0" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite"/>
      </path>
    </g>
    <text x="600" y="560" text-anchor="middle" class="text-muted">Checking encryption status...</text>

