    <rect x="80" y="620" width="340" height="40" rx="6" fill="#7f1d1d"/>
    <text x="250" y="645" text-anchor="middle" fill="#fca5a5" font-size="11">There is no password reset for encrypted messages.</text>

    <!-- Buttons -->
    <rect x="80" y="680" width="160" height="36" rx="6" fill="#334155"/>
    <text x="160" y="703" text-anchor="middle" class="text-sm" fill="#fff">I Understand</text>

    <rect x="260" y="680" width="160" height="36" rx="6" fill="url(#accentGrad)"/>
    <text x="340" y="703" text-anchor="middle" fill="#fff" font-size="11">Try Remembering</text>

    <!-- Annotation -->
    <rect x="60" y="730" width="200" height="30" rx="4" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
    <text x="160" y="750" text-anchor="middle" class="text-sm" fill="#ef4444">Edge Case: No recovery possible</text>
  </g>

  <!-- STATE 4: Loading/Processing (Bottom Right) -->
  <text x="490" y="420" class="label-mobile">LOADING STATES</text>
  <g id="state-loading">
    <rect x="490" y="430" width="420" height="340" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>

