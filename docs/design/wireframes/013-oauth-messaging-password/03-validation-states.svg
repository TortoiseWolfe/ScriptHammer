    <text x="140" y="360" text-anchor="middle" class="text-sm" fill="#ef4444">FR-006: Match validation</text>
  </g>

  <!-- STATE 2: Weak Password (Top Right) -->
  <text x="490" y="52" class="label-desktop">WEAK PASSWORD</text>
  <g id="state-weak">
    <rect x="490" y="60" width="420" height="340" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>

    <!-- Header -->
    <rect x="490" y="60" width="420" height="45" rx="8" fill="#334155"/>
    <rect x="490" y="97" width="420" height="8" fill="#1e293b"/>
    <text x="510" y="88" class="heading">Create a Messaging Password</text>

