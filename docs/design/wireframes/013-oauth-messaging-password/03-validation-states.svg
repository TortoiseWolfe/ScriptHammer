    <rect x="40" y="97" width="420" height="8" fill="#1e293b"/>
    <text x="60" y="88" class="heading">Create a Messaging Password</text>

    <!-- Password Field -->
    <text x="60" y="130" class="text-sm">Messaging Password</text>
    <rect x="60" y="140" width="380" height="36" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="75" y="163" class="text-muted">••••••••••••</text>

    <!-- Confirm Field - Error State -->
    <text x="60" y="200" class="text-sm">Confirm Password</text>
    <rect x="60" y="210" width="380" height="36" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="2"/>
    <text x="75" y="233" class="text-muted">••••••••</text>

    <!-- Error Message -->
    <text x="60" y="265" fill="#ef4444" font-size="11" font-family="system-ui">✕ Passwords do not match</text>

    <!-- Disabled Button -->
    <rect x="60" y="290" width="380" height="36" rx="6" fill="#334155" opacity="0.5"/>
    <text x="250" y="313" text-anchor="middle" fill="#64748b" font-size="12">Create Messaging Password</text>

