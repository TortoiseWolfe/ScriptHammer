      <path d="M 0 -16 A 16 16 0 0 1 16 0" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite"/>
      </path>
    </g>
    <text x="800" y="560" text-anchor="middle" class="text-muted">Generating keys...</text>

    <!-- Unlocking State -->
    <rect x="510" y="610" width="180" height="140" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="600" y="635" text-anchor="middle" class="text-sm" fill="#d946ef">UNLOCKING</text>

    <!-- Animated spinner -->
    <g transform="translate(600, 680)">
      <circle cx="0" cy="0" r="16" fill="none" stroke="#334155" stroke-width="3"/>
      <path d="M 0 -16 A 16 16 0 0 1 16 0" fill="none" stroke="#d946ef" stroke-width="3" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite"/>
      </path>
    </g>
    <text x="600" y="720" text-anchor="middle" class="text-muted">Decrypting messages...</text>

    <!-- Error/Retry State -->
    <rect x="710" y="610" width="180" height="140" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
    <text x="800" y="635" text-anchor="middle" class="text-sm" fill="#ef4444">ERROR - RETRY</text>

    <!-- Error icon -->
    <circle cx="800" cy="680" r="16" fill="#7f1d1d"/>
    <text x="800" y="686" text-anchor="middle" fill="#ef4444" font-size="16">!</text>
    <text x="800" y="710" text-anchor="middle" class="text-muted">Timeout - tap to retry</text>

