  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1400" height="3" fill="url(#accentGrad)"/>

  <!-- Title -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#64748b" letter-spacing="1">VALIDATION STATES - ERROR HANDLING &amp; EDGE CASES</text>

  <!-- STATE 1: Password Mismatch (Top Left) -->
  <text x="40" y="52" class="label-desktop">PASSWORD MISMATCH</text>
  <g id="state-mismatch">
    <rect x="40" y="60" width="420" height="340" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>

    <!-- Header -->
