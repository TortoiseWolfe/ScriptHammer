    <!-- Warning Title -->
    <text x="250" y="535" text-anchor="middle" class="heading-lg" fill="#ef4444">Cannot Recover Password</text>

    <!-- Warning Text -->
    <text x="250" y="565" text-anchor="middle" class="text-md">Your messages are encrypted with your</text>
    <text x="250" y="585" text-anchor="middle" class="text-md">messaging password. Without it, your</text>
    <text x="250" y="605" text-anchor="middle" class="text-md">encrypted messages cannot be read.</text>

