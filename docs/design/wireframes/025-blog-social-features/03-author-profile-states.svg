    <text x="75" y="55" class="text-muted">aria-label="Share on Twitter"</text>
    <text x="75" y="70" class="text-muted">Focus ring: 3px #8b5cf6</text>

    <!-- Touch target indicator -->
    <rect x="15" y="85" width="44" height="30" rx="4" fill="transparent" stroke="#22c55e" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="15" y="100" class="text-sm">44×44</text>
    <text x="75" y="100" class="text-muted">Minimum touch target (FR-024)</text>
  </g>

  <!-- JS DISABLED FALLBACK -->
  <text x="60" y="420" class="label-desktop">FALLBACK: JS DISABLED (FR-005, User Story 4)</text>

  <g id="js-disabled" transform="translate(60, 435)">
    <rect x="0" y="0" width="500" height="150" rx="8" fill="#1e293b" stroke="#eab308" stroke-width="2"/>

    <text x="15" y="25" class="warning">JavaScript Disabled Mode</text>

    <!-- Share section -->
    <text x="15" y="55" class="text-sm">Share this post:</text>

    <!-- Direct share links -->
    <rect x="15" y="65" width="110" height="30" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="70" y="84" text-anchor="middle" class="text-sm">Twitter ↗</text>

    <rect x="135" y="65" width="110" height="30" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="190" y="84" text-anchor="middle" class="text-sm">LinkedIn ↗</text>

    <rect x="255" y="65" width="110" height="30" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
