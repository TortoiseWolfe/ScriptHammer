  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
    <style>
      .heading-lg { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 20px; font-weight: bold; }
      .heading { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 14px; font-weight: bold; }
      .text-md { fill: #cbd5e1; font-family: system-ui, sans-serif; font-size: 12px; }
      .text-sm { fill: #94a3b8; font-family: system-ui, sans-serif; font-size: 10px; }
      .text-muted { fill: #64748b; font-family: system-ui, sans-serif; font-size: 10px; }
      .annotation { fill: #8b5cf6; font-family: monospace; font-size: 10px; }
      .label-desktop { fill: #8b5cf6; font-family: monospace; font-size: 11px; font-weight: bold; }
      .label-mobile { fill: #d946ef; font-family: monospace; font-size: 11px; font-weight: bold; }
      .success { fill: #22c55e; }
      .warning { fill: #eab308; }
      .error { fill: #ef4444; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.05">
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#fff"/>
    </pattern>
    <rect width="1400" height="800" fill="url(#dots)"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1400" height="3" fill="url(#accentGrad)"/>

  <!-- Title -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#64748b" letter-spacing="1">AUTHOR PROFILE STATES &amp; ACCESSIBILITY</text>

  <!-- STATE 1: Full Author Profile -->
  <text x="60" y="60" class="label-desktop">STATE 1: FULL PROFILE (FR-010, FR-011)</text>

  <g id="full-profile" transform="translate(60, 75)">
    <rect x="0" y="0" width="400" height="150" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>

    <!-- Avatar with Image -->
    <circle cx="55" cy="75" r="40" fill="#334155" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="20" y="40" width="70" height="70" rx="35" fill="#475569" opacity="0.5"/>
    <text x="55" y="80" text-anchor="middle" class="text-muted">Photo</text>

    <!-- Author Info -->
    <text x="115" y="45" class="heading">Jane Developer</text>
    <text x="115" y="65" class="text-sm">Senior Frontend Engineer @ TechCorp</text>
    <text x="115" y="85" class="text-muted">Building accessible web experiences</text>
    <text x="115" y="100" class="text-muted">since 2015. React, TypeScript, a11y.</text>

    <!-- Social Links -->
    <g id="social-links-full">
      <rect x="115" y="115" width="36" height="24" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/>
      <text x="133" y="131" text-anchor="middle" class="text-sm">𝕏</text>

      <rect x="160" y="115" width="36" height="24" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/>
      <text x="178" y="131" text-anchor="middle" class="text-sm">in</text>

      <rect x="205" y="115" width="36" height="24" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/>
      <text x="223" y="131" text-anchor="middle" class="text-sm">GH</text>

      <rect x="250" y="115" width="50" height="24" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/>
      <text x="275" y="131" text-anchor="middle" class="text-sm">Web</text>
    </g>

    <!-- Check mark -->
    <circle cx="380" cy="20" r="12" fill="#22c55e" opacity="0.2"/>
    <text x="380" y="25" text-anchor="middle" class="success">✓</text>
  </g>

  <!-- STATE 2: Avatar Fallback (Initials) -->
  <text x="500" y="60" class="label-desktop">STATE 2: AVATAR FALLBACK (FR-018)</text>

  <g id="initials-avatar" transform="translate(500, 75)">
    <rect x="0" y="0" width="400" height="150" rx="8" fill="#1e293b" stroke="#eab308" stroke-width="2"/>

    <!-- Avatar with Initials -->
    <circle cx="55" cy="75" r="40" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="2"/>
    <text x="55" y="83" text-anchor="middle" fill="#8b5cf6" font-family="system-ui" font-size="24" font-weight="bold">JD</text>

    <!-- Author Info -->
    <text x="115" y="45" class="heading">John Doe</text>
    <text x="115" y="65" class="text-sm">Backend Developer</text>
    <text x="115" y="85" class="text-muted">No photo uploaded - using initials</text>
    <text x="115" y="100" class="text-muted">from first/last name</text>

    <!-- Social Links -->
    <rect x="115" y="115" width="36" height="24" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="133" y="131" text-anchor="middle" class="text-sm">𝕏</text>

    <rect x="160" y="115" width="36" height="24" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="178" y="131" text-anchor="middle" class="text-sm">GH</text>

    <!-- Warning indicator -->
    <circle cx="380" cy="20" r="12" fill="#eab308" opacity="0.2"/>
    <text x="380" y="25" text-anchor="middle" class="warning">!</text>
  </g>

  <!-- STATE 3: No Social Links -->
  <text x="940" y="60" class="label-desktop">STATE 3: NO SOCIAL LINKS (FR-014)</text>

  <g id="no-social" transform="translate(940, 75)">
    <rect x="0" y="0" width="400" height="150" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>

    <!-- Avatar -->
    <circle cx="55" cy="75" r="40" fill="#334155" stroke="#64748b" stroke-width="2"/>
    <text x="55" y="83" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="24" font-weight="bold">SM</text>

    <!-- Author Info -->
    <text x="115" y="45" class="heading">Sarah Martinez</text>
    <text x="115" y="65" class="text-sm">Technical Writer</text>
    <text x="115" y="85" class="text-muted">No social links configured.</text>
    <text x="115" y="100" class="text-muted">Section displays without empty containers.</text>

    <!-- No social links section - just empty space -->
    <text x="115" y="130" class="text-muted" font-style="italic">No links shown (FR-014 compliant)</text>

