    <circle cx="235" cy="75" r="25" fill="#e2e8f0" stroke="#8b5cf6" stroke-width="2"/>
    <text x="235" y="82" text-anchor="middle" fill="#8b5cf6" font-family="system-ui" font-size="14" font-weight="bold">JD</text>

    <text x="270" y="60" fill="#1e293b" font-family="system-ui" font-size="11" font-weight="bold">Jane Dev</text>
    <text x="270" y="78" fill="#64748b" font-family="system-ui" font-size="9">Engineer</text>

    <rect x="270" y="95" width="28" height="18" rx="4" fill="#e2e8f0"/>
    <text x="284" y="107" text-anchor="middle" fill="#475569" font-family="system-ui" font-size="9">𝕏</text>

    <rect x="303" y="95" width="28" height="18" rx="4" fill="#e2e8f0"/>
    <text x="317" y="107" text-anchor="middle" fill="#475569" font-family="system-ui" font-size="9">in</text>
