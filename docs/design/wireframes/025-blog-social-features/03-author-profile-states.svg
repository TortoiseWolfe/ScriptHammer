    <text x="80" y="60" fill="#fff" font-family="system-ui" font-size="11" font-weight="bold">Jane Dev</text>
    <text x="80" y="78" fill="#94a3b8" font-family="system-ui" font-size="9">Engineer</text>

    <rect x="80" y="95" width="28" height="18" rx="4" fill="#334155"/>
    <text x="94" y="107" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">𝕏</text>

    <rect x="113" y="95" width="28" height="18" rx="4" fill="#334155"/>
    <text x="127" y="107" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">in</text>

    <!-- Light Theme -->
