    <rect x="380" y="115" width="75" height="20" rx="4" fill="#8b5cf6"/>
    <text x="417" y="129" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="10">Select All</text>
  </g>

  <!-- VALIDATION: Invalid URL Handling -->
  <text x="600" y="420" class="label-desktop">VALIDATION: INVALID URLS (Edge Case)</text>

  <g id="invalid-urls" transform="translate(600, 435)">
    <rect x="0" y="0" width="380" height="150" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>

    <text x="15" y="25" class="error">Build-Time URL Validation (FR-013)</text>

    <!-- Valid URL -->
    <rect x="15" y="45" width="350" height="30" rx="4" fill="#22c55e" opacity="0.1"/>
    <text x="25" y="64" class="success">✓ twitter.com/janedev</text>
