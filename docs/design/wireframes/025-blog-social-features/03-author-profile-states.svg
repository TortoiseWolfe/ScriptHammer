    <text x="55" y="68" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="24">?</text>

    <!-- Author Info -->
    <text x="115" y="40" fill="#64748b" font-family="system-ui" font-size="14" font-weight="bold">Anonymous</text>
    <text x="115" y="60" class="text-muted">Author information not available</text>
    <text x="115" y="80" class="text-muted">or post not attributed.</text>

