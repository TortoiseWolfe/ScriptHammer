  <text x="60" y="255" class="label-mobile">STATE 4: HIDDEN SOCIAL (FR-015)</text>

  <g id="hidden-social" transform="translate(60, 270)">
    <rect x="0" y="0" width="400" height="120" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2" stroke-dasharray="4,2"/>

    <!-- Avatar -->
    <circle cx="55" cy="60" r="40" fill="#334155" stroke="#64748b" stroke-width="2"/>
    <text x="55" y="68" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="24" font-weight="bold">AK</text>

    <!-- Author Info -->
    <text x="115" y="40" class="heading">Alex Kim</text>
    <text x="115" y="60" class="text-sm">Privacy-conscious author</text>
    <text x="115" y="80" class="text-muted">Author has disabled social links display</text>
    <text x="115" y="95" class="text-muted">in their profile settings.</text>

    <!-- Hidden indicator -->
    <rect x="310" y="90" width="80" height="20" rx="4" fill="#334155"/>
    <text x="350" y="104" text-anchor="middle" class="text-muted">🔒 Hidden</text>
  </g>

  <!-- STATE 5: Anonymous/Missing Author -->
  <text x="500" y="255" class="label-mobile">STATE 5: ANONYMOUS (Edge Case)</text>

  <g id="anonymous" transform="translate(500, 270)">
    <rect x="0" y="0" width="400" height="120" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2"/>

