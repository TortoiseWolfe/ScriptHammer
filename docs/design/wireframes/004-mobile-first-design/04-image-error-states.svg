  <text x="100" y="725" fill="#cbd5e1" font-family="monospace" font-size="10">fallback?: 'retry' | 'blur' | 'hide' | ReactNode;</text>
  <text x="80" y="745" fill="#d946ef" font-family="monospace" font-size="10">}</text>

