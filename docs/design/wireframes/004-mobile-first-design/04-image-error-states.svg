  <text x="80" y="665" fill="#d946ef" font-family="monospace" font-size="10">export interface ImageFallbackProps {</text>
  <text x="100" y="685" fill="#cbd5e1" font-family="monospace" font-size="10">alt: string;          // Always required for a11y</text>
