  <text x="800" y="685" class="text-md" fill="#cbd5e1">2. Choose fallback strategy:</text>
  <text x="820" y="705" class="text-sm">• 'retry' - Default, shows alt + retry button</text>
  <text x="820" y="725" class="text-sm">• 'blur' - LQIP blur-up progressive loading</text>
  <text x="820" y="745" class="text-sm">• 'hide' - Remove element on error</text>
  <text x="820" y="765" class="text-sm">• ReactNode - Custom fallback component</text>

