  <g transform="translate(40, 90)">
    <rect x="0" y="0" width="180" height="100" rx="8" fill="url(#roleAuthGrad)" opacity="0.9"/>
    <text x="90" y="25" text-anchor="middle" class="role-label">AUTHENTICATED</text>
