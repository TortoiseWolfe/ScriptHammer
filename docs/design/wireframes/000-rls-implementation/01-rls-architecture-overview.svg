  <line x1="540" y1="170" x2="570" y2="170" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowhead-purple)"/>
  <line x1="540" y1="265" x2="570" y2="265" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowhead-purple)"/>
  <line x1="540" y1="360" x2="570" y2="360" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowhead-purple)"/>
  <!-- audit_logs: NO purple arrow - service_role can only INSERT, not UPDATE/DELETE (FR-015-017) -->

  <!-- ==================== SECTION 4: LEGEND & PRINCIPLES (y=80-485) ==================== -->
  <!-- Legend Panel -->
  <rect x="860" y="80" width="240" height="160" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="880" y="110" class="heading">LEGEND</text>

  <line x1="880" y1="135" x2="920" y2="135" stroke="#22c55e" stroke-width="3"/>
  <text x="930" y="140" class="text-md">Authenticated access</text>

  <line x1="880" y1="165" x2="920" y2="165" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="6,3"/>
  <text x="930" y="170" class="text-md">Service bypass</text>

  <line x1="880" y1="195" x2="920" y2="195" stroke="#ef4444" stroke-width="3"/>
  <text x="930" y="200" class="text-md">Denied/Protected</text>

  <circle cx="890" cy="225" r="8" fill="#22c55e"/>
  <text x="910" y="230" class="text-md">RLS Enabled</text>

  <!-- Key Principles Panel -->
  <rect x="860" y="260" width="500" height="170" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="880" y="290" class="heading">KEY SECURITY PRINCIPLES</text>

  <text x="880" y="320" class="text-md">1. Default Deny - No access without explicit policy (FR-005)</text>
  <text x="880" y="345" class="text-md">2. Owner Isolation - Users see only their own data (FR-006-010)</text>
  <text x="880" y="370" class="text-md">3. Service Bypass - Backend ops via service_role (FR-011-014)</text>
  <text x="880" y="395" class="text-md">4. Audit Immutability - Logs cannot be modified (FR-015-018)</text>
  <text x="880" y="420" class="text-md">5. Anonymous Restriction - Minimal public access (FR-019-021)</text>

  <!-- Compliance Panel (acronyms expanded) -->
  <rect x="860" y="450" width="500" height="80" rx="8" fill="#1e293b" stroke="#8b5cf6"/>
  <text x="880" y="480" class="heading" fill="#c4b5fd">COMPLIANCE</text>
  <text x="880" y="505" class="text-md">GDPR (EU Data Protection) + SOC 2 (Security Audit) | 99.9% Uptime</text>
  <text x="880" y="525" class="text-sm">SC-001 to SC-008: All tables protected, zero cross-user access</text>

  <!-- ==================== SECTION 5: PATTERNS REFERENCE (y=540-740) ==================== -->
  <rect x="40" y="550" width="1320" height="150" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="60" y="580" class="heading">STANDARD PATTERNS (Templates for Future Features)</text>

  <!-- Pattern cards -->
  <rect x="60" y="600" width="300" height="85" rx="6" fill="#334155"/>
  <text x="80" y="625" class="heading-sm" fill="#22c55e">Pattern 1: Owner Isolation</text>
  <text x="80" y="650" class="code">WHERE auth.uid() = user_id</text>
  <text x="80" y="672" class="annotation">FR-022</text>

  <rect x="380" y="600" width="300" height="85" rx="6" fill="#334155"/>
  <text x="400" y="625" class="heading-sm" fill="#8b5cf6">Pattern 2: Service Bypass</text>
  <text x="400" y="650" class="code">OR auth.role() = 'service_role'</text>
  <text x="400" y="672" class="annotation">FR-023</text>

  <rect x="700" y="600" width="300" height="85" rx="6" fill="#334155"/>
  <text x="720" y="625" class="heading-sm" fill="#f59e0b">Pattern 3: Soft Delete</text>
  <text x="720" y="650" class="code">FOR DELETE USING (false)</text>
  <text x="720" y="672" class="annotation">FR-024</text>

  <rect x="1020" y="600" width="320" height="85" rx="6" fill="#334155"/>
  <text x="1040" y="625" class="heading-sm" fill="#ef4444">Pattern 4: Immutable Audit</text>
  <text x="1040" y="650" class="code">INSERT only via service_role</text>
  <text x="1040" y="672" class="annotation">FR-025</text>

