    <rect x="30" y="350" width="60" height="28" rx="4" fill="#22c55e"/>
    <text x="60" y="369" text-anchor="middle" class="text-sm" fill="#ffffff">ALLOW</text>
    <rect x="110" y="350" width="60" height="28" rx="4" fill="#ef4444"/>
    <text x="140" y="369" text-anchor="middle" class="text-sm" fill="#ffffff">DENY</text>
  </g>

