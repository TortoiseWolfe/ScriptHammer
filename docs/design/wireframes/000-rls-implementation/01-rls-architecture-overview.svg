    <text x="20" y="60" class="text-md" fill="#cbd5e1">Policy Evaluation:</text>

    <rect x="20" y="75" width="160" height="50" rx="4" fill="#334155"/>
    <text x="30" y="95" class="policy-text">auth.uid() = user_id</text>
    <text x="30" y="110" class="text-muted">Owner isolation check</text>

    <rect x="20" y="135" width="160" height="50" rx="4" fill="#334155"/>
    <text x="30" y="155" class="policy-text">auth.role() = 'service'</text>
    <text x="30" y="170" class="text-muted">Service bypass check</text>

    <rect x="20" y="195" width="160" height="50" rx="4" fill="#334155"/>
    <text x="30" y="215" class="policy-text">is_public = true</text>
    <text x="30" y="230" class="text-muted">Public access check</text>

    <rect x="20" y="255" width="160" height="50" rx="4" fill="#334155"/>
    <text x="30" y="275" class="policy-text">operation = 'INSERT'</text>
    <text x="30" y="290" class="text-muted">Audit immutability</text>

