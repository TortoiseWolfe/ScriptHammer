  <text x="700" y="54" text-anchor="middle" class="text-muted">Row Level Security Foundation - Data Access Control Flow</text>

  <!-- ==================== SECTION 1: SECURITY ROLES (y=80-480) ==================== -->
  <text x="40" y="85" class="heading">SECURITY ROLES</text>
  <text x="40" y="105" class="annotation">FR-006 to FR-021</text>

  <!-- Role 1: Authenticated (DARK TEXT on green - WCAG AA) -->
  <rect x="40" y="125" width="200" height="110" rx="8" fill="#22c55e"/>
  <text x="140" y="155" text-anchor="middle" class="text-on-green" style="font-size:16px">AUTHENTICATED</text>
  <text x="140" y="180" text-anchor="middle" class="text-on-green-sm">Logged-in users</text>
  <text x="140" y="202" text-anchor="middle" class="text-on-green-sm">Access: Own data only</text>
  <text x="140" y="222" text-anchor="middle" class="text-on-green-sm">auth.uid() = user_id</text>

  <!-- Role 2: Service Role -->
  <rect x="40" y="250" width="200" height="110" rx="8" fill="#8b5cf6"/>
  <text x="140" y="280" text-anchor="middle" class="heading" fill="#ffffff">SERVICE_ROLE</text>
  <text x="140" y="305" text-anchor="middle" class="text-md" fill="#ffffff">Backend services</text>
  <text x="140" y="327" text-anchor="middle" class="text-sm" fill="#e9d5ff">Access: All data</text>
  <text x="140" y="347" text-anchor="middle" class="text-sm" fill="#e9d5ff">Bypass for operations</text>

  <!-- Role 3: Anonymous -->
  <rect x="40" y="375" width="200" height="110" rx="8" fill="#64748b"/>
  <text x="140" y="405" text-anchor="middle" class="heading" fill="#ffffff">ANON</text>
  <text x="140" y="430" text-anchor="middle" class="text-md" fill="#ffffff">Unauthenticated</text>
  <text x="140" y="452" text-anchor="middle" class="text-sm" fill="#cbd5e1">Access: Public only</text>
  <text x="140" y="472" text-anchor="middle" class="text-sm" fill="#cbd5e1">No write access</text>

  <!-- ==================== SECTION 2: RLS POLICY LAYER (y=125-485) ==================== -->
  <rect x="280" y="125" width="260" height="360" rx="8" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="410" y="155" text-anchor="middle" class="heading">RLS POLICY LAYER</text>

  <!-- Policy checks -->
  <rect x="300" y="175" width="220" height="50" rx="6" fill="#334155"/>
  <text x="410" y="205" text-anchor="middle" class="text-md">1. Validate JWT Token</text>

  <rect x="300" y="240" width="220" height="50" rx="6" fill="#334155"/>
  <text x="410" y="270" text-anchor="middle" class="text-md">2. Extract auth.uid()</text>

  <rect x="300" y="305" width="220" height="50" rx="6" fill="#334155"/>
  <text x="410" y="335" text-anchor="middle" class="text-md">3. Check auth.role()</text>

  <rect x="300" y="370" width="220" height="50" rx="6" fill="#334155"/>
  <text x="410" y="400" text-anchor="middle" class="text-md">4. Evaluate Policy</text>

  <rect x="300" y="435" width="220" height="40" rx="6" fill="#1e293b" stroke="#22c55e"/>
  <text x="410" y="462" text-anchor="middle" class="text-md" fill="#22c55e">ALLOW or DENY</text>

  <!-- Flow arrows from roles to RLS layer -->
  <line x1="240" y1="180" x2="280" y2="200" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="240" y1="305" x2="280" y2="305" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowhead-purple)"/>
  <line x1="240" y1="430" x2="280" y2="395" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowhead-red)"/>

  <!-- ==================== SECTION 3: PROTECTED TABLES (y=80-485) ==================== -->
  <text x="580" y="85" class="heading">PROTECTED TABLES</text>
  <text x="580" y="105" class="annotation">FR-001 to FR-005</text>

  <!-- Table 1: users -->
  <rect x="580" y="125" width="240" height="80" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <circle cx="800" cy="145" r="10" fill="#22c55e"/>
  <text x="600" y="155" class="heading-sm">users</text>
  <text x="600" y="177" class="code">id, email, created_at</text>
  <text x="600" y="195" class="text-sm">RLS: Owner SELECT only</text>

  <!-- Table 2: profiles -->
  <rect x="580" y="220" width="240" height="80" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <circle cx="800" cy="240" r="10" fill="#22c55e"/>
  <text x="600" y="250" class="heading-sm">profiles</text>
  <text x="600" y="272" class="code">user_id, display_name, bio</text>
  <text x="600" y="290" class="text-sm">RLS: Owner SELECT/UPDATE</text>

  <!-- Table 3: sessions -->
  <rect x="580" y="315" width="240" height="80" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <circle cx="800" cy="335" r="10" fill="#22c55e"/>
  <text x="600" y="345" class="heading-sm">sessions</text>
  <text x="600" y="367" class="code">user_id, token, expires_at</text>
  <text x="600" y="385" class="text-sm">RLS: Owner SELECT only</text>

  <!-- Table 4: audit_logs (special protection) -->
  <rect x="580" y="410" width="240" height="80" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <circle cx="800" cy="430" r="10" fill="#ef4444"/>
  <text x="600" y="440" class="heading-sm" fill="#fca5a5">audit_logs</text>
  <text x="600" y="462" class="code">user_id, event, timestamp</text>
  <text x="600" y="480" class="text-sm" fill="#fca5a5">IMMUTABLE: No UPDATE/DELETE</text>

  <!-- Flow arrows from RLS to tables - all horizontal parallel lines -->
  <!-- Green (authenticated) - offset 5px above purple -->
  <line x1="540" y1="160" x2="570" y2="160" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="540" y1="255" x2="570" y2="255" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="540" y1="350" x2="570" y2="350" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Red (denied for audit_logs) -->
  <line x1="540" y1="445" x2="570" y2="445" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowhead-red)"/>

