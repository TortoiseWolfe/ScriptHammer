  <text x="700" y="54" text-anchor="middle" class="text-muted">Reusable Policy Templates for Future Features</text>

  <!-- ==================== PATTERN 1: Owner Isolation (y=75-355) ==================== -->
  <g transform="translate(40, 75)">
    <!-- Header (DARK TEXT on green - WCAG AA) -->
    <rect x="0" y="0" width="650" height="45" rx="8" fill="url(#patternGrad1)"/>
    <text x="25" y="30" class="text-on-green">PATTERN 1: Owner Isolation</text>
    <text x="625" y="30" text-anchor="end" class="annotation-on-green">FR-022</text>

    <!-- Content box -->
    <rect x="0" y="55" width="650" height="225" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>

    <!-- Description -->
    <text x="25" y="90" class="text-md">Purpose: Ensure users can only access their own data</text>
    <text x="25" y="115" class="text-md">Use when: Any table with user-owned records</text>

    <!-- SQL Template -->
    <rect x="25" y="130" width="600" height="95" rx="6" fill="#0f172a"/>
    <text x="40" y="155" class="code" fill="#22c55e">-- Enable RLS on table</text>
    <text x="40" y="175" class="code">ALTER TABLE table_name ENABLE ROW LEVEL SECURITY;</text>
    <text x="40" y="200" class="code" fill="#22c55e">-- Owner can SELECT their own rows</text>
    <text x="40" y="220" class="code">CREATE POLICY "owner_select" USING (auth.uid() = user_id);</text>

    <!-- Applied to -->
    <text x="25" y="250" class="text-md" fill="#22c55e">Applied to:</text>
    <rect x="120" y="235" width="70" height="26" rx="4" fill="#334155"/>
    <text x="155" y="254" text-anchor="middle" class="code">users</text>
    <rect x="200" y="235" width="80" height="26" rx="4" fill="#334155"/>
    <text x="240" y="254" text-anchor="middle" class="code">profiles</text>
    <rect x="290" y="235" width="85" height="26" rx="4" fill="#334155"/>
    <text x="332" y="254" text-anchor="middle" class="code">sessions</text>
  </g>

  <!-- ==================== PATTERN 2: Service Bypass (y=75-355) ==================== -->
  <g transform="translate(710, 75)">
    <!-- Header -->
    <rect x="0" y="0" width="650" height="45" rx="8" fill="url(#patternGrad2)"/>
    <text x="25" y="30" class="pattern-title">PATTERN 2: Service Role Bypass</text>
    <text x="625" y="30" text-anchor="end" class="annotation" fill="#e9d5ff">FR-023</text>

    <!-- Content box -->
    <rect x="0" y="55" width="650" height="225" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>

    <!-- Description -->
    <text x="25" y="90" class="text-md">Purpose: Allow backend services to access any row</text>
    <text x="25" y="115" class="text-md">Use when: Webhooks, notifications, admin operations</text>

    <!-- SQL Template -->
    <rect x="25" y="130" width="600" height="95" rx="6" fill="#0f172a"/>
    <text x="40" y="155" class="code" fill="#8b5cf6">-- Combined owner + service access</text>
    <text x="40" y="175" class="code">CREATE POLICY "owner_or_service_select" ON table_name</text>
    <text x="40" y="195" class="code">  FOR SELECT USING (</text>
    <text x="40" y="215" class="code">    auth.uid() = user_id OR auth.role() = 'service_role');</text>

    <!-- Warning -->
    <rect x="25" y="240" width="600" height="28" rx="4" fill="#7c3aed" opacity="0.3"/>
    <text x="40" y="260" class="text-sm" fill="#e9d5ff">⚠ Service credentials in .env only - never expose to client (FR-014)</text>
  </g>

  <!-- ==================== PATTERN 3: Soft Delete (y=370-670) ==================== -->
  <g transform="translate(40, 370)">
    <!-- Header -->
    <rect x="0" y="0" width="650" height="45" rx="8" fill="url(#patternGrad3)"/>
    <text x="25" y="30" class="pattern-title">PATTERN 3: Soft Delete</text>
    <text x="625" y="30" text-anchor="end" class="annotation" fill="#fef3c7">FR-024</text>

    <!-- Content box (shortened to fit within y=750) -->
    <rect x="0" y="55" width="650" height="275" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>

    <!-- Description -->
    <text x="25" y="90" class="text-md">Purpose: Prevent permanent deletion, use status flags</text>
    <text x="25" y="115" class="text-md">Use when: User data, content, any recoverable records</text>

    <!-- SQL Template -->
    <rect x="25" y="130" width="600" height="95" rx="6" fill="#0f172a"/>
    <text x="40" y="155" class="code" fill="#f59e0b">-- Deny all DELETE operations</text>
    <text x="40" y="175" class="code">CREATE POLICY "no_delete" ON table_name</text>
    <text x="40" y="195" class="code">  FOR DELETE USING (false);</text>
    <text x="40" y="220" class="code">ALTER TABLE table_name ADD COLUMN deleted_at TIMESTAMP;</text>

    <!-- Filter pattern -->
    <text x="25" y="250" class="text-md" fill="#f59e0b">Active records filter:</text>
    <rect x="25" y="260" width="260" height="45" rx="4" fill="#334155"/>
    <text x="40" y="285" class="code">SELECT * FROM table_name</text>
    <text x="40" y="302" class="code">WHERE deleted_at IS NULL;</text>

    <!-- Benefits (shorter text, acronym expanded) -->
    <text x="310" y="250" class="text-md" fill="#f59e0b">Benefits:</text>
    <text x="310" y="275" class="text-md">✓ Data recovery possible</text>
    <text x="310" y="295" class="text-md">✓ Audit trail preserved</text>
    <text x="310" y="315" class="text-sm">GDPR (EU Data Protection): real deletion via service_role</text>
  </g>

  <!-- ==================== PATTERN 4: Immutable Audit (y=370-670) ==================== -->
  <g transform="translate(710, 370)">
    <!-- Header -->
    <rect x="0" y="0" width="650" height="45" rx="8" fill="url(#patternGrad4)"/>
    <text x="25" y="30" class="pattern-title">PATTERN 4: Immutable Audit Trail</text>
    <text x="625" y="30" text-anchor="end" class="annotation" fill="#fecaca">FR-025</text>

    <!-- Content box (shortened to fit within y=750) -->
    <rect x="0" y="55" width="650" height="275" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>

    <!-- Description -->
    <text x="25" y="90" class="text-md">Purpose: Create tamper-proof audit logs</text>
    <text x="25" y="115" class="text-md">Use when: Security events, compliance logs, transactions</text>

    <!-- SQL Template -->
    <rect x="25" y="130" width="600" height="95" rx="6" fill="#0f172a"/>
    <text x="40" y="155" class="code" fill="#ef4444">-- Only service_role can INSERT</text>
    <text x="40" y="175" class="code">CREATE POLICY "service_insert_only" ON audit_logs</text>
    <text x="40" y="195" class="code">  FOR INSERT WITH CHECK (auth.role() = 'service_role');</text>
    <text x="40" y="220" class="code">CREATE POLICY "no_modify" FOR UPDATE/DELETE USING (false);</text>

    <!-- Applied to -->
    <text x="25" y="250" class="text-md" fill="#ef4444">Applied to:</text>
    <rect x="120" y="235" width="100" height="26" rx="4" fill="#334155"/>
    <text x="170" y="254" text-anchor="middle" class="code">audit_logs</text>
    <rect x="230" y="235" width="130" height="26" rx="4" fill="#334155"/>
    <text x="295" y="254" text-anchor="middle" class="code">security_events</text>
    <rect x="370" y="235" width="130" height="26" rx="4" fill="#334155"/>
    <text x="435" y="254" text-anchor="middle" class="code">payment_history</text>

    <!-- Compliance note (acronyms expanded, fits in box) -->
    <rect x="25" y="280" width="600" height="40" rx="4" fill="#dc2626" opacity="0.2"/>
