  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
    <linearGradient id="patternGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="patternGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="patternGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="patternGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <style>
      .heading-lg { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 20px; font-weight: bold; }
      .heading { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 14px; font-weight: bold; }
      .heading-sm { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 12px; font-weight: bold; }
      .text-md { fill: #cbd5e1; font-family: system-ui, sans-serif; font-size: 12px; }
      .text-sm { fill: #94a3b8; font-family: system-ui, sans-serif; font-size: 10px; }
      .text-muted { fill: #9ca3af; font-family: system-ui, sans-serif; font-size: 10px; }
      .code { fill: #e2e8f0; font-family: monospace; font-size: 10px; }
      .code-sm { fill: #cbd5e1; font-family: monospace; font-size: 9px; }
      .pattern-title { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 13px; font-weight: bold; }
      .pattern-id { fill: #8494a8; font-family: monospace; font-size: 11px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.05">
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#fff"/>
    </pattern>
    <rect width="1400" height="800" fill="url(#dots)"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1400" height="3" fill="url(#accentGrad)"/>

  <!-- Title -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#8494a8" letter-spacing="1">RLS STANDARD PATTERNS - REUSABLE TEMPLATES</text>

  <!-- ==================== PATTERN 1: Owner Isolation ==================== -->
  <g transform="translate(40, 50)">
    <!-- Header -->
    <rect x="0" y="0" width="640" height="40" rx="8" fill="url(#patternGrad1)"/>
    <text x="20" y="26" class="pattern-title">PATTERN 1: Owner Isolation</text>
    <text x="620" y="26" text-anchor="end" class="pattern-id">FR-022</text>

    <!-- Content box -->
    <rect x="0" y="45" width="640" height="300" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>

    <!-- Description -->
    <text x="20" y="75" class="text-md">Purpose: Ensure users can only access their own data</text>
    <text x="20" y="95" class="text-md">Use when: Any table with user-owned records (profiles, settings, messages)</text>

    <!-- SQL Template -->
    <rect x="20" y="115" width="600" height="120" rx="4" fill="#0f172a"/>
    <text x="30" y="135" class="code" fill="#22c55e">-- Enable RLS on table</text>
    <text x="30" y="150" class="code">ALTER TABLE table_name ENABLE ROW LEVEL SECURITY;</text>
    <text x="30" y="170" class="code" fill="#22c55e">-- Owner can SELECT their own rows</text>
    <text x="30" y="185" class="code">CREATE POLICY "owner_select" ON table_name</text>
    <text x="30" y="200" class="code">  FOR SELECT USING (auth.uid() = user_id);</text>
    <text x="30" y="220" class="code" fill="#22c55e">-- Owner can UPDATE their own rows</text>
    <text x="30" y="235" class="code">CREATE POLICY "owner_update" ON table_name</text>
    <text x="30" y="250" class="code">  FOR UPDATE USING (auth.uid() = user_id);</text>

    <!-- Applied to -->
    <text x="20" y="265" class="text-md" fill="#22c55e">Applied to:</text>
    <rect x="20" y="275" width="80" height="24" rx="4" fill="#334155"/>
    <text x="60" y="292" text-anchor="middle" class="code-sm">users</text>
    <rect x="110" y="275" width="80" height="24" rx="4" fill="#334155"/>
    <text x="150" y="292" text-anchor="middle" class="code-sm">profiles</text>
    <rect x="200" y="275" width="80" height="24" rx="4" fill="#334155"/>
    <text x="240" y="292" text-anchor="middle" class="code-sm">sessions</text>
    <rect x="290" y="275" width="100" height="24" rx="4" fill="#334155"/>
    <text x="340" y="292" text-anchor="middle" class="code-sm">user_prefs</text>

    <!-- Behavior -->
    <text x="420" y="265" class="text-md" fill="#22c55e">Behavior on violation:</text>
    <text x="420" y="285" class="text-sm">Returns empty result set (not error)</text>
    <text x="420" y="300" class="text-sm">Query completes successfully with 0 rows</text>
    <text x="420" y="315" class="text-muted">Per FR-010 requirement</text>
  </g>

  <!-- ==================== PATTERN 2: Service Bypass ==================== -->
  <g transform="translate(720, 50)">
    <!-- Header -->
    <rect x="0" y="0" width="640" height="40" rx="8" fill="url(#patternGrad2)"/>
    <text x="20" y="26" class="pattern-title">PATTERN 2: Service Role Bypass</text>
    <text x="620" y="26" text-anchor="end" class="pattern-id">FR-023</text>

    <!-- Content box -->
    <rect x="0" y="45" width="640" height="300" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>

    <!-- Description -->
    <text x="20" y="75" class="text-md">Purpose: Allow backend services to access any row for system ops</text>
    <text x="20" y="95" class="text-md">Use when: Webhooks, notifications, admin operations, migrations</text>

    <!-- SQL Template -->
    <rect x="20" y="115" width="600" height="105" rx="4" fill="#0f172a"/>
    <text x="30" y="135" class="code" fill="#8b5cf6">-- Combined owner + service access</text>
    <text x="30" y="150" class="code">CREATE POLICY "owner_or_service_select" ON table_name</text>
    <text x="30" y="165" class="code">  FOR SELECT USING (</text>
    <text x="30" y="180" class="code">    auth.uid() = user_id OR</text>
    <text x="30" y="195" class="code">    auth.role() = 'service_role'</text>
    <text x="30" y="210" class="code">  );</text>

    <!-- Requirements -->
    <text x="20" y="240" class="text-md" fill="#8b5cf6">Requirements:</text>
    <rect x="20" y="250" width="200" height="30" rx="4" fill="#334155"/>
    <text x="30" y="270" class="text-sm">Log all service_role usage</text>
    <rect x="230" y="250" width="200" height="30" rx="4" fill="#334155"/>
    <text x="240" y="270" class="text-sm">Minimize scope to necessary ops</text>
    <rect x="440" y="250" width="180" height="30" rx="4" fill="#334155"/>
    <text x="450" y="270" class="text-sm">Never expose to client</text>

    <!-- Warning -->
    <rect x="20" y="290" width="600" height="25" rx="4" fill="#7c3aed" opacity="0.3"/>
    <text x="30" y="307" class="text-sm" fill="#e9d5ff">WARNING: Service credentials in .env only, never in client bundle (FR-014)</text>
  </g>

  <!-- ==================== PATTERN 3: Soft Delete ==================== -->
  <g transform="translate(40, 410)">
    <!-- Header -->
    <rect x="0" y="0" width="640" height="40" rx="8" fill="url(#patternGrad3)"/>
    <text x="20" y="26" class="pattern-title">PATTERN 3: Soft Delete</text>
    <text x="620" y="26" text-anchor="end" class="pattern-id">FR-024</text>

    <!-- Content box -->
    <rect x="0" y="45" width="640" height="300" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>

    <!-- Description -->
    <text x="20" y="75" class="text-md">Purpose: Prevent permanent deletion, use status flags instead</text>
    <text x="20" y="95" class="text-md">Use when: User data, content, any recoverable records</text>

    <!-- SQL Template -->
    <rect x="20" y="115" width="600" height="130" rx="4" fill="#0f172a"/>
    <text x="30" y="135" class="code" fill="#f59e0b">-- Deny all DELETE operations</text>
    <text x="30" y="150" class="code">CREATE POLICY "no_delete" ON table_name</text>
    <text x="30" y="165" class="code">  FOR DELETE USING (false);</text>
    <text x="30" y="185" class="code" fill="#f59e0b">-- Table schema includes status column</text>
    <text x="30" y="200" class="code">ALTER TABLE table_name ADD COLUMN</text>
    <text x="30" y="215" class="code">  deleted_at TIMESTAMP DEFAULT NULL;</text>
    <text x="30" y="235" class="code" fill="#f59e0b">-- "Delete" = set deleted_at timestamp</text>

    <!-- Filter pattern -->
    <text x="20" y="265" class="text-md" fill="#f59e0b">Active records filter:</text>
    <rect x="20" y="275" width="280" height="50" rx="4" fill="#334155"/>
    <text x="30" y="295" class="code-sm">SELECT * FROM table_name</text>
    <text x="30" y="310" class="code-sm">WHERE deleted_at IS NULL;</text>

    <!-- Benefits -->
    <text x="320" y="265" class="text-md" fill="#f59e0b">Benefits:</text>
    <text x="320" y="285" class="text-sm">Data recovery possible</text>
    <text x="320" y="300" class="text-sm">Audit trail preserved</text>
    <text x="320" y="315" class="text-sm">GDPR: actual deletion via service_role</text>
  </g>

  <!-- ==================== PATTERN 4: Immutable Audit ==================== -->
  <g transform="translate(720, 410)">
    <!-- Header -->
    <rect x="0" y="0" width="640" height="40" rx="8" fill="url(#patternGrad4)"/>
    <text x="20" y="26" class="pattern-title">PATTERN 4: Immutable Audit Trail</text>
    <text x="620" y="26" text-anchor="end" class="pattern-id">FR-025</text>

    <!-- Content box -->
    <rect x="0" y="45" width="640" height="300" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>

    <!-- Description -->
    <text x="20" y="75" class="text-md">Purpose: Create tamper-proof audit logs that cannot be modified</text>
    <text x="20" y="95" class="text-md">Use when: Security events, compliance logs, transaction history</text>

    <!-- SQL Template -->
    <rect x="20" y="115" width="600" height="130" rx="4" fill="#0f172a"/>
    <text x="30" y="135" class="code" fill="#ef4444">-- Only service_role can INSERT</text>
    <text x="30" y="150" class="code">CREATE POLICY "service_insert_only" ON audit_logs</text>
    <text x="30" y="165" class="code">  FOR INSERT WITH CHECK (auth.role() = 'service_role');</text>
    <text x="30" y="185" class="code" fill="#ef4444">-- NO ONE can UPDATE or DELETE</text>
    <text x="30" y="200" class="code">CREATE POLICY "no_update" ON audit_logs FOR UPDATE USING (false);</text>
    <text x="30" y="215" class="code">CREATE POLICY "no_delete" ON audit_logs FOR DELETE USING (false);</text>
    <text x="30" y="235" class="code" fill="#ef4444">-- Users can only SELECT their own entries</text>

    <!-- Applied to -->
    <text x="20" y="265" class="text-md" fill="#ef4444">Applied to:</text>
    <rect x="20" y="275" width="100" height="24" rx="4" fill="#334155"/>
    <text x="70" y="292" text-anchor="middle" class="code-sm">audit_logs</text>
    <rect x="130" y="275" width="120" height="24" rx="4" fill="#334155"/>
    <text x="190" y="292" text-anchor="middle" class="code-sm">security_events</text>
    <rect x="260" y="275" width="130" height="24" rx="4" fill="#334155"/>
    <text x="325" y="292" text-anchor="middle" class="code-sm">payment_history</text>

    <!-- Compliance note -->
    <rect x="20" y="310" width="600" height="25" rx="4" fill="#dc2626" opacity="0.2"/>
    <text x="30" y="327" class="text-sm" fill="#fca5a5">COMPLIANCE: Immutability required for SOC 2 and GDPR audit requirements</text>
  </g>

  <!-- ==================== FOOTER ==================== -->
  <text x="700" y="780" text-anchor="middle" class="text-muted">000-rls-implementation | RLS Policy Patterns | ScriptHammer</text>
</svg>
