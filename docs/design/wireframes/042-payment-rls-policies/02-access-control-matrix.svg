    <text x="15" y="55" class="heading">payments SELECT Policy</text>
    <text x="15" y="80" font-family="monospace" font-size="10" fill="#a5b4fc">CREATE POLICY select_own_payments ON payments</text>
    <text x="15" y="95" font-family="monospace" font-size="10" fill="#a5b4fc">  FOR SELECT</text>
    <text x="15" y="110" font-family="monospace" font-size="10" fill="#a5b4fc">  USING (user_id = auth.uid());</text>
    <text x="15" y="140" class="text-muted">FR-002: Users see only own payments</text>

    <!-- Policy 2 -->
    <g transform="translate(450, 0)">
      <rect y="30" width="420" height="120" rx="8" fill="#1e293b" stroke="#475569"/>
      <text x="15" y="55" class="heading">subscriptions UPDATE Policy</text>
      <text x="15" y="80" font-family="monospace" font-size="10" fill="#a5b4fc">CREATE POLICY update_sub_cancel ON subscriptions</text>
      <text x="15" y="95" font-family="monospace" font-size="10" fill="#a5b4fc">  FOR UPDATE</text>
      <text x="15" y="110" font-family="monospace" font-size="10" fill="#a5b4fc">  USING (user_id = auth.uid() AND status = 'active')</text>
      <text x="15" y="125" font-family="monospace" font-size="10" fill="#a5b4fc">  WITH CHECK (status = 'cancelled');</text>
      <text x="15" y="140" class="text-muted">FR-009: Owner can only cancel</text>
    </g>

    <!-- Policy 3 -->
    <g transform="translate(900, 0)">
      <rect y="30" width="460" height="120" rx="8" fill="#1e293b" stroke="#ef4444"/>
      <text x="15" y="55" class="heading">payment_audit_logs Immutable Policy</text>
      <text x="15" y="80" font-family="monospace" font-size="10" fill="#a5b4fc">-- NO UPDATE/DELETE policies created</text>
      <text x="15" y="95" font-family="monospace" font-size="10" fill="#a5b4fc">-- RLS enforced: no path to modify</text>
      <text x="15" y="110" font-family="monospace" font-size="10" fill="#a5b4fc">CREATE POLICY insert_audit ON payment_audit_logs</text>
      <text x="15" y="125" font-family="monospace" font-size="10" fill="#a5b4fc">  FOR INSERT WITH CHECK (auth.role() = 'service_role');</text>
      <text x="15" y="140" class="text-muted">FR-018..020: Immutable audit trail</text>
    </g>
