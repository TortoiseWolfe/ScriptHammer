    <text x="40" y="190" class="text-sm">• Cancel allowed, no modify</text>
    <text x="40" y="205" class="text-sm">• History preserved after cancel</text>

    <text x="30" y="235" class="text-md" fill="#eab308">US3: Payment Creation Security (P2)</text>
