    <text x="380" y="355" class="heading">Derive Shared Secret</text>
    <text x="295" y="385" class="code">ECDH(privA, pubB)</text>
    <text x="295" y="405" class="text-sm">= shared_secret</text>
    <text x="295" y="420" class="text-muted">Same result: ECDH(privB, pubA)</text>
