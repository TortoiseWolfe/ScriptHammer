    <!-- Valid Email -->
    <rect x="530" y="500" width="430" height="50" rx="6" fill="#f0fdf4" stroke="#86efac"/>
    <text x="550" y="520" class="heading-sm">Email</text>
    <rect x="550" y="528" width="300" height="16" rx="3" fill="#dcfce7"/>
    <text x="560" y="540" class="text-sm">john.doe@company.com</text>
    <text x="920" y="530" class="success-text">✓ Valid</text>

    <!-- Invalid Format -->
    <rect x="530" y="560" width="430" height="50" rx="6" fill="#fef2f2" stroke="#fecaca"/>
    <text x="550" y="580" class="heading-sm">Email</text>
    <rect x="550" y="588" width="300" height="16" rx="3" fill="#fecaca"/>
    <text x="560" y="600" class="text-sm">john..doe@company</text>
    <text x="920" y="590" class="error-text">✗ Invalid</text>

    <!-- Disposable Warning -->
    <rect x="530" y="620" width="430" height="65" rx="6" fill="#fffbeb" stroke="#fef08a"/>
    <text x="550" y="640" class="heading-sm">Email</text>
    <rect x="550" y="648" width="300" height="16" rx="3" fill="#fef9c3"/>
    <text x="560" y="660" class="text-sm">user@tempmail.com</text>
    <text x="920" y="650" class="warning-text">⚠ Warning</text>
    <text x="550" y="680" class="warning-text">Disposable email detected - you may not receive account emails</text>

    <!-- Screen Reader Announcement -->
    <rect x="530" y="695" width="430" height="40" rx="6" fill="#f3f4f6"/>
    <text x="550" y="720" class="text-sm">🔊 "Error: Invalid email format. Please check for consecutive dots or missing domain."</text>
