    <text x="880" y="254" text-anchor="middle" class="text-md">Sign Out</text>

    <!-- Session Expired -->
    <rect x="700" y="285" width="260" height="110" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
    <text x="830" y="315" text-anchor="middle" font-size="24">🔓</text>
    <text x="830" y="345" text-anchor="middle" class="heading-sm">Session Expired</text>
    <text x="830" y="365" text-anchor="middle" class="text-sm">Please sign in again to continue.</text>
    <rect x="760" y="375" width="140" height="28" rx="6" fill="#8b5cf6"/>
    <text x="830" y="394" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">Sign In</text>

    <!-- Error Recovery Panel -->
    <rect x="40" y="430" width="450" height="320" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="265" y="460" text-anchor="middle" class="heading">Error Recovery Options</text>
    <text x="265" y="480" text-anchor="middle" class="text-muted">Clear messages with recovery paths (FR-036)</text>

    <!-- OAuth Provider Down -->
    <rect x="60" y="500" width="410" height="70" rx="6" fill="#fef2f2" stroke="#fecaca"/>
    <text x="80" y="525" class="heading-sm" fill="#dc2626">⚠ Cannot Connect to GitHub</text>
