    <!-- Email Validation (Mobile) -->
    <rect x="25" y="490" width="290" height="80" rx="8" fill="#ffffff"/>
    <text x="40" y="515" class="heading-sm">Email</text>
    <rect x="40" y="525" width="260" height="32" rx="6" fill="#fef9c3" stroke="#fef08a"/>
    <text x="55" y="546" class="text-sm">user@tempmail.com</text>
    <text x="40" y="570" class="warning-text">⚠ Disposable email - proceed with caution</text>

    <!-- Accessibility Note -->
    <rect x="25" y="585" width="290" height="45" rx="8" fill="#f9fafb"/>
    <text x="40" y="608" class="text-muted">🔊 Screen reader: Errors announced</text>
    <text x="40" y="625" class="text-muted">via ARIA live regions (FR-037)</text>

    <!-- Bottom nav hint -->
