    <rect x="190" y="550" width="120" height="24" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="250" y="567" text-anchor="middle" class="text-sm">Use Email Instead</text>

    <!-- Email Delivery Failed -->
    <rect x="60" y="580" width="410" height="70" rx="6" fill="#fffbeb" stroke="#fef08a"/>
    <text x="80" y="605" class="heading-sm" fill="#92400e">📧 Email Delivery Failed</text>
    <text x="80" y="625" class="text-sm">We couldn't send your verification email.</text>
    <rect x="80" y="630" width="120" height="24" rx="6" fill="#eab308"/>
    <text x="140" y="647" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Resend Email</text>
    <text x="220" y="647" class="text-muted">Check spam folder</text>

    <!-- Payment Status Update Failed -->
    <rect x="60" y="660" width="410" height="70" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="80" y="685" class="heading-sm" fill="#1d4ed8">💳 Payment Status Updating</text>
    <text x="80" y="705" class="text-sm">We're retrying to update your payment status.</text>
    <rect x="80" y="710" width="12" height="12" rx="2" fill="#3b82f6">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </rect>
    <text x="100" y="720" class="text-sm" fill="#3b82f6">Retry 2 of 3...</text>

    <!-- Email Validation Panel -->
    <rect x="510" y="430" width="470" height="320" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="745" y="460" text-anchor="middle" class="heading">Email Validation</text>
