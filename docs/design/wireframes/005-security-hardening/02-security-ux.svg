  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4f8"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
    <style>
      .heading-lg { fill: #1f2937; font-family: system-ui, sans-serif; font-size: 20px; font-weight: bold; }
      .heading { fill: #1f2937; font-family: system-ui, sans-serif; font-size: 14px; font-weight: bold; }
      .heading-sm { fill: #1f2937; font-family: system-ui, sans-serif; font-size: 12px; font-weight: bold; }
      .text-md { fill: #374151; font-family: system-ui, sans-serif; font-size: 12px; }
      .text-sm { fill: #6b7280; font-family: system-ui, sans-serif; font-size: 10px; }
      .text-muted { fill: #9ca3af; font-family: system-ui, sans-serif; font-size: 10px; }
      .annotation { fill: #8b5cf6; font-family: monospace; font-size: 10px; }
      .label-desktop { fill: #8b5cf6; font-family: monospace; font-size: 11px; font-weight: bold; }
      .label-mobile { fill: #d946ef; font-family: monospace; font-size: 11px; font-weight: bold; }
      .error-text { fill: #ef4444; font-family: system-ui, sans-serif; font-size: 10px; }
      .success-text { fill: #22c55e; font-family: system-ui, sans-serif; font-size: 10px; }
      .warning-text { fill: #eab308; font-family: system-ui, sans-serif; font-size: 10px; }
      .link-text { fill: #8b5cf6; font-family: system-ui, sans-serif; font-size: 11px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.4">
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#a5b4fc"/>
    </pattern>
    <rect width="1400" height="800" fill="url(#dots)"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1400" height="3" fill="url(#accentGrad)"/>

  <!-- Title -->
  <text x="700" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="1">SECURITY UX STATES</text>

  <!-- DESKTOP SECTION -->
  <text x="40" y="52" class="label-desktop">DESKTOP - SECURITY FEEDBACK</text>

  <g id="desktop-view">
    <!-- Password Strength Panel -->
    <rect x="40" y="70" width="300" height="340" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="190" y="100" text-anchor="middle" class="heading">Password Strength</text>
    <text x="190" y="120" text-anchor="middle" class="text-muted">Real-time feedback (FR-034)</text>

    <!-- Weak Password -->
    <rect x="60" y="140" width="260" height="55" rx="6" fill="#fef2f2" stroke="#fecaca"/>
    <text x="75" y="160" class="heading-sm">Weak</text>
    <rect x="75" y="170" width="60" height="6" rx="3" fill="#ef4444"/>
    <rect x="140" y="170" width="60" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="205" y="170" width="60" height="6" rx="3" fill="#e5e7eb"/>
    <text x="280" y="175" class="error-text">✗</text>
    <text x="75" y="188" class="error-text">Add uppercase, number, special char</text>

    <!-- Medium Password -->
    <rect x="60" y="205" width="260" height="55" rx="6" fill="#fffbeb" stroke="#fef08a"/>
    <text x="75" y="225" class="heading-sm">Medium</text>
    <rect x="75" y="235" width="60" height="6" rx="3" fill="#eab308"/>
    <rect x="140" y="235" width="60" height="6" rx="3" fill="#eab308"/>
    <rect x="205" y="235" width="60" height="6" rx="3" fill="#e5e7eb"/>
    <text x="280" y="240" class="warning-text">!</text>
    <text x="75" y="253" class="warning-text">Add special character</text>

    <!-- Strong Password -->
    <rect x="60" y="270" width="260" height="55" rx="6" fill="#f0fdf4" stroke="#86efac"/>
    <text x="75" y="290" class="heading-sm">Strong</text>
    <rect x="75" y="300" width="60" height="6" rx="3" fill="#22c55e"/>
    <rect x="140" y="300" width="60" height="6" rx="3" fill="#22c55e"/>
    <rect x="205" y="300" width="60" height="6" rx="3" fill="#22c55e"/>
    <text x="280" y="305" class="success-text">✓</text>
