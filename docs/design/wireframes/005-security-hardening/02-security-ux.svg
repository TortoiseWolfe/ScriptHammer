    <text x="75" y="375" class="success-text">✓ Number</text>
    <text x="165" y="375" class="success-text">✓ Special char</text>

    <!-- Account Lockout Panel -->
    <rect x="360" y="70" width="300" height="340" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="510" y="100" text-anchor="middle" class="heading">Account Lockout</text>
    <text x="510" y="120" text-anchor="middle" class="text-muted">5 attempts / 15 min (FR-012)</text>

    <!-- Attempt Counter -->
    <rect x="380" y="140" width="260" height="70" rx="6" fill="#fffbeb" stroke="#fef08a"/>
    <text x="400" y="165" class="heading-sm">Warning: 2 attempts remaining</text>
    <text x="400" y="185" class="text-sm">3 failed attempts detected</text>
    <rect x="400" y="192" width="180" height="8" rx="4" fill="#e5e7eb"/>
    <rect x="400" y="192" width="108" height="8" rx="4" fill="#eab308"/>

    <!-- Locked Out State -->
    <rect x="380" y="220" width="260" height="90" rx="6" fill="#fef2f2" stroke="#fecaca"/>
    <text x="510" y="245" text-anchor="middle" font-size="24">🔒</text>
    <text x="400" y="270" class="heading-sm" fill="#dc2626">Account Temporarily Locked</text>
    <text x="400" y="290" class="text-sm">Too many failed attempts.</text>
    <text x="400" y="305" class="text-md" fill="#dc2626">Try again in 12:34</text>

    <!-- After Lockout -->
    <rect x="380" y="320" width="260" height="75" rx="6" fill="#f0fdf4" stroke="#86efac"/>
    <text x="510" y="345" text-anchor="middle" font-size="20">✓</text>
    <text x="510" y="370" text-anchor="middle" class="heading-sm" fill="#166534">Lockout Expired</text>
    <text x="510" y="390" text-anchor="middle" class="text-sm">You can try signing in again.</text>

    <!-- Session Timeout Panel -->
    <rect x="680" y="70" width="300" height="340" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="830" y="100" text-anchor="middle" class="heading">Session Timeout</text>
    <text x="830" y="120" text-anchor="middle" class="text-muted">Warning before expiry (FR-031)</text>

    <!-- Session Warning Modal -->
    <rect x="700" y="140" width="260" height="130" rx="8" fill="#ffffff" stroke="#eab308" stroke-width="2"/>
    <rect x="700" y="140" width="260" height="35" rx="8" fill="#fffbeb"/>
    <rect x="700" y="167" width="260" height="8" fill="#ffffff"/>
    <text x="830" y="163" text-anchor="middle" class="heading-sm" fill="#92400e">⏱ Session Expiring Soon</text>
    <text x="830" y="195" text-anchor="middle" class="text-md">Your session will expire in</text>
    <text x="830" y="220" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="bold" fill="#eab308">0:58</text>
    <rect x="720" y="235" width="100" height="28" rx="6" fill="#8b5cf6"/>
    <text x="770" y="254" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">Stay Signed In</text>
