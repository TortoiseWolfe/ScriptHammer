<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7ddf5"/>
      <stop offset="100%" stop-color="#b8d4f0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- CENTERED TITLE text-anchor="middle" -->
  <text text-anchor="middle" x="960" y="28" font-family="system-ui, sans-serif"
        font-size="18" font-weight="700" fill="#4b5563" letter-spacing="1">SECURITY HARDENING - SIGN IN SECURITY UX</text>

  <!-- Section labels -->
  <text x="40" y="52" fill="#8b5cf6" font-family="system-ui, sans-serif"
        font-size="18" font-weight="bold">DESKTOP (16:9)</text>
  <text x="1500" y="52" fill="#d946ef" font-family="system-ui, sans-serif"
        font-size="15" font-weight="bold">MOBILE</text>

  <!-- DESKTOP (1280x720) -->
  <g id="desktop" transform="translate(40, 60)">
    <rect width="1280" height="720" rx="8" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>

    <!-- Lockout Warning Banner -->
    <rect x="240" y="70" width="800" height="60" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="300" y="95" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#dc2626">Too many failed attempts</text>
    <text x="300" y="115" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Account locked. Try again in 4:32. Attempts remaining: 0/5</text>
    <circle cx="270" cy="100" r="16" fill="#dc2626"/>
    <text x="270" y="106" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">!</text>

    <!-- Sign In Form Card -->
    <rect x="340" y="150" width="600" height="480" rx="12" fill="#dcc8a8" stroke="#b8a080" stroke-width="2"/>
    <text x="640" y="200" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#374151" text-anchor="middle">Sign In</text>

    <!-- Email Field -->
    <text x="390" y="240" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">Email Address</text>
    <rect x="390" y="250" width="500" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="405" y="278" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">user@tempmail.io</text>
    <rect x="390" y="300" width="500" height="36" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="405" y="323" font-family="system-ui, sans-serif" font-size="14" fill="#92400e">Warning: Disposable email detected. Account recovery may not work.</text>

    <!-- Password Field -->
    <text x="390" y="360" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">Password</text>
    <rect x="390" y="370" width="500" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="405" y="398" font-family="system-ui, sans-serif" font-size="14" fill="#374151">************</text>
    <text x="390" y="435" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Password Strength:</text>
    <rect x="520" y="422" width="200" height="16" rx="8" fill="#22c55e"/>
    <text x="730" y="435" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e">Strong</text>
    <text x="390" y="460" font-family="system-ui, sans-serif" font-size="14" fill="#22c55e">8+ chars  Uppercase  Number  Symbol</text>

    <!-- Remember Me -->
    <rect x="390" y="490" width="20" height="20" rx="4" fill="#8b5cf6"/>
    <text x="396" y="505" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff">✓</text>
    <text x="420" y="506" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Remember me for 7 days</text>

    <!-- Sign In Primary Action -->
    <rect x="390" y="530" width="500" height="48" rx="8" fill="#8b5cf6"/>
    <text x="640" y="560" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Sign In</text>

    <!-- Error Message -->
    <rect x="390" y="590" width="500" height="36" rx="4" fill="#fef2f2" stroke="#dc2626"/>
    <text x="405" y="613" font-family="system-ui, sans-serif" font-size="14" fill="#dc2626">Invalid credentials. Forgot password? Reset it here.</text>

    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>
  </g>

  <!--
    ============================================================================
    DESKTOP CALLOUTS SECTION
    These callouts are positioned to the right of the form card, outside the
    main desktop mockup area. They point to their corresponding UI elements.
    ============================================================================
  -->

  <!-- Desktop callouts positioned outside mockup area -->
  <g id="desktop-callouts" transform="translate(40, 60)">
    <circle cx="1060" cy="100" r="14" fill="#dc2626"/>
    <text x="1060" y="105" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>

    <circle cx="960" cy="290" r="14" fill="#dc2626"/>
    <text x="960" y="295" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>

    <circle cx="960" cy="440" r="14" fill="#dc2626"/>
    <text x="960" y="445" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>

    <circle cx="960" cy="560" r="14" fill="#dc2626"/>
    <text x="960" y="565" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
  </g>

  <!-- MOBILE (360x720) -->
  <g id="mobile" transform="translate(1360, 60)">
    <rect width="360" height="720" rx="24" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-mobile.svg#mobile-header-group" x="0" y="0"/>

    <!-- Lockout Banner mobile -->
    <rect x="15" y="88" width="330" height="50" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="55" y="108" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#dc2626">Too many attempts</text>
    <text x="55" y="126" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Locked. Try in 4:32</text>
    <circle cx="35" cy="113" r="12" fill="#dc2626"/>
    <text x="35" y="118" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">!</text>

    <!-- Form mobile -->
    <rect x="15" y="153" width="330" height="420" rx="12" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="180" y="188" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#374151" text-anchor="middle">Sign In</text>

    <text x="30" y="215" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">Email</text>
    <rect x="30" y="223" width="300" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="40" y="251" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">user@tempmail.io</text>
    <rect x="30" y="273" width="300" height="28" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="38" y="292" font-family="system-ui, sans-serif" font-size="14" fill="#92400e">Disposable email warning</text>

    <text x="30" y="323" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">Password</text>
    <rect x="30" y="331" width="300" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="40" y="359" font-family="system-ui, sans-serif" font-size="14" fill="#374151">************</text>
    <text x="30" y="395" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Strength:</text>
    <rect x="100" y="382" width="140" height="14" rx="7" fill="#22c55e"/>
    <text x="250" y="395" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e">Strong</text>

    <rect x="30" y="418" width="18" height="18" rx="4" fill="#8b5cf6"/>
    <text x="35" y="432" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff">✓</text>
    <text x="56" y="432" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Remember me</text>

    <rect x="30" y="453" width="300" height="48" rx="8" fill="#8b5cf6"/>
    <text x="180" y="483" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Sign In</text>

    <rect x="30" y="513" width="300" height="32" rx="4" fill="#fef2f2" stroke="#dc2626"/>
    <text x="40" y="534" font-family="system-ui, sans-serif" font-size="14" fill="#dc2626">Invalid credentials. Reset?</text>

    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
  </g>

  <!-- Mobile callouts - grouped separately from UI, outside button proximity -->
  <g id="mobile-callouts" transform="translate(1680, 60)">
    <circle cx="0" cy="95" r="12" fill="#dc2626"/>
    <text x="0" y="99" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>

    <circle cx="0" cy="215" r="12" fill="#dc2626"/>
    <text x="0" y="219" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>

    <circle cx="0" cy="375" r="12" fill="#dc2626"/>
    <text x="0" y="379" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>

    <circle cx="0" cy="525" r="12" fill="#dc2626"/>
    <text x="0" y="529" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
  </g>

  <!-- ANNOTATIONS - placed with significant gap from mobile section -->
  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>

    <!-- Column 1 -->
    <g transform="translate(20, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">1</text>
      <text x="40" y="18" fill="#374151" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">Password Strength Guidance</text>
      <text x="40" y="40" fill="#4b5563" font-family="system-ui, sans-serif" font-size="14">As a user creating a password, I need real-time</text>
      <text x="40" y="58" fill="#4b5563" font-family="system-ui, sans-serif" font-size="14">feedback so I can create a secure password.</text>
      <g transform="translate(40, 70)">
        <a href="#US-008"><rect x="0" y="0" width="55" height="22" rx="4" fill="#0891b2"/><text x="27" y="15" fill="#ffffff" font-size="14" text-anchor="middle">US-008</text></a>
        <a href="#FR-034"><rect x="61" y="0" width="55" height="22" rx="4" fill="#2563eb"/><text x="88" y="15" fill="#ffffff" font-size="14" text-anchor="middle">FR-034</text></a>
        <a href="#FR-035"><rect x="122" y="0" width="55" height="22" rx="4" fill="#2563eb"/><text x="149" y="15" fill="#ffffff" font-size="14" text-anchor="middle">FR-035</text></a>
        <a href="#SC-007"><rect x="183" y="0" width="55" height="22" rx="4" fill="#ea580c"/><text x="210" y="15" fill="#ffffff" font-size="14" text-anchor="middle">SC-007</text></a>
      </g>
    </g>

    <!-- Column 2 -->
    <g transform="translate(470, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">2</text>
      <text x="40" y="18" fill="#374151" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">Brute Force Prevention UX</text>
      <text x="40" y="40" fill="#4b5563" font-family="system-ui, sans-serif" font-size="14">As a user, I need clear lockout feedback</text>
      <text x="40" y="58" fill="#4b5563" font-family="system-ui, sans-serif" font-size="14">showing duration and remaining attempts.</text>
      <g transform="translate(40, 70)">
        <a href="#US-003"><rect x="0" y="0" width="55" height="22" rx="4" fill="#0891b2"/><text x="27" y="15" fill="#ffffff" font-size="14" text-anchor="middle">US-003</text></a>
        <a href="#FR-012"><rect x="61" y="0" width="55" height="22" rx="4" fill="#2563eb"/><text x="88" y="15" fill="#ffffff" font-size="14" text-anchor="middle">FR-012</text></a>
        <a href="#SC-009"><rect x="122" y="0" width="55" height="22" rx="4" fill="#ea580c"/><text x="149" y="15" fill="#ffffff" font-size="14" text-anchor="middle">SC-009</text></a>
      </g>
    </g>

    <!-- Column 3 -->
    <g transform="translate(920, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">3</text>
      <text x="40" y="18" fill="#374151" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">Email Validation</text>
      <text x="40" y="40" fill="#4b5563" font-family="system-ui, sans-serif" font-size="14">As a user signing up, I need proper email</text>
      <text x="40" y="58" fill="#4b5563" font-family="system-ui, sans-serif" font-size="14">validation with warnings about disposable domains.</text>
      <g transform="translate(40, 70)">
        <a href="#US-007"><rect x="0" y="0" width="55" height="22" rx="4" fill="#0891b2"/><text x="27" y="15" fill="#ffffff" font-size="14" text-anchor="middle">US-007</text></a>
        <a href="#FR-021"><rect x="61" y="0" width="55" height="22" rx="4" fill="#2563eb"/><text x="88" y="15" fill="#ffffff" font-size="14" text-anchor="middle">FR-021</text></a>
        <a href="#FR-022"><rect x="122" y="0" width="55" height="22" rx="4" fill="#2563eb"/><text x="149" y="15" fill="#ffffff" font-size="14" text-anchor="middle">FR-022</text></a>
        <a href="#FR-023"><rect x="183" y="0" width="55" height="22" rx="4" fill="#2563eb"/><text x="210" y="15" fill="#ffffff" font-size="14" text-anchor="middle">FR-023</text></a>
      </g>
      <g transform="translate(40, 98)">
        <a href="#FR-024"><rect x="0" y="0" width="55" height="22" rx="4" fill="#2563eb"/><text x="27" y="15" fill="#ffffff" font-size="14" text-anchor="middle">FR-024</text></a>
      </g>
    </g>

    <!-- Column 4 -->
    <g transform="translate(1370, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">4</text>
      <text x="40" y="18" fill="#374151" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">Auth Error Recovery</text>
      <text x="40" y="40" fill="#4b5563" font-family="system-ui, sans-serif" font-size="14">As a user experiencing failures, I need clear</text>
      <text x="40" y="58" fill="#4b5563" font-family="system-ui, sans-serif" font-size="14">error messages with recovery options.</text>
      <g transform="translate(40, 70)">
        <a href="#US-010"><rect x="0" y="0" width="55" height="22" rx="4" fill="#0891b2"/><text x="27" y="15" fill="#ffffff" font-size="14" text-anchor="middle">US-010</text></a>
        <a href="#FR-036"><rect x="61" y="0" width="55" height="22" rx="4" fill="#2563eb"/><text x="88" y="15" fill="#ffffff" font-size="14" text-anchor="middle">FR-036</text></a>
        <a href="#FR-037"><rect x="122" y="0" width="55" height="22" rx="4" fill="#2563eb"/><text x="149" y="15" fill="#ffffff" font-size="14" text-anchor="middle">FR-037</text></a>
      </g>
    </g>
  </g>

  <!-- SIGNATURE -->
  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif"
        font-size="18" font-weight="bold">005:01 | Security Hardening | ScriptHammer</text>
</svg>
