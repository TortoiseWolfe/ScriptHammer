  <text x="700" y="52" text-anchor="middle" class="text-muted">Retry flow, processing states, error handling, confirmation dialogs</text>

  <!-- ==================== RETRY FLOW ==================== -->
  <text x="40" y="85" class="label-section">RETRY FLOW (FR-010 to FR-014)</text>

  <!-- State 1: Failed -->
  <g transform="translate(40, 100)">
    <rect width="200" height="140" rx="8" fill="#1e293b" stroke="#ef4444"/>
    <text x="100" y="25" text-anchor="middle" class="heading-sm">1. FAILED</text>

