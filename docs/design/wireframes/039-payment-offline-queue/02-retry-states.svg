    </g>

    <!-- Arrows -->
    <line x1="65" y1="70" x2="185" y2="70" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="215" y1="70" x2="335" y2="70" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="365" y1="70" x2="485" y2="70" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowhead)"/>

