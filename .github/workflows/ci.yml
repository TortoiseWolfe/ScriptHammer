# CI workflow for pull request validation
# Runs linting, validation, and checks on every PR

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pre-commit ruff

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  validate-wireframes:
    name: Validate SVG Wireframes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Note: Validator uses stdlib xml.etree.ElementTree, no external deps needed

      - name: Validate all wireframes
        id: validate
        run: |
          set +e
          OUTPUT=$(python docs/design/wireframes/validate-wireframe.py --all 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          # Count issues for PR comment
          ERROR_COUNT=$(echo "$OUTPUT" | grep -c "ERROR" || echo "0")
          WARNING_COUNT=$(echo "$OUTPUT" | grep -c "WARNING" || echo "0")
          echo "error_count=$ERROR_COUNT" >> $GITHUB_OUTPUT
          echo "warning_count=$WARNING_COUNT" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit $EXIT_CODE
        # Enforcement timeline:
        # - Planning phase (current): continue-on-error=true, validation runs but doesn't block
        # - Transition phase: Add issue counts to PR comments (implemented below)
        # - Enforcement phase: Remove continue-on-error to block PRs with errors
        continue-on-error: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const errorCount = '${{ steps.validate.outputs.error_count }}';
            const warningCount = '${{ steps.validate.outputs.warning_count }}';
            const exitCode = '${{ steps.validate.outputs.exit_code }}';

            let status = '✅ All wireframes valid';
            if (exitCode !== '0') {
              status = `⚠️ Wireframe validation: ${errorCount} errors, ${warningCount} warnings`;
            }

            const body = `### SVG Wireframe Validation

            ${status}

            > **Phase 2:** Wireframe validation is non-blocking. PR comments enabled.
            > See [RFC-004](docs/interoffice/rfcs/RFC-004-ci-wireframe-validation-enforcement.md) for enforcement timeline.`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('SVG Wireframe Validation')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body.trim()
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body.trim()
              });
            }

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            rules:
              line-length: disable
              truthy:
                check-keys: false

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !.speckit/**
          config: |
            {
              "MD013": false,
              "MD033": false,
              "MD041": false
            }

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: warning
