# CI workflow for pull request validation
# Runs linting, validation, and checks on every PR

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pre-commit ruff

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  validate-wireframes:
    name: Validate SVG Wireframes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Note: Validator uses stdlib xml.etree.ElementTree, no external deps needed

      - name: Validate all wireframes
        run: python docs/design/wireframes/validate-wireframe.py --all
        # Enforcement timeline:
        # - Planning phase (current): continue-on-error=true, validation runs but doesn't block
        # - Transition phase: Add issue counts to PR comments
        # - Enforcement phase: Remove continue-on-error to block PRs with errors
        continue-on-error: true

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            rules:
              line-length: disable
              truthy:
                check-keys: false

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !.speckit/**
          config: |
            {
              "MD013": false,
              "MD033": false,
              "MD041": false
            }

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: warning
