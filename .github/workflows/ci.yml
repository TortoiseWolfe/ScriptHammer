# CI workflow for pull request validation
# Runs linting, validation, and checks on every PR

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pre-commit ruff

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  validate-wireframes:
    name: Validate SVG Wireframes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Note: Validator uses stdlib xml.etree.ElementTree, no external deps needed

      - name: Validate all wireframes (JSON output)
        id: validate
        run: |
          python docs/design/wireframes/validate-wireframe.py --all --json > validation.json
          cat validation.json
        # RFC-004 Phase 2: Validation runs but doesn't block PRs
        # Phase 3: Remove continue-on-error to enforce validation
        continue-on-error: true

      - name: Comment validation results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let results;
            try {
              results = JSON.parse(fs.readFileSync('validation.json', 'utf8'));
            } catch (e) {
              results = { passed: 0, failed: 0, total_files: 0, total_issues: 0 };
            }

            const status = results.total_issues === 0
              ? '✅ **PASS**'
              : '⚠️ **Issues Found**';

            const body = `## Wireframe Validation Results

            ${status}

            | Metric | Value |
            |--------|-------|
            | **Pass** | ${results.passed} SVGs |
            | **Fail** | ${results.failed} SVGs |
            | **Issues** | ${results.total_issues} |

            > _Phase 2: Validation is non-blocking. See [RFC-004](docs/interoffice/rfcs/RFC-004-ci-wireframe-validation-enforcement.md) for enforcement timeline._

            🤖 Generated by [validate-wireframe.py v5.3](docs/design/wireframes/validate-wireframe.py)`;

            // Find existing bot comment to update (avoid spam)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Wireframe Validation Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body.trim()
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body.trim()
              });
            }

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            rules:
              line-length: disable
              truthy:
                check-keys: false

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !.speckit/**
          config: |
            {
              "MD013": false,
              "MD033": false,
              "MD041": false
            }

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: warning
