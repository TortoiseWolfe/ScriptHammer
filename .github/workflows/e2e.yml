name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Monday 6 AM UTC — full 3-browser run
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  # ============================================
  # STEP 1: Build once, cache for all shards
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build
        env:
          GITHUB_ACTIONS: false
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ vars.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${{ vars.NEXT_PUBLIC_EMAILJS_TEMPLATE_ID }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: out/
          retention-days: 1

  # ============================================
  # STEP 2: Smoke tests (~2 min) - FAST FEEDBACK
  # ============================================
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (chromium only)
        run: |
          for i in 1 2 3; do
            pnpm exec playwright install --with-deps chromium && break
            echo "Retry $i: playwright install failed, retrying in 10s..."
            sleep 10
          done

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/

      - name: Start server
        run: |
          npx serve out -l 3000 &
          sleep 5
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run smoke tests (sign-up only - auth tests run after auth-setup)
        run: |
          pnpm exec playwright test \
            tests/e2e/auth/sign-up.spec.ts \
            --project=signup \
            --no-deps \
            --reporter=list \
            --timeout=30000
        env:
          CI: true
          SKIP_WEBSERVER: true
          BASE_URL: http://localhost:3000
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_PRIMARY_EMAIL: ${{ vars.TEST_USER_PRIMARY_EMAIL }}
          TEST_USER_PRIMARY_PASSWORD: ${{ secrets.TEST_USER_PRIMARY_PASSWORD }}
          TEST_USER_SECONDARY_EMAIL: ${{ vars.TEST_USER_SECONDARY_EMAIL }}
          TEST_USER_SECONDARY_PASSWORD: ${{ secrets.TEST_USER_SECONDARY_PASSWORD }}
          TEST_USER_TERTIARY_EMAIL: ${{ vars.TEST_USER_TERTIARY_EMAIL }}
          TEST_USER_TERTIARY_PASSWORD: ${{ secrets.TEST_USER_TERTIARY_PASSWORD }}

      - name: Smoke test summary
        if: always()
        run: echo "## Smoke Tests Complete" >> "$GITHUB_STEP_SUMMARY"

  # ============================================
  # STEP 3: Rate-limiting tests (ordered, clean IP)
  # ============================================
  rate-limiting:
    name: Rate-Limiting Tests
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (chromium only)
        run: |
          for i in 1 2 3; do
            pnpm exec playwright install --with-deps chromium && break
            echo "Retry $i: playwright install failed, retrying in 10s..."
            sleep 10
          done

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/

      - name: Start server
        run: |
          npx serve out -l 3000 &
          sleep 5
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run rate-limiting tests (ordered)
        run: pnpm test:e2e --project=rate-limiting --project=brute-force --project=signup --reporter=list --trace=on-first-retry
        env:
          CI: true
          PLAYWRIGHT_BROWSER: chromium
          SKIP_WEBSERVER: true
          BASE_URL: http://localhost:3000
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_PRIMARY_EMAIL: ${{ vars.TEST_USER_PRIMARY_EMAIL }}
          TEST_USER_PRIMARY_PASSWORD: ${{ secrets.TEST_USER_PRIMARY_PASSWORD }}
          TEST_USER_SECONDARY_EMAIL: ${{ vars.TEST_USER_SECONDARY_EMAIL }}
          TEST_USER_SECONDARY_PASSWORD: ${{ secrets.TEST_USER_SECONDARY_PASSWORD }}
          TEST_USER_TERTIARY_EMAIL: ${{ vars.TEST_USER_TERTIARY_EMAIL }}
          TEST_USER_TERTIARY_PASSWORD: ${{ secrets.TEST_USER_TERTIARY_PASSWORD }}

  # ============================================
  # STEP 4: Auth Setup (runs ONCE, shares state)
  # ============================================
  auth-setup:
    name: Auth Setup
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (chromium only for auth)
        run: |
          for i in 1 2 3; do
            pnpm exec playwright install --with-deps chromium && break
            echo "Retry $i: playwright install failed, retrying in 10s..."
            sleep 10
          done

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/

      - name: Start server
        run: |
          npx serve out -l 3000 &
          sleep 5
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run auth setup
        run: pnpm exec playwright test --project=setup --reporter=list --timeout=180000
        env:
          CI: true
          SKIP_WEBSERVER: true
          BASE_URL: http://localhost:3000
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_PRIMARY_EMAIL: ${{ vars.TEST_USER_PRIMARY_EMAIL }}
          TEST_USER_PRIMARY_PASSWORD: ${{ secrets.TEST_USER_PRIMARY_PASSWORD }}
          TEST_USER_SECONDARY_EMAIL: ${{ vars.TEST_USER_SECONDARY_EMAIL }}
          TEST_USER_SECONDARY_PASSWORD: ${{ secrets.TEST_USER_SECONDARY_PASSWORD }}
          TEST_USER_TERTIARY_EMAIL: ${{ vars.TEST_USER_TERTIARY_EMAIL }}
          TEST_USER_TERTIARY_PASSWORD: ${{ secrets.TEST_USER_TERTIARY_PASSWORD }}

      - name: Upload auth state
        uses: actions/upload-artifact@v4
        with:
          name: auth-state
          path: tests/e2e/fixtures/storage-state-auth.json
          retention-days: 1

  # ============================================
  # STEP 5: Full E2E tests (sharded, parallel)
  # ============================================
  e2e:
    name: E2E (${{ matrix.browser }} ${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: [smoke, rate-limiting, auth-setup]
    timeout-minutes: 60
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ github.event_name == 'schedule' && fromJSON('["chromium", "firefox", "webkit"]') || fromJSON('["chromium"]') }}
        shard: [1/6, 2/6, 3/6, 4/6, 5/6, 6/6]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        env:
          BROWSER: ${{ matrix.browser }}
        run: |
          for i in 1 2 3; do
            pnpm exec playwright install --with-deps chromium && break
            echo "Retry $i: chromium install failed, retrying in 10s..."
            sleep 10
          done
          if [ "$BROWSER" != "chromium" ]; then
            for i in 1 2 3; do
              pnpm exec playwright install --with-deps "$BROWSER" && break
              echo "Retry $i: $BROWSER install failed, retrying in 10s..."
              sleep 10
            done
          fi

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/

      - name: Download auth state
        uses: actions/download-artifact@v4
        with:
          name: auth-state
          path: tests/e2e/fixtures/

      - name: Start server
        run: |
          npx serve out -l 3000 &
          sleep 5
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          CI: true

      - name: Prime Supabase connection pool
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          # Wake Supabase free tier and warm the connection pool.
          # Without this, the first query from each shard takes 10-30s.
          curl -sf "${SUPABASE_URL}/rest/v1/user_profiles?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            > /dev/null 2>&1 || true
          echo "✓ Supabase connection pool primed"

      - name: Stagger browser shards to reduce Supabase Cloud contention
        env:
          BROWSER: ${{ matrix.browser }}
          SHARD: ${{ matrix.shard }}
        run: |
          SHARD_NUM=$(echo "$SHARD" | cut -d/ -f1)
          # Stagger browser starts to reduce Supabase Cloud contention.
          # 6 shards spread messaging tests more evenly than 4.
          if [ "$BROWSER" = "firefox" ]; then
            DELAY=$((30 + SHARD_NUM * 5))
            echo "Firefox shard $SHARD_NUM: waiting ${DELAY}s"
            sleep $DELAY
          elif [ "$BROWSER" = "webkit" ]; then
            DELAY=$((60 + SHARD_NUM * 5))
            echo "WebKit shard $SHARD_NUM: waiting ${DELAY}s"
            sleep $DELAY
          fi

      - name: Run E2E tests (shard ${{ matrix.shard }})
        env:
          CI: true
          SKIP_WEBSERVER: true
          BASE_URL: http://localhost:3000
          DEBUG: pw:api
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_PRIMARY_EMAIL: ${{ vars.TEST_USER_PRIMARY_EMAIL }}
          TEST_USER_PRIMARY_PASSWORD: ${{ secrets.TEST_USER_PRIMARY_PASSWORD }}
          TEST_USER_SECONDARY_EMAIL: ${{ vars.TEST_USER_SECONDARY_EMAIL }}
          TEST_USER_SECONDARY_PASSWORD: ${{ secrets.TEST_USER_SECONDARY_PASSWORD }}
          TEST_USER_TERTIARY_EMAIL: ${{ vars.TEST_USER_TERTIARY_EMAIL }}
          TEST_USER_TERTIARY_PASSWORD: ${{ secrets.TEST_USER_TERTIARY_PASSWORD }}
          BROWSER: ${{ matrix.browser }}
          SHARD: ${{ matrix.shard }}
        run: |
          pnpm exec playwright test \
            --project="$BROWSER" \
            --shard="$SHARD" \
            --reporter=blob \
            --trace=on-first-retry

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.browser }}-${{ strategy.job-index }}
          path: blob-report/
          retention-days: 1

  # ============================================
  # STEP 6: Merge reports and generate summary
  # ============================================
  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: e2e
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge reports
        run: pnpm exec playwright merge-reports --reporter=html,github ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Generate summary
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "## E2E Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "**PR Mode**: Chromium only (4 shards)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Full Mode**: Chromium + Firefox + WebKit (12 shards total)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the **playwright-report** artifact for detailed results." >> "$GITHUB_STEP_SUMMARY"
